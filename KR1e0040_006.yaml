body:
  text: 左氏傳續説巻六宋呂祖謙撰文公下富父終生駟乗十一年古者車甲士三人駟乘之制蓋緣戎狄强大特添此一人敗狄于鹹獲長狄僑如十一年大抵君道善羣須得衆人共輔方得豈有獨恃一已有力而能自立者蓋天下未有能獨立底人耏班御皇父充石十一年充石是名皇父是字大凡古人書人名必先書其字宋公於是以門賞耏班使食其征十一年此正當周幽王時蓋闗譏而不征乃是文王治岐時所用法周禮國凶荒則殺闗市之征此亦取得不多到幽王時已自多取至春秋時浸浸尤甚郕太子朱儒自安於夫鍾國人弗徇十一年太子以奉社稷宗廟之粢盛以朝夕視君膳者也今朱儒留戀夫鍾之地以自便苟安其君父在時既不視膳問安及其亡也又不能居喪盡禮二者俱無則祭祀之禮絶國人所以不從之也秦伯使西乞術來聘襄仲辭玉十二年大凡聘禮賓襲執玉擯者入告出辭玉納賓公側授宰玉至事畢後却還以玉歸使者此是常制魯之辭秦者魯是晉屬國所以辭者不與其伐晉也襄仲曰不有君子其能國乎國無陋矣十二年何襄仲一聞其言而便謂君子蓋秦逺在西戎而使臣之辭命和遜如此便知其國有君子而非陋也范無恤御戎十二年此言御戎而無車右非無右也偶不載耳請深壘固軍以待之十二年深壘便是高壘蓋溝深則壘高高時取土必就下取其壘既高其濠必深固軍是軍所舍處必致其固趙氏新出其屬曰臾駢十二年此是指出為卿者如公叔文子之臣大夫僎與文子同升諸公如陽子成季之屬也之類皆是春秋中家臣出為卿者亦多當考若使輕者肆焉其可十二年士㑹所以以臾駢趙穿之謀告秦者亦以一戰之勝負本不甚計利害而士㑹既出在秦又欲安於秦所以以此謀告之然秦欲滅晉時亦决不肯如此教他要之為士㑹當如鄭公子蘭從晉伐鄭無與圍鄭者方是秦軍掩晉上軍十二年此只是略地以引動晉軍趙穿追之不及十二年大率有寵之臣最要先犯軍法彼蓋有所恃而然當時趙宣子所以不禁他時亦縁穿有寵無如之何然趙穿既有寵而弱不在軍事既是後生不練事底人又好勇而狂又多忌克此必敗之道豈可處之軍中此却是宣子措置得不是處秦行人夜戒晉師十二年此盖是約戰期晉侯使詹嘉處瑕以守桃林之塞十三年桃林便是函谷闗戰國曰陰晉秦孝公下令謂三晉攻奪我河西地是時陰晉屬魏後來商鞅敗魏公子卭之後魏納陰晉于秦秦遂更名曰寧秦特名此地為寧秦便見得此地係險要之地漢髙帝八年更名曰華陰屬京兆尹武帝元鼎三年縁楊僕恥為闗外民上書乞徙東闗武帝意好廣闊於是徙函谷闗於新安去𢎞農三百里以故闗為𢎞農縣唐屬華州禹貢太華山在縣東水經註云河水南流衝激闗山因謂之潼闗安禄山之亂黄巢之亂所以入來得時只縁潼闗失守晉人患秦之用士㑹也夏六卿相見於諸浮趙宣子曰隨㑹在秦賈季在狄難日至矣若之何中行桓子曰請復賈季郤成子曰不如隨㑹十三年諸浮是野外之地謀欲密故出於野看宣子荀林父郤缺三子之言見得宣子深得執政之體宣子意欲復士㑹未肯先自説出且舉賈季隨㑹兩人統問衆人如何虚已平心聽其公論所在方中行子欲復賈季固是説得未甚盡到郤成子請復士㑹則衆人始服所以從之使宣子便自以已意先説出則便非為上之體六卿相見於諸浮十三年諸浮必幽隱處恐秦人知其謀故於幽隱處謀之能外事十三年賈季知得四方諸侯之事地勢之險要人才之賢否能賤而有恥柔而不犯十三年能賤而有恥柔而不犯此方是人才若賤而不知所恥狠愎而使人不犯亦何足貴魏人在東十三年作詐降之勢吾謀適不用也十三年想繞朝當時亦曽言之秦秦不從耳其處者為劉氏十三年此一句本無謂恐西漢人添入蓋左氏一書本無閒句設有此句時後面必有事相應後面無一事應所以見此句是添入蓋西漢時惟公穀列于學官左氏不曽立學官到後漢因此立學官邾文公卜遷于繹十三年此叚見左氏智識明處所以取其騐於人者載之此非知道者安能如此惟文公斷之在已不惑於左石故左氏曰知命此去理上看不去事上㸔若常人必舉不騐處以證其謬子家賦鴻鴈文子賦六月子家賦載馳之四章文子賦采薇之四章十三年公與晉衞㑹各賦詩以見意見得意思雍容詳緩各自有味凡左氏傳載賦詩處皆好看凡崩薨不赴則不書禍福不告亦不書懲不敬也十四年此是魯史之例非孔子春秋之㫖蓋魯史不書所以懲不赴者之不敬春秋不書所以懲天下諸侯之無王蓋天下共戴天子於上安有天子崩諸侯猶有待於赴而後知耶子叔姬妃齊昭公十四年此子一字見得是文公女公子商臣驟施於國而多聚士十四年驟施是一旦周旋要結人士不特是人才凡厮養士卒之類皆是貸於公有司以繼之十四年有司官司也杜註謂富者非是譬如今預借官錢相似蓋公子商臣是當時彊恣底人所以使令得行有星字入于北斗十四年有星孛入于北斗正是入北斗之環域蓋北斗是天綱紀之星宋齊晉是天下紀綱之國所以見得有亂胡氏春秋所論是晉趙盾以諸侯之師八百乗納㨗菑于邾十四年向來城濮之戰七百乗却是晉國所自有之兵此八百乗却不是晉國所有共取諸諸侯者耳盾欲納㨗菑此是盾見得不分明後來一聞齊出貜且長之言便還師而歸此却是速於改過處周公将與王孫蘇訟于晉王叛王孫蘇而使尹氏與聃啓訟周公于晉十四年周公與王孫蘇訟王使尹氏訟周公于晉此是天子下訟于諸侯如晉郤至與周訟是天子與諸侯大夫下訟于霸國衞侯與元咺訟是君臣相訟于霸國鄭伯與許男訟是諸侯相訟于大國王叔陳生與伯輿訟是王臣相訟于霸國之使昭子與季氏訟是諸侯之臣自訟於其國清沸魋偽訟三郤是小臣訟于執政楚穿封戌囚鄭皇頡公子圍與之爭正於伯州犂此又一國之臣自訟于本國之執政廬戢黎及叔麇誘之遂殺鬭克及公子爕十四年當時不用兵伐之而却誘之者何故蓋當時莊王在如用兵却是幼君所以不敢秦有殽之敗而使歸求成十四年此一段是大篩目蓋當時天下强國四晉楚齊秦互相角立自殽之役後齊却與晉為一秦却與楚為一雖其間自有曲折不同然至春秋末大勢分而為二却自此始穆伯求復十四年穆伯所以自魯奔莒歸魯而復奔莒奔莒而復求歸者何故蓋初間歸魯而不得為卿所以又奔莒既奔莒而莒又不如魯所以復求歸蓋在魯雖不為卿而其子則為卿也與在他國氣象必不同請葬弗許十四年請葬但欲歸葬不必如杜注請以卿禮葬宋高哀為蕭封人以為卿十四年此自下而拔出為卿者蓋古者有世卿皆是世承其職而此外却自有匹夫登上位者如此類便是若不如此則成周三年賓興賢能者却頓放在何處然封人之職甚卑自封人而為卿高哀必是大段有過人處觀其不義宋公而出其去就之輕如此則此人大略亦可見矣齊人執單伯十四年此王室衰甚齊君無道處又執子叔姬十四年公羊子以為單伯淫叔姬蓋公穀只是經生不識朝廷大體其間載事或有鄙俚然其中説經㫖處却與理合處甚明不可不子細㸔蓋緣他傳得子夏學所以識見至此若載事則不比左氏左氏是國史識得朝廷大體諸侯五年再相朝以修王命古之制也十五年曹與魯同在東嶽皆東方諸侯所以五載之間復相朝聘先王之命如此至此特修之耳修是久廢而復講齊人或為孟氏謀十五年孟氏注云孟氏公孫敖家慶父為庶長故或稱孟氏古者以王父字為氏慶父自共仲則本謂之仲氏然以其是庶長子故杜氏謂之或諧孟氏也故春狄只書仲氏不書孟氏惠叔猶毁以為請十五年正如申包胥慟哀秦庭之類立于朝以待命十五年大率朝時只旅進旅退而已至此常立於朝待許而後退且國故也十五年所以存國家之大體蓋穆伯亦是公族且為故卿不可使之不歸葬葬視共仲十五年看此句見前面杜氏注請葬謂之請卿禮亦未安帷堂而哭十五年禮朝夕哭不帷帷而哭此變禮也檀弓載曽子曰尸未設飾故帷堂小歛而徹帷仲梁子曰夫婦方亂故帷堂小歛而徹此是正禮救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也十五年此正是宗法惠伯舉宗法以言之耳如宗族之中有窮乏當救之善者賀之有災者弔之同其祭祀以致其敬哭其喪以致其哀此是宗法之義如此雖兄弟之初時或有不足至於此數事之中則惻然有不能已毋絶其恩愛此是相親之道孟獻子愛穆伯二子或譖之曰将殺子獻子以告季文子十五年獻子告季文子亦已信之矣二子皆死亦自愧不安而死孟獻子正是宗子宗子有君道博議所論此事非是晉卻缺以上軍下軍伐蔡十五年當時下軍帥不曽出以城下之盟而還十五年城下之盟古人所恥如楚莊王伐宋易子而食析骸而㸑楚退師三十里方與宋盟以此見得恥之深齊人賂晉侯十五年此見當時諸侯相賂以私而畧無忌憚於此可見當時風俗公不與不書諱君惡也十五年譬如他人有過則不諱親戚有過則有隱諱之意人情自應如此為尊者諱為親者諱固然而纂例乃云為賢者則不諱蓋賢者亦自有為諱之理若是賢者小過豈可不為諱若有大過則雖欲諱亦不可所謂諱者皆是不忍言其惡却是忠厚之意不然則其弊将至於簒弑之漸禮以順天天之道也十五年禮有上下有尊卑有隣國往來之禮此皆是天道如此君子之不虐幼賤畏于天也蓋自人言之則有貴賤强弱有許多般自天言之天下人皆是受天之一氣烏可以其幼賤而虐之左氏此等議論皆有源流須當深沉細看楚大饑戎伐其西南至于阜山師于大林又伐其東南至陽丘以侵訾枝庸人帥羣蠻以叛楚麇人率百濮聚於選将伐楚十六年戎伐楚一段初是戎因饑來伐不過乗其饑耳其中庸人帥羣蠻以叛其勢甚鋭其兵甚衆是有意來伐楚至麇人帥百濮以伐楚其意亦不過如戎之伐楚當是時三處先後來伐楚其勢亦甚可畏須是要識他禦敵之方如此一段最要子細看成敗興亡及地理險阻兵勢布置謀臣措置事事有之楚人謀徙于阪髙蒍賈曰不如伐庸十六年楚當時不伐麇而先伐庸者何故蓋當時病根在庸其所以引羣蠻共攻楚者皆是庸人倡之此所以先伐庸也楚當時所以使廬人七遇皆北蓋欲示甚弱之勢而使庸人以為不足與戰庸人既驕則羣蠻皆散不能合以攻楚則楚師可以大進而伐庸楚之計正在此然所以如此者必欲滅庸而後已蓋病根不去則終為後患我能徃冦亦能徃十六年蒍賈是與子玉同時人到此亦甚老成所以為謀如此之審以此見國家不可無世臣振廪同食十六年當時各自有廪以備緩急若常時則藏而不敢發到此勢極事急故盡所有發之大抵做事須是如此决然倒斷然後成事況成敗在此一舉纔退縮畏避則羣寇乗勢愈來攻擊不已以此知人立身亦如此須常振作不可蕭索過了使楚當此時不自振奮則烏保其不亡故楚自子玉死後其勢甚弱自克庸以後氣象殊别盖振廪乗驛皆是左傳中大綱目如此等事只有數件才識得此等事便㑹看史振廪是險要處皆有廪以備急難後世則無之蓋古人作事周備皆是閒時措置如臨時發運雖費十石亦卒運不得一石來楚子乗驛㑹師于臨品十六年楚謂之驛鄭謂之遽晋謂之傳皆是傳車古時逓鋪皆有傳車以待使臣之往來及有緩急告命之事此所係甚大如人之一身其血氣常使流通乃好自荆公以來却作等閒事看了其後遂廢往往以此為費用而不知是朝廷大事今之逓鋪雖有遺迹而人多不以此為事至于請給之類多不及時與之齊侯戒師期十八年齊侯戒師期或是戒約如定八年陽虎戒都車曰癸已至蓋平時兵皆散在郊野中必須約定期日畢至此是軍法當如此如違期則有殺無赦戒師亦有兩般有自戒國中士卒者此是也又有敵國相戒者惠伯令龜十八年令龜如儀禮喪服命龜曰無有近悔之類皆是齊懿公刖邴歜之父而使歜僕納閻職之妻而使職驂乗十八年懿公無道之君既刖其父納其妻如何却不盡殺其子戮其夫乃使此二人居親近之地何故蓋懿公是自恃才勇底人意謂此二人常人所不敢與之同處者而我無所畏而且能為我用此無道之常態公游于申池十八年申池亦是可游觀處想多竹木可觀襄十八年云焚申池之竹木可見多竹木處大凡左氏載事雖小小事皆前後相應乃謀弑懿公懿公所以見弑於游申池之時者亦游觀處左右無備而此二人且處近職所以弑之無難舍爵而行十八年見得二人去時甚從容略無恐懼意此亦見國人皆惡懿公處
