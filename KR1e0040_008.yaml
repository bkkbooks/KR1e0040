body:
  text: 左氏傳續說卷八宋吕祖謙撰成公上齊侯親鼓士陵城二年陵城是勇氣激𤼵直踰其城不待用雲梯也郤克請八百乘許之二年城濮是春秋大戰不過用車七百乘盖古者用人為兵互相調𤼵所以少不如後世盡𤼵人以為兵也鞌之戰晋用八百乘此時雖添百乘亦不過六萬人至昭十三年晋治兵于邾南甲車四千乘計三十萬人前此未嘗有用許多人者春秋到此時盖已與戰國時相接戰國䇿田單問趙奢曰帝王之兵所用不過三萬而天下服今將軍必負十萬二十萬之衆乃用之何也對曰古者四海之内分為萬國城雖大無過三百丈者人雖衆無過三千家者而以三萬距此奚難哉今取古之為萬國分以為戰國也能具數十萬之兵曠日持久數嵗即君之齊已齊以十萬之兵攻荆五年乃罷趙以二十萬攻中山五年乃歸以此看得後世却未有用七百乘齊侯使請戰二年前時如城濮之後請戰之辭只是一次至此何故又曰大夫之許寡人之願也若其不許亦將見也盖齊侯只欲鼓作三軍之勇氣齊髙固入晋師二年此是致師欲勇者賈余餘勇二年賈余餘勇其驕如此安得㑹勝卻克傷於矢曰余病矣二年當徴㑹於齊時卻子曰所不此報無能渉河伐齊之氣如此勇到此却欲不進何故盖卻克當此時想是甚枝梧不得所以如此說若鼓音才不繼時晋師便敗只頃刻間耳當時全得解張之力看其言力挽卻克如此遂成鞌之勝此見卻克頼左右得人所以至此大抵人放意懈怠時皆在前後左右扶持底人著力推挽射其御者君子也二年古者一車三人自非元帥御者居中居其中者必是一個好人逢丑父與公易位二年此是見時勢急廹不可走故使之易位古者軍將在軍皆同服鄭周父御佐車二年佐車便是貳車朝祀時謂之佐車周禮田僕掌佐車之政檀弓魯與宋戰於乗丘公隊佐車授綏兵車之法將在皷下御者在左軍右在右執刃每出齊師以帥退入於狄卒二年齊頃公每出齊師時必先自當其前以帥厲退者然頃公既自前入晋軍則齊師繼至士卒乗勢而進與晋軍相夾故頃公誤辟入狄卒此亦見狄人常為晋用處如襄十六年晋敵其上戎亢其下可見辟女子二年辟女子之言亦可見春秋之餘民尚有三代氣象齊侯使賓媚人賂以紀甗玉磬與地二年賓媚人是國佐經書國佐傳書賓媚人左氏欲教人互見賔姓也媚人是族晋人曰必以蕭同叔子為質二年以蕭同叔子為質晋固知其不可行然當時只欲辱他耳然賔媚人便直分明對他曰蕭同叔子非他寡君之母也此大段勝得他大率人語言湏當直如此分明向使齊或卑語屈節以告晋則晋益加侮矣賔媚人之對可謂使臣矣頃公雖無道然能選擇此等使臣是尚能用人在如此則晋亦未可十分弱齊物土之宜二年物土之宜從其髙下燥濕之宜如稻宜下地粟宜髙地之類南東其畆二年北以南為上西以東為上言南則北在其中言東則西在其中古者井田之制溝洫縱横兵車亦難經過五伯之覇二年王政修明則安得有伯自王政衰㣲而後伯者出夏伯昆吾商伯大彭豕韋此是三代之伯春秋之伯齊桓晋文秦穆楚莊宋襄或者以勾踐與五伯之列魯衛諫曰齊疾我矣魯衛來諫盖事不如此則無収煞苟有以籍口而復於寡君二年此見古人善為辭命乃大户二年大户是大閱視民之户口盖常時自有軍籍到此又恐有隐匿者有未曽注於籍者所以大視之如宣王料民之事雖不是大户然大畧亦可因此見魯以執斵執鍼織紝賂楚二年此皆魯工巧底人楚無之故以為賂蔡侯許男不書乗楚車也二年春秋時凡諸侯乗他國之車則以為耻盖以有臣僕之意也如定公十三年齊欲與衛乗使告曰晋師至矣齊侯曰比君之駕也寡人請攝乃介而與之乗此正是諸侯乗他國車之例公衡逃歸臧宣叔曰衡父不忍數年之不宴以棄魯國二年此一段最要看何故論衡父為質於楚時固不如在魯之安然為質於楚時楚盖自以賔禮待之亦不為十分不好但衡父本不以國家為念只欲自便其身耳所以有昭七年薳啓彊之事大抵人最不可求一身之利而不能隐忍終至於貽患後世此處最宜深看然臧宣叔既明見得後日之患禍如此分明何故初間却不肯自去使楚盖臧宣叔是氣直底人他見當時季氏執政合是季孫而季孫却不出所以不平故辭以無功而受名而孟孫所以自請往要之人臣之義不當如此然此處亦可見三家専權處三家在當時最是季氏為强故魯有事季氏多不出惟是大事則問出耳其次到叔孫又其次方到孟氏盖孟氏在當時亦弱故當時有事非臧宣叔出則孟孫出是行也晋避楚畏其衆也二年晋避楚如何見得盖晋伐齊後便歸當時若歸得緩時必與楚師遇中行伯之於晋也其位在三三年盖晋卿之位以中軍帥為首中軍佐次之上軍帥之位却在其三其次序如此當時中行伯却為上軍帥韓厥登舉爵三年舉爵如晋平事雖是罰爵亦可看臣之不敢愛死為兩君之在此堂也三年此是謙辭只是欲齊來服晋晋侯之命在諸侯矣四年盖言晋為諸侯之主諸侯從違晋侯之命係焉兩君之所欲成四年成如虞芮質厥成之成嬰曰我在故欒氏不作五年當時欒氏所以欲害趙氏何故盖當時欒書将中軍正是執政嬰所以能令莊姬䕶趙氏者盖莊姬乃晋成公女觀成公八年莊姬譛之於晋侯事可見嬰夢天謂已祭余余福女五年此亦見先王禮典廢壊所以大夫僣而祭天古者天子乃祭天荀首逆女宣伯餫諸榖五年此是晋人自魯境過魯以芻米往饋之古禮猶在晋侯以傳召伯宗五年𫝊車或謂之驛或謂之𫝊皆是驛車之名在唐専有館驛使伯宗辟重五年重車轉動甚難故重人教伯宗不如自徑路速往伯宗見其說有理所以問絳事重人又言梁山崩因舉故事告之重人必是隐者知得典故想伯宗反未必知之出次五年出次不必出郊但避正寢伯宗請見之五年古者無故不見君纔見君便爵之以官伯宗所以欲見重人正欲官之也榖梁言伯宗攘善則恐不然恐失於傳聞之差不如左傳所載有理楚人執皇戌及子國五年楚執皇戌子國何故盖皇戌是攝鄭伯之辭者子國恐是當時為介底人所以俱為楚所執同盟於蟲牢鄭服也五年盖當時南北强弱之勢全在鄭之從違宋公辭以子靈之難五年辭以子靈之難者尚有餘黨未平士貞曰鄭伯不安其位六年位便是兩楹之間季文子如晋六年蓋重其事則上卿自往趙同趙括欲戰六年同括乃向來從彘子之人其輕躁可見善鈞從衆六年善指賢者譬如有善人十人其一說或二三人欲如此其一説或七八人欲如彼兩說皆出於賢者之謀似皆可從此所善均也從衆者却就賢者兩說之中擇其衆者從之皆所謂從衆也若不問其人之賢否而徒例從衆則不可此處如識得便有受用處善衆之主也六年此正指賢者言之中國不振旅七年入曰振旅不振旅者只是用兵不勝此是係天下盛衰中國弱則夷狄盛晋人以鍾儀囚諸軍府軍府是藏軍實之府凡獲俘囚皆藏於此府楚子重請申呂以為賞田七年賞田制度在周禮載師之職曰以賞田任逺郊之地司勲掌六鄉賞地凡頒賞地参之一食注云賞田在逺郊之地屬六鄉焉賞地之稅参分計稅王食其一也二全入於賞之臣也子重殺巫臣之族七年楚共王前時止子反重錮巫臣如是之明今却如是巫臣請使於呉七年巫臣初止欲報私怨其後楚為呉所伐通呉於晋七年呉自此漸盛晋趙莊姬譛趙同趙括八年晋趙莊姬一段與史記所載不同史記所載失於傳聞之差是時晋室正盛而史記却云索於宫中夫人置兒袴中趙嬰已死了而云與同括同時死蓋太史公理㑹大處儘好只此等不甚細考所以只據傳聞之誤謂屠岸賈索莊姬之所生子於公宫亦恐不然蓋晋宫中自有紀綱亦不容得如此以其田與祁奚八年大抵有官則有田趙氏之後無官故無田以與之而乃以其田與祁奚豈無僻王頼前哲以免也八年言三代亦有邪僻之子孫頼禹湯文武之徳以免同括雖有罪亦當念趙衰趙盾之功勲於晋國唯或思或縱也八年思謂思開啓封疆底人縱謂我放縱而不整頓備禦之謂杜氏謂縱其暴擄者則恐說不甚通君後諸侯是寡君不得事君也燮將復之八年士爕向在同寮中如此謙遜到聘魯時公請緩師則對魯之辭又却如此嚴毅盖在國則本無所争但當退讓將君命以出使則不可辱國故湏直致其意若一味柔懦則不能做事一味剛狠時亦不能臨事㑹如此韓昌黎做王仲舒墓誌云氣銳而又剛以嚴哲人之常愛人盡已不倦以止乃吏之方與其友處順若婦女何徳之光孔戡墓誌云君於義若嗜欲勇不顧前後於利與禄則畏避退處如怯夫學者要當如此凡諸侯嫁女同姓媵之八年同姓媵凡諸侯適女方嫁庶女皆為媵杞逆叔姬喪請之也九年杜氏謂魯强請之恐當時未必是如此左氏曰為我也以其為魯故也左氏之意自分明使稅之九年想晋亦不常常拘縶只晋侯來時又暫囚之泠人也九年泠人樂官樂官多瞽者以此觀之亦不盡是瞽先父之職官也九年蓋古者所以藝之得名於後世者以其世世相習所以専精史記歴書云疇人子弟分散如淳註曰家業世世相傳為疇律年二十三傳之疇官分從其父學此可見古之世業處其他如卜筮百工莫不盡如此禮記曰良冶之子學為箕裘先自易者為之楚囚君子也九年觀其應荅之間便有此四徳此必能成事尊君敏也九年敏是明逹知禮之謂詩曰雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃九年所以引此詩意者蓋謂大國雖要害處己自守備了然其無要𦂳處尚不可不守况今莒是小國尤不可不加守備也我執一人焉何益十年一人猶言一獨夫爾鄭子罕賂以襄鍾十年古人以鍾為重器壊大門及寢門而入十年天子有五門諸侯有三門曰臯門應門寢門公疾病求醫於秦十年秦多良醫醫緩醫和皆是秦人攻之不可逹之不及十年攻之以藥逹之以針凡針炙皆曰逹逹通其氣使甸人饋麥十年天子謂之甸師諸侯謂之甸人甸師之職掌帥屬而耕耨王籍以時入之共齊盛饋人為之召桑田巫十年饋人是掌飲食之人如天子之膳夫是也忠為令徳非其人猶不可十年如廢置之事非是大聖賢心純於國家者亦恐不能免嫌疑之迹譬如放太甲須伊尹方可今叔孫申之謀當時意雖為鄭君然其間亦非是盡純於鄭君故左氏所以如此說晋人止公十年蓋因八年晋歸齊汶陽之田是以疑公聲伯之母嫁于齊管于奚十一年齊管于奚亦管仲之後杜氏註管氏之世祀也冝哉云仲之後於齊沒不復見此恐杜氏偶考之不精耳卻犫求婦於聲伯聲伯奪施氏婦以與之十一年當時聲伯不辭卻犫何故想卻氏指施氏婦之名以求於聲伯聲伯不得不奪以與之不然聲伯豈不能以無婦辭之乎此一段見卻氏淫處晋卻至與周争鄇田王命劉康公單襄公訟諸晋十一年此見周室衰弱昔周克商使諸侯撫封十一年撫者蓋新王即位雖向來諸侯已封建了到此必須再封諸侯以各撫有其封内之地或有因其舊而封之者或有更其舊而别封他人者須重新整齊過此之謂撫封若治其故則王官之邑也王官邑是畿内来地王制謂内諸侯禄也外諸侯嗣也此固是先王之定制然畿内諸侯或有累世賢者亦世封之外諸侯或有不賢者亦必别舉賢者更封之宋華元合晋楚之成十一年晋楚向來都未曽有合成者到此一節兩邊皆衰晋厲公幼楚共王弱所以合成若一邊强時必不如此然當時華元之意只欲息列國戰争之難耳蓋宋是今南京正居南北兩間此所以欲合晋楚之成也秦晋為成十一年秦晋為成此又别是一事又不縁晋楚之成秦晋之成是秦先疑晋謀其不協而討不庭十二年不庭是晋楚之庭恐非王庭卻至對子反十二年晋卻至對子反之辭備知先王典禮而又以治世宴享之禮與亂世諸侯畧其武夫以為腹心一段對說最有意思蓋先王所以有宴享之禮正所以通諸侯往來之情使其相與以誠相接以和則分争之禍自無所起此先王制禮之意非徒然文具也至於後世徒恃武夫以相侵奪多少費力其視典禮行而弭亂於無形者其用力豈可同日而語哉大抵武夫固不不可無然徒恃武夫則亦末䇿耳盖當時去古尚近卻至尚聞得先王之意所以説得有理就三卻中言之至又勝得犫錡二子觀對子反之辭深知先王之意如此到鄢陵之戰力欲與楚戰却又忘了前日之言以此知無事時說得易臨事時做便難百官承事朝而不夕十二年栁子厚曰古者旦見曰朝暮見曰夕故詩曰邦君諸侯莫肯朝夕左氏傳曰百官承事朝而不夕禮記曰日入而夕又曰朝不廢朝暮不廢夕晋侯將殺竪襄叔向夕楚子之留乾谿右尹子革夕齊之亂子我夕趙文子礱其椽張老夕智襄子為室美士茁夕皆暮見也漢儀夕則兩郎向𤨏闥拜謂之夕郎亦出是名也孟獻子曰禮身之幹也敬身之基也卻子無基十三年此是取墻以為喻無基則承載事不得劉子曰民受天地之中以生十三年此一節當子細看盖人者天地之心正得天地之中氣其他萬物則得天地之偏者耳然於物之中又有所謂偏者焉是以人有動作禮義威儀之則所以定命也則非是外來盖纔有目則必明有耳則必聰有貌則必恭皆是自然有者故能者養之以福福者百順之名也凡順理處便是福故福不說取而禍則曰取禍此理盖可見勤禮盡力此只各就君子小人地位分說其實則一般國之大事在祀與戎古人最重祀戎周禮一書大率亦只此二事今成子受脤於社而二事實兼之此一段見得孔子未出以前學問常常講䆒得分明中庸大學與此無異自異端出後始不見有此議論晋侯使呂相絶秦十三年魏錡封於呂邑故稱呂相晋欲伐秦故先數秦之罪後世檄書蓋自此始然此書大抵多是誣秦此可見風俗之變向來辭命初未嘗有不著實者虚言相誣蓋自此始左氏書秦為令狐之役而又召狄與楚欲道以伐晋諸侯是以睦於晋蓋記秦之曲只此數端耳此見左氏書法如秦有韓之師此本是晋許秦賂晋不與之此是晋曲今晋却言秦不是秦納文公乃是大功今言是穆之成如晋文之征曹衛而諸侯朝晋自是文公欲圖伯是時秦穆雖預諸侯之朝本不是為秦而却言有大造於西此則己未有一分恩於人却言有十分别人有十分恩於已則作一分說過虞夏商周之𦙍十三年蓋當時最重聖賢之後古之聖人所以欲存古聖賢之後者正所以存其風聲氣習禮樂典章常繼而不絶故其間或有絶而不嗣必待聖人出而封之如樂記武王克商未及下車封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后之後於杞春秋時無聖人出所以聖賢之後少後世惟太史公識得此意故於杞世家之後叙聖王之後所以如此詳也穆公即楚謀我十三年秦自殽之敗復與楚為成白狄及君同州十三年秦都於雍西河郡有白胡昭告昊天上帝十三年秦告上帝見秦之僣處當時諸侯唯魯賜天子禮樂故得祭天此外未嘗有諸侯告天者秦告上帝是秦僣禮而秦之僣自平王時此皆是大事晋帥乗和十三年帥是六軍元帥乗是其餘車乗之屬如何見得和處蓋元帥撫恤士卒士卒能親附元帥此所以見得和處詩曰君子所依小人所腓皆是帥乗相親比如牧野之戰同心同徳此便是和紂前徒倒戈邲之戰彘子不退此皆是不和處師迓晋侯於新楚十三年當時晋侯到秦地雖與戰却不鲁隨衆軍深入只止在新楚以待諸侯深入秦地而還此所以諸侯還迓晋侯也
