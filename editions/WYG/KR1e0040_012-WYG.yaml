body:
  text: 左氏傳續説十二宋吕祖謙撰哀公二十年之外吳其為沼乎元年越既為吳俘虜殘滅之餘若不是二十年亦不能伐吳一日之行所欲必成元年所欲必成是水陸必備如漢霍去病出師天子遣太官齎數十乗是也命公子郢為太子君命也二年衛侯命公子郢為太子若郢當時便自立則衛必不亂郢徒潔一已而不恤國之亂如無子則立孫檀弓舍子立孫是也至此則又難以此論若蒯瞶不爭則子輒可立今蒯瞶既在外則郢纔立必定然左傳于蒯瞶何不稱君只稱太子太子既葬後方稱君如文帝紀九月葬太子即位是也上大夫受縣下大夫受郡二年古人以縣為大至秦以郡為大志父無罪二年志父趙簡子名簡子既叛君之後名聞于諸侯至後來所以改名太子曰吾救主于車二年衛太子救趙孟太子何初怯而後勇葢縁他初不經厯見鄭師衆便自驚後來得王良在所以膽氣便壯齊衛圍戚求援于中山三年此見夷狄甚盛至戰國時中山稱王南宫敬叔至命出御書三年所謂顧府者不過皆常人先至到後賢大夫漸漸至敬叔葢當時亦是從夫子所以其來有源流左氏書此一段截然可㸔先是敬叔至措置如此景伯至其措置又如此至桓子至命傷人則止此是大臣之言桓子雖是一强臣此言猶知大體此見得是當時源流如此孔子曰其桓僖乎三年當時人欲以此推重聖人不知適所以為淺耳此説是附㑹亦未可知或夫子偶然説亦未可知左氏尚惑於此周人殺萇𢎞三年杜註云終違天之禍恐不如此𢎞是忠臣當時葢欲忠於周室觀萇𢎞事劉文公故周與范氏可見柳子子厚弔萇𢎞文殺身之匪予戚兮閔周宗之不定莊子外篇謂血化為碧則其忠義可知矣季孫有疾命正常曰無死三年始間是秦有此俗今魯是禮義之國猶且染此想是此風大變襲梁及霍四年此是聲東擊西司馬起豐析與狄戎以臨上雒四年上雒是今之唐鄧司馬致邑立宗焉四年諸蠻所處亦不一非有宗主不能以聚其部落鄭駟秦富而侈嬖大夫而常陳卿之車服於其庭五年嬖大夫是特寵之名若今之添差是也昭七年晉以鄭罕朔為嬖大夫此别是一等他尚未至大夫今却常要用卿服大夫請祭諸郊六年何不在楚國内祭葢祭諸郊便是望祭如望於山川是也三代命祀六年三代諸侯天子命之祭則祭公㑹吳于鄫吳來徴百牢七年牢是牛羊豕共三百頭謂之百牢此見吳所以不能成伯處蠻夷之主盟中夏都不用先王之法又不如申之㑹靈王尚用齊桓之禮禮至此都蕩盡宋滅曹八年晉文公初間要滅曹何故不克今宋何故便克此亦是春秋之末亦縁公孫彊不修政事民心易離所以克之易公山不狃曰非禮也君子違不適讎國八年公山不狃雖是陪臣尚有前人氣味所以夫子欲從其召有若與焉八年古人耕射之事皆習焉耕以養身射以衛身有若未嘗以此為耻至漢時尚有之但今人皆不習之耳多殺國士八年恐魯三百人自受其害齊侯使如吳請師將以伐我乃歸邾子八年此是魯歸邾子葢向來邾曾被魯囚之負瑕今齊來伐魯故魯所以歸之囚諸樓臺栫之以􅁄八年從來有此故事與秦穆姬登臺履薪事相似鮑牧又謂羣公子曰使女有馬千乘乎八年觀此一事便見得鮑子是箇狂率人如前面醉而往時曰女忘君之為孺子牛而折其齒乎此語亦不是真出於忠誠使其果出於忠誠則前日自當以正義責之今日不應得有此語齊侯使公孟綽辭師于吳九年鄭武子賸之嬖許瑕求邑請外取許之九年齊侯初間要伐魯未㡬而又辭吳師此見齊侯舉措無常全不成模様此最要看春秋末間一節事與前全不相似向來雖無道之君又有甚於此者而其舉措又却不如此觀此是悼公直以國家為戱了如鄭武子之嬖許瑕求邑許其外取前時士大夫皆無此等事此巻是春秋末所以如此宋取鄭師于雍丘九年取是盡殺之也使有能者無死便是要生囚之以為奴僕凡滅國之後俘囚皆為奴僕以郟張與鄭羅歸見得只留得兩人吳城䢴溝通江淮九年江淮本不相通吳欲霸中國却溝通江淮此是東南漕運第一件事此路在髙郵軍至今尚存在唐時漕運亦是此路故自江通淮自淮通汴自汴通入渭自渭涇入長安遇水適火九年此是卜家所謂五兆五兆所謂金木水火土是也不利子商九年後來所謂姓之有五音葢已見於此至今卜筮之家姓有宫商角㣲羽是也陽貨以周易筮之遇泰之需九年凡筮有兩法有筮易而自有筮家之辭者有筮易而只用易中之辭者如秦伯伐晉卜徒父筮之遇蠱曰千乘三去獲其雄狐此是筮家辭也如論泰卦六五是周易中之辭也吳子使來儆師伐齊九年葢齊以魯故請師伐魯繼而却辭吳而與魯和故吳之伐齊所以特地教魯來同伐吳子三日􅂘于軍門之外十年此是吳要學中國霸主模様中國風俗凡鄰國之喪其禮如此徐承帥舟師將自海入齊十年此是海道其路境自今蘇州直到山東吳子使來復儆師十年見得諸侯不伐喪之風俗尚在延州來季子曰我姑退務徳而安民十年東坡延州來季子賛説得是季子曰務徳而安民亦見春秋末間如此等議論甚少不比春秋初時季孫使從於朝十一年尋常家臣不入公朝此是特地帶他去五日右師從之十一年此記得極好見得孟氏精神緩散處此一戰亦見得三家到此皆自收拾不得幸而全得冉有在且暫主張起然季氏所以使人不動時亦縁平時只自私己凡國有利必己専之而他人不與故孟氏叔孫氏所以不肯用力則其敗形已見於齊師未來之前然季氏自文子以來未嘗不私特其私之意尚私得大在如季武子平子之徒必不至此尚能割捨處置得行至康子私得大淺隘故所以至此大抵一家之盛衰天下之治亂只是聚散兩字人之聚散也只在公私二字上孟之側後入以為殿十一年殿或稱多殿之功受上賞如周勃𫝊先登賜爵五大夫攻簡虞取之擊章邯車騎殿陳轅咺對曰懼先行十一年此處要㸔葢轅咺是轅頗之族頗之過至於宗族皆知之而尚不敢説則頗之所以至此者可見矣吳髮短十一年葢吳之俗斷髪文身子胥屬其子於鮑氏十一年此子胥做得不是處所以來讒譖者之言史記伍子胥𫝊説内不得志外倚諸侯葢自以為先君之謀臣常鞅鞅怨望王宜早除之此説可見季孫命修守備十一年此見季康雖無足取在春秋末間亦尚有此孔文子使疾出其妻而妻之十一年觀此方見論語中孔文子何以謂之文也一句分明葢當時文子行事如此所以疑其謂之文也孔子則曰敏而好學不耻下問是以謂之文也言其亦有長處或淫于外州十一年此見太叔疾又淫于外州是禽獸行之所為魯衛是禮義之國前時魯用人于社今衛又如此則可知矣孔文子將攻太叔訪於仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也十一年此與論語對衛靈公問陳之語一般恐當時只是一事論語所載為得其真大抵左傳載孔子事多失其實葢察不得聖人深所以有欠精神處宋鄭之間有隙地焉十二年此地是王官所掌在春秋時列國多有王官之城在其間或有王官為後者皆是魯掌此地至春秋末尚有此地古者名山大澤不以封是也此皆是封建之法夏公㑹單平公晉定公吳夫差于黄池十三年黄池是今京西路此是二國爭伯處當時謂之兩伯云越子伐吳為二隧十三年當檢國語㸔方分明太子曰戰而不克將亡國請待之彌庸不可十三年此見得吳太子位望輕人不服葢縁吳人理㑹不得這般去處越入吳十三年吳太子既被獲後吳國又虚何故越不滅其國葢吳國雖虚其兵在外尚强所以未敢滅他七月盟吳晉爭先十三年縁當時宋之盟晉楚爭先之後有此故事至此吳亦爭之襄乃先晉人十三年此左氏載得其真處如吳語却説吳人先矣子服景伯謂太宰曰自襄以來未之改也十三年葢景伯出自襄為子我臣使公孫言已十四年公孫之言乃是兩面㸔得底言語此最是用心不好處大抵人須是分明説可用不可用不當用兩可之説故陳豹所以禍闞止者正縁公孫如此子我曰何害是其在我也十四年此亦不合欺他過了如人云不妨相似我盡逐陳氏而立女十四年陳豹為子我臣此正是陳氏使他來探伺闞止消息而闞止乃曰我盡逐陳氏而立女故陳豹亦不以得其實為喜而且為親密之狀姑與之謀曰我逺於陳氏矣且其違者不過數人何盡逐焉此正是小人不露處何以見魯衛之士十四年可見魯衛禮義之俗宋桓魋之寵害於公十四年宋桓魋亦不是箇大凶惡人只縁景公驕之所以至此公使夫人驟請享焉而將討之十四年使夫人請所以示其不疑以魯之衆加齊之半可克也十四年陳恒弑君一段恐記不出聖人之意左氏於孔門事記多失實惟孔門弟子記得其真論語説夫子告三子此却云不告恐不如此孟􅂥將圉馬於成十四年此見得三桓子孫微處成是孟氏之屬邑前後皆優之至洩却要處之養馬正如人家不肖子弟出却去擾他私屬此邑前時夫子曾墮之不克此可見其强矣成人奔喪十四年成是屬邑故應奔喪孟洩弗内十四年孟洩私意弗内所以致得他叛吳辭陳上介十五年此見吳衰處於是乎有朝聘而終以尸將事之禮十五年以尸將事之禮自古有之子玉曰然吾受命矣子使告我弟十五年子玉言已受君之命了汝自去問陳成子季子曰是公孫也求利焉而逃其難由不然十五年是時公孫在門内子路在門外識得是公孫子路之仕衛亦如冉求仕於魯一般除非如顔閔可以脱此結纓而死十五年結纓而死是以正而斃王使單平公對十六年此是王之辭命如此左氏傳所以載之者亦見春秋之末尚有此辭命子西召白公勝十六年子西若不通前㸔他終始亦不見他初見白公不過知得外面畢竟不識他心惟葉公知得他分明子西縁把他不當事了當時若欲合楚國之兵以攻白公甚不難白公初間亦不敢起兵若兵符在手方起兵如司馬置牙璋是也萬一若不是征伐起兵則人必疑他白公雖因獻戰備帶得幾人想見兵亦不多使處吳竟為白公十四年自此上文皆是欲殺子西以前時事鄭人在此讎不逺矣十六年此見其遷怒便指子西為仇皆是凶暴處焚庫弑王十六年當時白公若使如此終是凶焰人心必不歸然葉公亦難克畢竟費力白公所以不焚庫弑王只是欲不受弑王之名若之何不胄十六年左氏叙此段見得國人愛之深國寜乃使寜為令尹使寛為司馬十六年國寜是待國安寜之後方使寧為令尹寛為司馬衛侯為虎幄于藉圃十七年虎幄是以虎皮為幄未必是畫虎為幄吳子禦越笠澤十七年笠澤是太湖今蘇州國子實執齊柄十七年此是陳氏用詐術巧處齊國之柄皆出於陳氏國子豈得而與葢國髙天子之貳守田氏雖専猶挾舊族以鎮服内外也衛侯貞卜十七年衛侯見胥彌赦奔宋之後於心不能無疑所以又卜卜與占異卜是用龜其繇曰如魚竀尾衡流而方羊裔焉皆是繇辭公登城以望見戎州十七年當時戎狄錯居中國如晉有諸戎以依之正如附庸一般此戎正依衛從前如此衛侯無道一旦欲剪之齊侯稽首公拜齊人怒十七年齊人怒魯不稽首至此都不知先王之制度皇瑗奪其兄劖般邑十七年春秋以前鄭人要取祊田尚經涉許多時如此之難至此都不問兄弟之邑欲取便取三夷男女及楚師盟于敖十八年三夷無君長男女混皆與盟趙孟降于喪食二十年喪大記君之喪世子大夫公子食粥皆三日不食朝一溢米暮一溢米食之無筭蔬食飲水食之無筭既塟主人蔬食水飲不食菜果祥而食肉此雖是臣為君喪其子之於父亦然三年之喪親暱之極也二十年此見尚有先王之制以此㸔春秋之時非是不知有三年之喪唯其儒書二十一年此見魯秉周禮處越人以歸二十二年越人以其尸歸盖生則執俘馘死則執尸以歸宋景曹卒二十三年景是諡曹是小邾之姓曹姓出顓頊之後季康子使冉有弔二十三年故事大夫束脩之問不出境今之士大夫交政于中國政是春秋之時如此有不腆先人之産馬二十三年士喪禮兼送葬故用馬使求薦諸夫人之宰二十三年天子后之宰即周官之内宰諸侯之制想亦如此軍使令繕將進二十四年凡是用兵無所不備使宗人釁夏獻禮對曰無之二十四年宗人之辭直魯從前不以妾為夫人雖成風亦只是他子立之此亦是先王之遺澤厚處公如越二十四年見得魯衰處季孫使因太宰嚭而納賂焉二十四年太宰嚭是吳故臣越何故不殺當時越用之反間所以不殺他禇師聲子韈而登席二十五年韈有制度當攷公使優狡盟拳彌二十五年前此都未曽有俳優盟大夫辱至此亦甚如涉佗盟衛侯此欲以辱之拳彌曰晉無信二十五年此衛侯昏處皆不知為他所紿越納衛侯二十六年此是越欲圖霸大尹興空澤之士千甲二十六年此興字不是尋常字乃是調發之名纔出兵兵符皆在手故所以調發空澤之兵内不聞獻之親二十六年子鮮子展皆獻公之弟將以子之命告寡君二十七年當時陳氏豈有君叛臣常假君為名王莽之徒皆如此公患三桓之侈二十七年是時夫子之門人皆在然哀公不能用其言亦無益於亡晉荀瑤帥師圍鄭悼公四年左氏載此二段専記智氏之亡至韓趙魏來分晉便成戰國一經戰國文武之典章法度掃地而盡􅈶魁壘閉口而死悼公四年亦見智伯養死士如豫讓吞炭皆此之類此是春秋末漸入戰國氣象
