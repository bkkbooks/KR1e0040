body:
  text: 左氏傳續説卷四宋吕祖謙撰僖公諱國惡禮也元年國惡只是魯國臣子所不忍言者所以養臣子愛君之心若公言君父之惡便有弑君之漸諸侯救邢元年當初狄伐邢齊已救了何故又救耶盖衛與邢相近始初去救邢狄人雖退却去伐衛故衛為狄所滅狄既滅衛却乗滅國之威去伐邢所以桓公率諸侯再來救邢然不便去救次于聶北者盖夷狄中國之勝負於此乎分齊侯是伯主萬一小敗後夷狄便浸强中國便浸弱所以未敢輕去直待邢人突圍而出方敢乗其勢亂而逐之具邢􅄊用而遷之師無私焉元年邢不比衛衛是滅亡之後重新把服用與他今邢尚自有遺物無者從而與之未備者從而全之師無私焉見得邢自有遺物師不敢胡亂去與他私取一件公賜季友汶陽之田及費元年既與之邑又加之田厚賞之也此三家始盛之因後襄七年南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費昭十二年南蒯以費叛十三年叔弓圍費十四年南蒯奔齊二子來歸費三十二年史墨對趙簡子曰昔季友桓之季也有大功于魯受費為上卿定十二年仲由為季氏宰将堕三都於是季氏堕費君子以齊人殺哀姜也為已甚矣元年哀姜於魯大義已絶魯人正當討之於閔公既死之後僖公未立之前方是此魯當討而齊不當殺齊知魯不去討故取而殺之於齊諸侯城楚丘而封衛二年封衛如何却在遷邢之後狄人無有在者然後去城楚丘而封衛此非是緩其勢當如此晉荀息請假道於虞以伐虢公曰宫之竒存焉二年晉獻公如何知虞有宫之竒盖獻公是有意經略諸國底人平時下工夫正在此所以先知得若是不曽留意在此者雖敵國之謀臣亦何緣知得荀息對曰宫之竒之為人也懦而不能强諌二年此正穀梁所謂逹心而言略者也荀息所以知得子細亦是當時謀臣非特知得宫之竒之為人虞公之情性他亦知道故假道于虞曰冀為不道入自顛軨伐鄍三門冀之既病則亦唯君故他知虞公是要人取奉底人故先夸大其功以投他之所欲保于逆旅二年逆旅是旅舎言處于旅舎時復徃來侵略耳兵亦不甚多也晉里克荀息帥師㑹虞師伐虢滅下陽二年大凡滅國曰滅此特取虢之下陽何以亦曰滅盖虢有上陽又有下陽上陽是虢所都處下陽亦與上陽相等既為晉所取此便是與滅國一般盟于貫服江黄也二年先孤楚之黨楚人伐鄭二年齊楚所以欲争鄭者何故盖鄭界齊楚兩間齊得鄭則齊覇楚得鄭則楚霸齊侯與蔡姬乘舟于囿蕩公公懼變色三年舟蕩而公獨懼者何盖蔡亦近淮之國其俗習水為常了所以蔡姬不畏齊侯以諸侯之師侵蔡蔡潰遂伐楚四年此段是看得桓公不是因伐蔡了偶然去伐楚盖齊欲伐楚經營多年却本是要伐楚了因特伐蔡耳楚子使與師言曰不虞君之渉吾地也何故管仲對曰昔召康公云云四年此見得𦂳要處管仲必自出來説都不使行人對昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室四年五侯九伯論來自是用二伯同管一伯止管得一半此却云五侯九伯女實征之何故盖太公是師當時特地以此命他却與常制不同爾貢包茅不入王祭不供無以縮酒寡人是徴四年此管仲以大題目去問他處包茅正是荆州當貢荆正是楚地對曰貢之不入寡君之罪也敢不共給昭王之不復君其問之水濵四年此見得楚國𫝑强處不肯全然屈下故其辭半服半不服如曰君若以徳綏諸侯誰敢不服此皆是楚對得好處他所以能如此者盖楚有子文為令尹其才略可與管仲相當正如司馬仲逹對諸葛武侯一般楚子使屈完如師四年楚何故不便來敵齊却使屈完來何故盖齊是覇者其師又皆是節制之師不可輕犯所以先使屈完來觀之陳轅濤塗謂鄭申侯曰師出于陳鄭之間國必甚病四年盖覇者之師凡經過處諸侯必湏供其資粮屝屦如用師批劵之類相似齊侯説與之虎牢四年見覇者之權専雖諸侯他國之地予奪皆由他初晉獻公欲以驪姬為夫人卜之不吉筮之吉卜人曰筮短龜長不如從長四年此不知何處見得考之洪範七稽疑甚眀始言汝則從龜從筮從卿士逆吉又曰卿士從龜從筮從汝則逆庶民逆吉又曰庶民從龜從筮從卿士逆汝則逆吉盖謂曰汝曰卿士曰庶民雖逆然龜筮之從則自吉也至于作内吉作外凶則曰汝則從龜從筮逆卿士逆庶民逆於此乃見雖筮之逆然得龜之從亦吉矣此所以為筮短龜長也是以古者大事必卜卜所以為最重及夫龜筮共違于人然後用作凶及将立奚齊既與中大夫成謀四年此左氏書法最髙處盖當時驪姬所憚者惟里克一人而已然里克柔弱避禍却有中立之語使驪姬敢於逐申生而立奚齊全無忌憚此便是與里克同商量一般何以言之中大夫便是卿古者大國三卿皆命於天子次國二卿一卿命於天子一卿自命故命於天子者謂之卿如周禮所書止有中大夫却無上大夫盖卿便是上大夫正與此制合注中所謂中大夫為佐卿非也但只是亞於卿者齊侯是大國亦只是二卿管仲曰有天子之二守國髙在觀此則齊只二卿而已想是公之國方命三卿侯國只命二卿而已晉武公是簒位而入國天子未甞命他卿故只有中大夫中大夫便是晉國秉政之臣以此見春秋之􅀄此制尚在雖晉之强暴亦未敢改後來此制紊亂天子反減諸侯反多一國既有卿又有上大夫中大夫如叔向所言太子祭于曲沃歸胙于公姬毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃四年觀其祭地而地墳之時此已見得是毒了何故又與犬與小臣盖鱺姬要做箇眀證了以重他罪徃徃此事亦恐是驪姬與獻公先自商量了所以敢如此然論來申生到此時亦自可去而卒不去者何故盖申生為人小不忍而害大義雖不得立逃去他國亦何害晉侯使以殺太子申生之故來告五年春秋如此事皆當時大事所以必告於諸侯晉侯使士蒍為二公子築蒲與屈不慎寘薪焉夷吾訢之五年夷吾獨訴而重耳不訴者何故以此見重耳夷吾賢否處盖重耳當時已自知了士蒍稽首而對五年稽首是以首至地凡敬其命則稽首然士蒍當築蒲與屈之􅀄何故不諌盖􅀄時見獻公之頭勢難説所以不敢説到獻公責他不慎故至此敢説公使寺人披伐蒲重耳曰君父之命不校乃狥曰校者吾讎也五年重耳自不校便了何必湏要徧狥國人盖重耳素得蒲人之心蒲人只要去救他本不識重耳之本心萬一来校時恐害他後來大事所以不得不以此號令蒲人㑹于首止㑹王太子鄭謀寧周也五年胡氏所論極精􅃀曰以王世子而出㑹諸侯以列國諸侯而上與王世子㑹此例之變也而春秋許之鄭伯奉承王命不與是盟此禮之常也而春秋逃之所以然者王将以愛易儲貳桓公糾合諸侯仗正道以翼世子使國本不搖而天下之為父子者定所謂一匡天下民到于今受其賜者也至易變而之正以大義為主而崇髙之勢不與焉然後萬世之大論正矣陳轅宣仲譛申侯于鄭伯五年只緣申侯被利昏了雖宣仲陷害他如此分眀也自見不得論來􅀄間止是申侯反覆不是陳轅濤塗却是後來兩人却都不是與他一般了鄭伯逃歸不盟五年只是潛身而歸正如髙祖脱鴻門相似若以軍歸則齊安得不覺江黄道柏方睦于齊五年江黄道柏皆是近楚小國齊平日工夫正在此上先服小者然後來理㑹楚晉侯復假道于虞以伐虢宫之竒諌五年宫之竒到此諌得詳何故他亦見事勢極了所以盡説得出利害曲折無不瞭然虞不臘矣五年臘是祭名見得春秋時已有此名史記秦紀書曰秦􅀄臘此太史公自秦言之盖言秦于此始􅀄臘耳非臘始于秦也或者疑臘是秦時方有而不知自古來已有之以秦本西戎典禮未備至此方用臘當時諸國用臘者亦多且如秦紀書縣宜陽豈是古來未有縣而始縣于秦耶晉滅虢五年時桓公既為伯主何聽晉如此縱横盖當時天下縱横之甚救不得許多頭行最是夷狄極盛所以先去伐狄其次却來伐楚故後來雖不伐晉而晉自來服此乃見桓公規模處執虞公及其大夫井伯以媵秦穆姬五年媵本是卑者為之此特使虞公媵正要屈辱他如劉聰使晉懐帝青衣行酒相似而修虞祀五年此一句左氏正欲應宫之竒神其吐之之語晉侯使賈華伐屈夷吾不能守盟而行六年賈華是七輿大夫為右行者夷吾與屈人盟正欲以此結屈人之心尚有覬覦復入之意将奔狄郤芮曰後出同走罪也不如之梁六年郤芮為夷吾謀不為不是但奔梁之策乃苟簡淺近欲復國之意所以不如重耳奔狄之意逺大也管仲言於齊侯曰招􅂝以禮懐逺以徳七年招􅂝如鄭􅂝貳之𩔖懐逺是江黄之𩔖齊侯修禮於諸侯諸侯官受方物七年官是諸國所掌貢賦之官齊既富强又是伯主諸侯各來齊受所貢之物以貢于天子盖齊既伯諸侯欲以此結諸侯所以與他物以為貢正如一邑之中有上户先代下戸輸納之𩔖想當時亦有不貢者伯主正欲以此倡率之既結得諸侯又能上尊天子守命共時之謂信七年共時便是時見曰㑹此只説㑹耳徳刑禮義無國不記七年無國不記見得諸侯國皆有史如杜氏謂汲冡紀年篇有書魯晉事𩔖春秋者可見子華由是得罪於鄭七年子華既是太子了何故却使齊伐鄭盖子華急要簒國為君耳如我以鄭為内臣一句可見襄王不𤼵喪而告難于齊七年懼王子𢃄之黨盛凡夫人不薨于寝不殯于廟八年禮記檀弓虞夏商周之殯皆不在廟至此却在廟何故此制度當考宋公疾太子兹父固請曰目夷長且仁君其立之八年襄公本當立何故讓子魚盖襄公只是要着意做好事底人雖常好名而實不稱如泓之戰不禽二毛之事可見宋桓公卒未𦵏而襄公㑹諸侯九年襄公在喪何故㑹諸侯如此速盖宋是顯顯之國如齊侯属孝公於宋襄公齊桓公所以獨托於宋者亦是見當時顯顯者只是宋故襄公此㑹不得不自出來然此㑹亦當時盛㑹王使宰孔賜齊侯胙九年晉踐土之盟不賜而齊桓葵丘獨賜者何故盖周以脤膰之禮親兄弟之國文公是同姓是所當賜者故不書齊是異姓本不當賜王特地加厚于齊所以見得是異禮天子有事于文武九年天子有事于文武便是祭祭是大事故直謂之事如洛陽重牡丹故直以牡丹為花若其他花卉各自有别名名之宰孔先歸九年宰孔何故先歸盖宰孔止與㑹不與盟盟者自不信而後有盟宰孔所以不盟者不敢以不信待天子之臣東略之不知西則否矣九年盖當時三方皆徃了只有東邉未去非久必去西既㑹了必不復來其在亂乎君務靖亂無勤于行九年此是指晉言之盖説與晉當時齊已不來但自歸去察其國之亂務靖安之足矣不必徃齊也晉之亂便是荀息奚齊事獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫九年當時申生已殺重耳夷吾皆在外只有奚齊卓子二人在裏面此所謂諸孤正指此兩人言也耦俱無猜九年俱謂送徃事居兩事無猜謂無猜疑嫌忌言我無愧于生者死者里克将殺奚齊先告荀息五年里克既要殺奚齊何故却先説與荀息則甚且荀息伐虢伐虞亦不是無謀底人受遺托孤亦不是無權底人盖當緣民心離散衆意不属於奚齊卓子荀息所以做不得然克所以先告時亦見得風俗尚厚詩所謂斯言之玷不可為也荀息有焉九年此亦是一節可取大槩亦不濟事齊以諸侯之師伐晉及髙梁而還九年何故只止髙梁便還盖齊侯是伯主了一則恥於不能大救二則又力不能及而秦晉又强所以只略行便歇令不及魯盖當時去伐晉時亦無甚諸侯從他齊隰朋帥師㑹秦師納晉恵公九年夷吾入時重耳何故不入盖檀弓所載晉獻公之喪秦穆公使弔公子重耳公子重耳對客曰君恵弔亡臣重耳身喪父死不得與于哭泣之哀以為君憂父死之謂何或敢有他志以辱君命觀此見得夷吾是賂人了求入重耳是人勸他入却不入二人之賢否於此可見况當時謀臣重耳所偕是舅犯之徒夷吾是郤芮之徒人品髙下亦甚遼逺秦伯謂郤芮曰公子誰恃對曰臣聞亡人無黨有黨必有讎九年此二句言其易納欲秦助恵公夷吾弱不好弄能鬬不過九年此數句言其可以為君見得古人語言大率婉順郤芮是當時謀臣大計策雖未了得若此等言語亦㑹説得好是吾利也九年此句如鄰之厚君之薄也一般晉侯殺里克以説十年頴濵蘇氏曰晉獻公殺其世子申生而立奚齊國人不順其大夫里克殺奚齊卓子而納惠公春秋皆以弑君書之矣恵公既入而殺里克以弑君之罪罪之春秋書曰晉殺其大夫里克稱人以殺殺有罪也稱國以殺殺無罪也里克弑君而以無罪書此春秋之微意也奚齊卓子之立以淫破義雖已為君而晉人不以為君也既以為君則君臣之名正故里克為弑而國人之所不君則弑必不免里克因國人之所欲立而立之則里克之罪與宋華督齊崔杼異矣雖使上有明天子下有賢方伯里克之罪猶可議也恵公以弑得立而歸罪於克以自説於諸侯其義有不可矣然恵公殺里克而背内外之賂國人惡之狄人怨之兵敗于秦身死而子滅至其謀臣吕甥郤稱冀芮皆以兵死盖背理而傷義非獨人之所不與而天亦不與也此論極是狐突適下國遇太子十年論來本無此理只緣民心不附属夷吾故民或訛言如此此亦将亡之兆七輿大夫十年七輿即周禮侯伯七命貳車七乗晉只是獻公時王命一軍為晉侯獨上軍有之正義謂下軍亦有恐未必如此所謂欒盈下軍七輿恐只是前時上軍之制襄公二十五年下車七乗亦略可見左行共華右行賈華叔堅騅歂纍虎特宫山祁十年左行何故止一人右行何故有六人當攷秦晉伐戎以救周十一年秦晉伐戎以救周齊何故却不來盖晉近周已自先去了齊既見自有晉理㑹了便不去以此見桓公胷中畢竟寛大與晉文不同如秦伯師于河上将納王晉侯辭秦師而下是汲汲要争去理會此皆是不及齊桓處王以上卿之禮饗管仲曰余嘉乃勲應乃懿徳謂督不忘徃踐乃職十二年應是報應之應督謂厚之意踐乃職者謂位雖是下卿而職則秉齊政今還以職尊之故杜氏曰不言位而言職者管仲位卑而職齊政故欲以職尊之也齊侯使仲孫湫聘于周十二年仲孫湫是齊之賢者以閔元年省魯難之事觀之見得齊國出使有人可以見齊之使能如此秋為戎難故諸侯戍周十三年戍有兩般有每嵗更戍有待事已而久戍者觀采薇之詩曰昔我徃矣楊柳依依今我來思雨雪霏霏此是遣戍于春時至次年更留防秋而歸則冬時矣乃每年更戍之制也觀勤戍五年之語則直待難平事已而方得返不比常戍有更代之期也令戍周夷難未己只得且戍其國又須自以時遣人代之百里奚論與晉糴十三年子桑與百里奚所言不同子桑之言利害固是但所言之意又不如百里奚資質渾厚百里奚秦穆公兩人資質皆好觀其言可知然穆公皆用百里奚此其所以興自雍及絳相繼十三年此是舳艫相銜而徃諸侯城緣陵而􅁶杞焉十四年遷杞便與遷邢不同此見齊桓公自葵丘㑹後驕心生凡事皆不如前時
