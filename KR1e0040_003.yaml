body:
  text: 左氏傳續説卷三宋吕祖謙撰莊公築王姫之館于外元年莊公之立桓公見殺於齊則莊公之於齊有不共戴天之讎而不能以復讐為念前輩論之詳矣然又須識得莊公之要領王姫歸于齊魯絶之而不與主婚義也而魯則畏齊之強而不敢絶欲與之主婚內則畏清議而不與外則畏齊之見討而不敢絶其君臣之間宛轉商量一箇兩不相妨底道理故築王姫之館于外三傳之説不一然皆未必是凡天下之事不知夫不共戴天之仇義不可與者未足為憂既知之而求所以委曲回互者深可憂蓋其不知者良心一朝頓回則其發不可禦既知之而欲立一名字求以委曲回互亦終於此而已矣父子之間天屬之恩莊公報齊之心宜如火之必熱如水之必寒如手足之必捍頭目安可以委曲安排回互使之兩不相妨至如伐郕一段亦然莊公本自畏齊而曰我實不德齊師何罪皆是立一箇名字文飾之此其所以終於不振穀梁謂主王姫者必自公門出注云公門朝之外門主王姬者當設几筵于宗廟以俟迎故在公門之內築王姬之館又曰於朝則已尊於寢則已卑為之改築外變之正也仇讐之人非所以接婚姻也衰麻非所以接辨冕也此同姓主婚之制而魯人改築之意也然天子之女下嫁諸侯何以必魯主之而天子不自主蓋天子不當與諸侯為敵體是故天子嫁女乎諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之魯於周為同姓故使主之然莊公是時於齊有不共戴天之仇莊公非不知道理去不得只緣力弱不能自強眀告天子誓與齊絶恐恐然懼為齊所侵伐只顧些少利害忘了父子大義却説中間做委曲底道理大抵為人最戒如此設辭做事極是害人寧是不知義理底人一旦覺時尚有改悔時節楚武王荆尸授師孑焉以伐隨四年楚初稱荆詩所謂荆楚便是尸乃是楚陳名孑亦鎗屬蓋楚陳所利也大抵陳中自有利于長兵有利于短兵弓矢利逺是謂長兵孑只利近故為短兵此亦見始參用孑為陳處將齊入告夫人鄧曼曰余心蕩四年此見得當時尚知古人致齊之義蓋楚武王平日是攻城略地底人豈復知正心誠意之理然欲入廟之初猶知所謂齊者蓋齊是精神會聚之時于此散蕩覺不收斂故驚而入告諸夫人耳所謂將齊是欲入齊而未齊之時故可入告使其已齊之後則不可復見夫人矣後世徒有齊之名而不知齊之實故雖當此時而亦不復知所謂蕩矣王遂行卒于樠木之下四年武王既死何不便去發喪却除道梁溠營軍臨隨何故此是為竒兵伐他處蓋軍中既無主帥則事變易生不如此隨必反追楚師故楚人到此只得向前至莫敖以王命入盟隨侯請為會于漢汭而後無可慮蓋漢汭是楚地既入楚地則事始無他虞矣紀侯不能下齊以與紀季四年紀侯能全身逺害為宗社計亦不為不賢比之御璧靣縛者逺勝王人救衛六年朔不當立王救之是也夫能周位者必度于本末而後立衷焉不知其本不謀知本之不枝弗強詩云本支百世六年此正是左氏論大凡立君之法非是斷此事之是非夫所謂本者指適子而言所謂支者指庶子而言今以適子謂之本此固易見苟無適子而能于庶子之中擇其最親者亦謂之本以庶子之最親繼先君之正統此止可謂之本而又未可謂之知本所謂知本者謂又於羣公子最親之中舍其不賢者擇其賢者而立之始謂之知本詩云本支百世周之所以能長久者只緣是知這箇本支道理楚文王伐申過鄧騅甥聃甥養甥請殺楚子鄧侯弗許還年楚子伐鄧十六年楚復伐鄧滅之六年夫鄧之亡不在於不殺楚子而在於不能自立紀綱修治甲兵以整頓一國所以卒為楚所滅向使前時從三甥之言殺了楚文王又安知後來别無一箇楚文王出故不能自強其國而徒然不從人言者亦所當戒恆星不見七年齊桓公將霸乃天下一變故天象先見夏書曰臯陶邁種德德乃降八年夏書臯陶邁種德德乃降此正今臯陶謨之文而杜氏謂逸書者何故蓋緣秦火之後唯伏生口授尚書傳于世如益稷大禹謨泰誓諸篇世皆不得而有自孔安國古文尚書始皆有此數篇當時但隱藏于民間未甚公行于天下至東晉時始盛行于世杜預是西晉時人猶未得見之故曰逸書如楊子雲以酒誥為空言相似亦是未曽見也邁逺也降及也言德非可頃刻問求速效必須逺播其德乃能及民君子是以善魯莊公八年莊公不能報父之讐而却立名字要委曲回護過了此政與築王姬之館于外相似左氏不眀大義却徒取他一節此左氏于此等處猶有欠處齊無知弒襄公八年看齊襄公須看得每舉而每得志是其所以速襄公之死觀其當時淫侈無度肆行不道無不得志如一滅紀則紀侯大去其國才以王人伐衛衛使服才欲滅郕郕便降至于欲會魯侯則魯侯至欲要薑氏則薑氏至每舉而每得志惟其得志之頻故所以為死期之速宜乎卒蹈無知篡弒之禍也冬十有二月齊侯遊于姑棼遂田于貝丘見大豕豕人立而啼八年此亦是大豕之常態耳不足深怪緣齊侯有疑心所主不定故見得如此誅屨于徒人費八年以齊之富強豈無一屨之供而必責于徒人費者蓋求之倉卒所以偶無耳石之紛如死于階下八年以襄公之無常本無德以感人而紛如孟陽之徒皆為之死者何故蓋襄公平日不能親任賢者而小惠所懷者止此等人雖千百為死亦無益于事此見得襄公所以為襄公處襄公立無常八年不必只是政令無定凡事皆然如與文薑會處皆是無常底事鮑叔牙曰君使民慢亂將作矣八年既使民慢則雖殺人而人亦不畏鮑叔牙奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔八年鮑叔奉小白出奔于將亂之初管仲奉子糾出奔于已亂之後以仲之才論之豈不及鮑叔而叔何故如此知幾仲何為而不能知幾蓋叔素知小白之賢平日保護故其輔佐出于誠所以未亂而先奔子糾平日亦只是尋常底人耳而仲之佐糾又非其本意而出于君命故亂作而後奔如仲射小白中鈎其于事子糾之義亦盡矣仲之不死于子糾亦未為傷義公及齊大夫盟于蔇齊無君也夏公伐齊納子糾九年桓公自莒先入與齊大夫盟在春間至夏方納子糾何其遲緩如此蓋二公子各有黨魯欲在中間調護勢亦甚難故遲了許多時節鮑叔曰管召讐也請受而甘心焉九年鮑叔之意正在生得管仲所以如此説管仲亦知鮑叔必不殺他故特地請囚至堂阜而後稅者蓋堂阜是齊地至堂阜而稅則魯人不疑不然魯人知之則未必不復為魯所奪也管夷吾治于髙傒九年髙傒齊之上卿治是治政之才過之公將戰曹劌請見十年劌平時初未嘗仕于魯何故却自出來為之謀蓋魯是劌父母之邦前年乾時之戰社稷幾不可保此一戰若再大敗則社稷必危劌不忍坐視父母之邦至于殄滅其勢不得不自出來向使大勢未到極處時劌亦未便自出以此見乾時之戰是魯大敗處况當其時齊之興勢方強而魯之在位者又皆非深謀逺慮之士劌于此不出則魯未必有復存之理故自此長勺既勝之後魯却用曹劌于朝觀諌觀社處便見肉食者鄙未能逺謀十年此指當時在位者耳然古者肉食亦自有制唯貴者老者耳如食肉者皆與食肉者無墨之類皆是説貴者如孟子云七十者衣帛食肉是老者皆食肉古人儉約非如後世奢侈諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕此皆是古之制小惠未遍民弗從也小信未孚神弗福也十年曹劌之言正與季梁之諌相似蓋古人只理會神民如周禮所説賔祀處皆是此兩事春秋去古未逺尚知此理自秦漢而下鮮能識此者忠之屬也十年言亦是忠之一端耳觀此數條亦似迂濶而不切于戰然以理論之可謂得其要處大扺得民之心便是得軍心然莊公素不逹此何故便能悟其言蓋劌自前面鋪敘有來厯所以見得眀白齊人三鼓劌曰可矣十年齊人三鼓而魯不鼓非是任齊自來進兵蓋魯前面遮護截定了後全不動齊師敗績公將馳之劌曰未可下視其轍登軾而望之十年軾是中車之軾板劌所以登軾而望之者蓋軍敗有兩般有果敗者有詐敗者詐敗者旗雖亂而行伍進退之節初未嘗亂乃是變陳特偽亂其旗以誤敵耳自非真知兵法者不能識之劌正恐齊人復有變陳設伏兵以誤我故登軾而望之故曰夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之臧文仲曰宋其興乎十一年杜注謂文仲魯大夫蓋當時臧哀伯已為魯卿故文仲止得為大夫何故蓋一族中只一人為卿故哀伯卒後文仲始為卿注曰魯大夫所以别為卿者也禹湯罪已其興也勃焉桀紂罪人其亡也忽焉十一年如五子述大禹之戒作歌曰豫視天下愚夫愚婦一能勝豫一人三失怨豈在眀不見是圖湯以六事自責之類皆是禹湯罪已處桀悔不殺成湯于夏臺紂則曰我生不有命在天之類皆是桀紂罪人處既而聞之曰公子御説之辭也十一年此是閔公對他如何見得是御説之辭蓋春秋時辭命有自君出者亦有臣為之者論語所謂為命禆諶草創之世叔討論之此是出于臣所為者蓋辭命安危之所係不是臨時漫對他必先子細與人商確而後告之石祁子論歸猛獲十二年宋人請猛獲于衛衛人欲弗與石祁子曰天下之惡一也惡于宋而保于我保之何補此一節是以道理論得一夫而失一國與惡而棄好非謀也此一節是以利害論此數句當作兩節看方分眀惟天下之惡一也此句最道得好非有識見底人不能説得出觀檀弓所載石駘仲卒無適子卜庶子為後皆欲沐浴佩玉石祁子曰孰有執親之喪而沭浴佩玉者乎不沭浴佩玉以此見得石祁子自幼年便别了故至此所以有這般議論盟于柯十三年齊服魯當時宋與魯最近齊而強故先事宋魯宋魯既服即有鄄之會齊始霸矣齊請師于周單伯會之十四年是時單伯帥師以往其出兵多少之數雖不載於經傳然亦可以例類如晉平丘之會請帥王賦元戎十乘以先啓行以此看來兵亦不多蓋霸者只欲假王師之名耳非真欲資其力也鄭厲公自櫟侵鄭及大陵獲傳瑕傳瑕曰苟舍我吾請納君與之盟而赦之六月甲子傳瑕殺鄭子及其二子而納厲公十四年傳瑕初間許納君之盟不過一時間勢所迫耳是謂要盟及至入國之後背之可也然必去弒君者何故蓋當時風俗以盟為重才與之盟則不得不踐其言唯識道理者然後能自區處故所謂背􅉀者又自有兩等人有般是狡猾底人反覆無信者有一般是識得道理逹時變者如孔子蒲盟是也傳瑕殺鄭子十四年稱鄭子居喪故也有在喪稱子有貶而稱子如宋子鄭子之類皆在喪而稱者如杞子自侯而伯而子者乃貶爵而稱厲公殺傳瑕十四年厲公殺傳瑕與晉惠公殺里克相似上大夫之事吾願與伯父圖之十四年上大夫便是卿周禮才書卿了便無上大夫止書中大夫下大夫春秋之初周制尚在到後來如晉有上卿又有上大夫便見得制度壞處厲公入遂殺原繁十四年自當時觀之厲公之問甚曲原繁之對甚正何故厲公才入却便殺了原繁蓋原繁與祭仲之徒皆莊公舊臣又有權謀厲公若不去他時終放不下鄭有祭仲原繁泄駕曼伯之徒故後來鄭常多謀臣如衛有石碏故後來有蘧伯玉之徒楚滅息入祭十四年楚伐鄭十六年當時齊雖霸然如楚如晉雖妄侵伐而力未能正故置而不問其後強盛則晉楚自服譬如奕棊渠自知所先後也君子曰商書所謂惡之易也如火之燎于原不可嚮邇其猶可撲滅者其如蔡哀侯乎十四年大扺事須自小處便遏絶了乃好如蔡弗賔初間只是小事後來至於伐蔡以獻舞歸又至于滅息這便不可撲滅了使蔡初間便遏絶了時終不至于喪身失國齊人執鄭詹十七年鄭詹至晉文公時猶在此蓋鄭用事底臣然前年鄭既服齊今却不朝何故蓋鄭介於齊楚兩間恐楚來伐故不朝齊遂因氏領氏工婁氏須遂氏殺齊戍十七年此皆是遂國之大族以此見得氏族得力處秋有􅈮為災也十八年大凡春秋所書皆是本地素無有而忽有焉者則書如有蜚有鸜鵒之類是也楚子禦之大敗於津還鬻拳弗納十九年夫勝負兵家之常而楚子一敗之後鬻拳何故便不納蓋楚正是圖霸之𥘉不是尋常時節一小不勝則聲𫝑不張羣蠻小國必乘𫝑共起而叛之此鬻拳所深慮也况此一敗又非是小小不勝鬻拳如何不出來強做得此又見楚方興時便自有這般人觀其以兵諫楚子便見鬻拳乃是朴直木強底人忠于國家不知其他只是不曽識得道理左氏謂之愛君此亦是左氏不明得大處故杜氏之注云眀非臣法此一句雖非是左氏本意然杜預却以此一句救左氏之失處蒍國邉伯石速詹父子禽祝跪作亂因蘇氏秋五大夫奉公子頽以伐王十九年惠王致亂之因只自貪裏來王子頽享五大夫樂及遍舞鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也姦王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也二十年王巡虢守虢公為王宫于玤王與之酒泉鄭伯之享王也王以后之鞶鑑豫之虢公請器王與之爵鄭伯由是始惡于王二十一年王無事時于虢為厚于鄭為薄有事時鄭每先出力扶持虢却全然不見大凡此處正是事之緊要處上自天子下至庶人皆要識得洛誥曰汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮周公告老只以此一件事戒成王蓋此却不是容易底事看敬識兩字便見得如此難須子細辨别其果是誠意來享又須辨别其是不誠來享其間有享雖多儀誠意不及此與不享者同若不能用志辨别其真偽以誠意來享者如此不誠意來享者亦如此則天下何緣復來蓋是非不眀則并其是者皆亦不誠矣享且如此則其他事事如此如虢築宫于玤此正是享多儀儀不及物者惠王無事時都被他以間禮數取奉了不特是此一事每每如此鄭却是得力可倚仗底人王却不曽識得此周室之所以衰正緣如此顛倒了譬如朋友中無事時以酒食笑語相追逐底人平時甚好及至有患難時却便都不見至于平時冷淡底人雖若不滿人意患難時却十分得力故學者須是知所親疏陳人殺其太子禦冦陳公子完與顓孫奔齊二十二年陳人陳宣公也陳公子完是厲公躍子史記謂厲公他之子非也當以釋例為正陳完奔齊二十二年齊始霸而亡齊者已至頗如寒暑相代夏至一隂生冬至一陽生也臣卜其晝未卜其夜二十二年此是真箇以龜卜蓋古者大事必卜今以臣飲君亦大事故卜懿氏卜妻敬仲二十二年左氏所載筮易之辭如此詳者何故蓋左氏正當田氏篡齊之時故大意亦以為田氏所以強盛者亦非偶然其數如此庭實旅百二十二年庭實旅百楚子入享于鄭時孟獻子亦言之禮記曰庭實旅百何為乎諸侯之庭以此見諸侯不當用此奉之以玉帛天地之美具焉二十二年玉帛正是天地之産天産是動物地産是植物如幣帛之類皆出于蠶故為天産金玉之類皆藏于地故為地産公如齊觀社二十三年觀社是觀兵會以制財用之節二十三年制財用之節如平丘之會鄭子産爭承是也諸侯有王二十三年王是王事是朝會征伐之事晉士蒍又與羣公子謀使殺遊氏之二子士蒍告晉侯曰可矣二十四年前年既謀譛富子而去之今又殺遊氏之二子蓋富子是有力者遊氏二子是有謀者先去有力者次去有謀底人然後可以下手故士蒍告晉侯曰可矣始結陳好二十五年蓋十九年陳與齊人宋人伐我西鄙至此始結好看左傳如這般處便考他前後事迹曽有甚斷絶處方見得來厯子細如前無事可考時只是未曽往來此是看左傳一條例夏同盟于幽陳鄭服也二十七年此是大節目蓋已前皆服楚今始服齊晉侯將伐虢士蒍曰夫民讓事樂和愛親哀喪而後可用也二十七年讓事如班白者不負戴於道路之類樂和如出入相友守望相助管子內政所謂夜戰聲相聞晝戰目相接其歡欣足以相死之類哀喪內政所謂死喪同恤禍災共之之類王使召伯廖賜齊侯命且請伐衛二十七年惠王恐使齊侯不動故先賜齊侯命此見周室所以衰弱處然齊侯數以王命取賂而還亦只是略略應命不是十分著力當時管仲尚在而齊侯取賂何故蓋桓公做事管仲亦有調護不得處於此可見驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公曰若使太子主曲沃而重耳夷吾主蒲與屈使俱曰狄之廣莫於晉為都二十八年此所謂使俱曰者使國人皆如此説杜注謂使二五俱説恐説不順蓋離間骨肉底人須要彌縫不覺羣公子皆鄙唯二姬之子在絳二十八年蓋情踈則易離情親則難間楚令尹子元欲蠱文夫人為館於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備也二十八年蓋舞有部曲行伍之次便是陳法樂記曰天子夾振之而駟伐盛威於中國也分夾而進事蚤濟也注云夾振者王與大將夾舞者振鐸以為節也武舞戰象也每奏四伐一擊一刺為一伐分猶部曲也舞者各有部曲之列又夾振之者象用兵務於早成也觀此可見舞之制度故曰先君以是舞習戎備也秋子元以車六百乘伐鄭入于桔柣之門縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人將奔桐丘二十八年是時楚師既遁而鄭自有備何故却要奔蓋楚此一戰亦不是小戰觀子元以車六百乘伐鄭一句可見城濮之戰春秋之大戰也不過七百乘此六百乘計二千四百騎車其𫝑最強盛此所以欲奔鬬榖於菟為令尹自毁其家以紓楚國之難三十年當時子元既以貪淫亂楚故楚遂擇亷潔者繼之左氏記此事在子元為令尹下見得須當如此如唐肅宗既見元載以貪敗故特用楊綰其事正與此相似齊服楚所以甚難者以有子文為令尹也正如諸葛武侯乃與司馬懿為敵所以不能成功耳齊侯來獻戎捷三十一年獻捷亦有兩例如襄八年邢丘之會鄭獲蔡司馬公子夑鄭伯獻捷于晉親聽命此是獻其囚謂之捷二十五年鄭伐陳陳侯使其衆男女别而纍以待子産數俘而出此是獻其功而不獻其俘今齊侯來獻捷是獻其俘也凡諸侯有四夷之功則獻于王王以警于夷中國則否三十一年此句最要看蓋中國而至于用兵此是甚不得已蓋中國非叔父則伯舅之國也宋公請先見于齊侯夏遇于梁丘三十二年大凡會盟中欲先相見者皆是先欲自謀二國私議如隱八年齊侯將平宋衛有會期宋公以幣請于衛請先相見秋七月有神降于莘三十二年古者尊敬神眀才在後世便是差錯了意思自應如此就此一段論之如內史過議論尚有可取未至全然差舛在雩講于梁氏女公子觀之圉人犖自墻外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門三十二年莊公既知犖之罪可殺而終于不殺何故蓋當時只不合説過了便休天下事當做便做切不可如此説了便休極是害事然莊公當時家法不正習以成風雖圉人犖與之戲亦不深以為怪蓋魯自文薑以來禍亂既作初間其夫桓公見弒其後二子叔牙慶父見殺及其二孫子般閔公見弒又及其子婦哀薑以宗族言之則閨門之內禍亂如此以名義論之既弒三君又殺二卿此皆緣文薑淫亂所以生出許多事以此觀之曲禮內則所以纎􅊖閨中事者非是繁碎成季使以君命命僖叔待于針巫氏使針季鴆之三十二年成季殺叔牙而不殺慶父何故蓋兄弟間至于不得不殺者此是甚不得已安可又殺慶父但去其一人則其黨自孤矣子般即位次于黨氏三十二年古者君薨太子即位皆有喪次如顧命所謂迎子釗于南門之外延入翼室恤宅宗翼室即次也子般所以次于黨氏蓋欲倚外家以為助耳閔公天若祚太子其無晉乎元年士蒍勸申生去至與其及也義已足矣何故下又説天若祚太子其無晉乎蓋緣申生本是慈祥底人有眷戀不果之意士蒍是當時謀臣見得利害明故其辭若此畢萬筮仕于晉元年左氏載畢萬筮辭如此詳者何故蓋左氏正當三晉強韓魏盛時故推原其始而言之如戴陳敬仲事相類亦如王莽武后時多獻符讖之類衛懿公與石祁子玦與寧莊子矢使守二年衛侯不命以言而以物何故蓋古人大抵以物為信狄人囚史華龍滑與禮孔以逐衛人二人曰我太史也實掌其祭二年如周禮太史之職祭之曰執事以次位常蓋祝史皆掌祭如今此制尚在天地神祇位板皆太史局掌齊人使昭伯蒸于宣薑二年蓋衛惠公即位時正是齊襄公時所以有此齊侯使公子無虧帥車三百乘甲士三千人以戍曹二年古者一車甲士三人論來三百乘止合九百人而今何故却有三千人蓋此甲士却又非在車上者乃别是車外步兵緣其國中長于步兵故齊所以增了許多後來晉伐狄亦毁車為行皆是此類歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩二年此一段最要看自常人看來祭服門材魚軒皆是間慢底物事不知此却要緊緣衛國既為狄所滅全不成模樣所以略與他做一國大綱體面乘馬是人君出入須要儀衛祭服是奉社稷須用禮儀牛羊豕是與他做畜産之本門材是與他為外面體面魚軒重錦皆夫人車服之用事事不可缺此是齊桓公識得立國規模所以纎息備具以此見左傳學者最不可不細看此乃有用之書鄭人使髙克帥師次于河上二年髙克何故在河上蓋當時狄已滅衛聲勢大了鄭須預為之備蓋衛在河北鄭在河南晉人使太子申生伐東山臯落氏二年申生伐東山當時衆人無不知太子之危若從衆人之言逃之他國或可以免驪姬但欲得太子之位其子得立則亦已矣太子居深宫中難得過失則難讒譖故驪姬常使之出外將兵無功固可加罪有功則又以為得人心
