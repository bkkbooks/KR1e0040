body:
  text: 左氏傳續說巻七宋吕祖謙撰宣公晉人討不用命者放胥甲父于衛元年河曲之戰趙穿與胥甲俱敗軍謀何故獨放胥甲父此見得趙宣子私親處當時所以不便誅他時正為是親不敢行法耳自晉文公不殺魏犨而止殺顛頡此端隙已開然晉文公猶是國君趙宣子乃是元帥秉國之法豈可徇私意此所以成趙穿弑靈公之事也楚子侵陳遂侵宋元年楚侵陳遂侵宋蓋陳與宋壤地相接鄭伐宋囚華元二年元是元帥華元被執此是大敗將戰華元殺羊食士其御羊斟不與二年大抵事須一一㸃檢得致方可羊斟不與在元亦不為無失然華元之意正以親宻待了羊斟所以不與者乃是親之也羊斟却是簞食豆羮見於色底故及戰乃特地馳車入鄭而使元為鄭所獲於此亦見得華元平時觀人亦未仔細此等人一毫不到便易生怨平時亦有可見處豈可復置諸左右此是華元之失也然古人所以多以羊羮賜人者亦以羊羮賤者所常食故多賜之如戰國時中山君饗都士大夫司馬子期在焉羊羮不遍司馬子期怒而走於楚此亦見因羊羮而致忿者但羊斟是緣親宻而不及子期是疎逺而不及華元逃歸二年華元當時所以能逃得歸時葢元自有此等才能觀華元夜入楚師登子反之牀一段便可見華元逃歸立於門外告而入見叔牂曰子之馬然也二年大棘之敗羊斟之罪也羊斟先歸宋何故不聲其罪而討之葢大棘之戰宋師大敗宋但見華元被囚而亦不知是御者馳主將車入鄭乃所以敗之之由故羊斟雖歸而宋無人知之所以不討其罪然自華元初歸之時首正典刑誅羊斟以謝國人亦不為過觀元反告斟曰子之馬然也此亦是華元一時間意思葢大敗之後但當自責故以温辭慰勞所以安反側之心此也是華元一時間意思華元為植巡功二年植正是大司馬司馬大役屬其植葢植在軍則謂之將帥有大役則謂之植使其驂乗謂之二年亦是作歌以荅之牛則有皮犀兕尚多二年周禮冬官函人為甲犀甲七屬兕甲六屬合甲五屬犀甲不是犀角之犀只是今水牛之類合甲是合兩皮以成者古時只用皮甲自戰國以後方用鐵甲華元曰去之夫其口衆我寡二年此見得華元知為人上之大體處使婦人載以過朝二年所以使婦人載葢不欲令人見耳如特地示威於衆時必不使婦人載也㑹請先二年葢士㑹言為輕在宣子是秉政大臣如不行時便無可説故士㑹請先時特地留一著在後三進及溜而後視之二年古之君臣相見甚易亦無時不比後世分嚴詩曰靡不有初鮮克有終二年士㑹引詩靡不有初鮮克有終者葢其意謂事寧可使無始而有終不可使有始而無終若靈公初雖不君一旦能改時便是有終君能補過衮不廢矣二年葢補過本是人臣之職今君若自能之尤善故士㑹特地褒奬他鉏麑退觸槐而死二年柳子厚非國語中論鉏麑事謂宣子為政於晉如此分明鉏麑豈不知之特待假寐而後始不殺是不赦其大徳而赦其小節也要不必如此泥葢俠士恃勇唯君所使初不問其人之賢否與其當殺不當殺一向恃力以前耳到得後來一見而便囘轉了意思此亦俠士所見多如此過三爵非禮也二年過三爵不必如禮中所謂三爵但提彌明見事急所以仗正義如此説正如樊噲脱沛公一般盾曰棄人用犬雖猛何為二年看趙宣子此言已全無君臣恩意了當時靈公雖無道然使賢者處之當不如此樂毅上燕昭王書儘好宦三年矣二年宦是學做宦底事業既而與為公介二年公介是宿衛底人不告而退二年不告而退却知是靈轍者何故葢當時為公介時必有姓名後來訪問得之太史書曰趙盾弑其君二年趙盾弑其君太史既如此書諸侯之國史皆從晉史如此書然當時趙盾亦不為無意使盾無意時反必討賊可也焉可復使趙穿迎公子黒臀於周左氏載孔子曰越境乃免縱使越境而反不討賊時亦不可况不越境乎此一段載夫子之言傳聞差了如為法受惡一句最訛了本意然齊崔杼殺齊太史而盾安受之亦見宣子終是别看前時盾説棄人用犬雖猛何為己自有無君之心觀太史所言四句可見宣子分明弑君孔子曰五句恐非夫子之言豈有弑君之後纔出竟便可免罪驪姬之亂詛無畜羣公子二年驪姬詛無畜羣公子自成公方改更晉文公尚依驪姬制度何故蓋文公當時亦因循過了不曽整頓成公雖改驪姬之制立公族以總諸國子然亦有不盡處依舊親近者有在外底疎逺者却在内徃徃改制之時文襄所出在外之子弟不曽請歸來故有流離在外者其法竟不及自成公始公族大夫如成十八年晉悼公使荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟又有掌公族大夫者又統管其餘公族大夫餘子公行之屬國語祁奚曰公族之不恭公室之有囘内事之邪大夫之貪是吾罪也此是掌公族大夫職事此皆是宿衛入宫中者最甚親近成十六年晉伐鄭欒范以其族夾公行此處可見是近國語韓獻子老使公族穆子受事於朝辭曰厲公之亂無忌備公族不能死穆子以無忌處公族而不能死以為深恥此猶可見其處親近之地所以為深媿也成公稍改得亦未有盡處依舊適子得為君者方得在内其有不得為君者猶在外文襄所出之子弟亦不曽歸得想當時只是成公一派得歸又宦其餘子亦為餘子其庶子為公行二年餘子在周禮則統謂之士庶子故士是適子庶子是妾子左傳則分而言之故以餘子為適子之弟以庶子為妾子周禮小司徒凡國之大故致餘子鄭注去餘子卿大夫之子當守於王宫者也正義曰致餘子與太子使宿衛也夏官諸子國有大事則帥國子而致於太子唯所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗征此國子不屬之司馬而屬之太子何故盖古者太子與卿大夫之子同在學如國語宣王欲得國子之能訓諸侯者樊穆仲曰魯侯肅恭明神而敬事耉老賦事行刑必問於遺訓而咨於故實不干所問不犯所咨王乃命魯孝公於夷宫此皆是諸侯子弟同在學者又如楚世家曰當周成王時楚子熊繹與魯公伯禽衛康叔子牟晉侯􅝂齊太公子吕伋俱事成王此又可見太子素與諸侯之子弟相處朝夕習熟故後來諸侯之子立為諸侯時事太子為君此正是封建諸侯之本不如後世徒然封建且平日在學時必先擇其可以為諸侯者則他日立為諸侯有不可立者則不立也又凡國有大事天子親御六師時天子既與公卿大夫同出在外則太子却又與公卿大夫之子弟同守王宫於内此内外相維不可拔之根基此皆三代制度學者所宜深考君姬氏之愛子也二年君姬氏者盖周天子之女稱王姬諸侯姬姓之女稱君稱氏趙盾為旄車之族二年旄車之族注謂公行恐不應降在妾子之列但盾既讓括為適子故已之子居次而已鄭穆公卒三年鄭穆公事左氏所以詳載者葢鄭自穆公以後七穆之盛直至春秋末故石癸曰其後必蕃此皆是氏族左傳多留意氏族氏族是一件大事唐時尚有人專平生之功理㑹氏族者盖緣難理㑹後世氏族紊亂亦難盡考蓋有公卿數世之後又有轉為皂隸者公及齊侯平莒及郯四年郯與莒並徐州地亦相近當細考之楚人獻黿於鄭靈公四年楚大國也却曰獻正如君有饋焉曰獻相似古人不以此一字為重黿是海物海近楚故有之靈公召子公而弗與四年此特一時之戲耳却生出大亂以此人不可以戱謔為小事子家懼而從之四年此只是失之弱大率弱最不濟事故洪範六極以弱為先令尹子文卒鬭般為令尹四年子文之後却是子玉子玉之後却是蒍吕臣以此見鬬般非正繼子文之後言子文死後為令尹耳蒍賈為工正譖子揚而殺之四年蒍賈謀譖子揚後來却又自不免蓋蒍賈畢竟是謀臣工正位次三卿位亦甚重如齊侯使敬仲為卿敬仲辭卿便使為工正他如襄九年宋使工正出車備甲兵庇武守昭五年季孫為司馬與工正書服處皆可見圄伯嬴於轑陽而殺之四年此見得越椒之族強盛處便要作亂蒍賈同為卿而若敖遽興兵輒殺之自備甲兵以師於漳澨此見子越逼莊王之急然若敖之彊已見於六卒之時王使巡師曰盡於是矣四年此是安慰士心虎乳子文四年虎乳子文正如牛羊飲食后稷之類子文之字亦取虎文之義君天也天可逃乎四年此方是分明見得大義高固使齊侯止公五年宣公弑兄而即位不正所以有鄰國之侮况魯又近齊所以從來多懼齊齊高固來逆女自為也五年諸侯之女下嫁大夫者亦有之如趙穿之類是也但不出於偪迫而強成耳赤狄伐晉中行桓子曰使疾其民以盈其貫將可殪也六年晉伐狄皆中行桓子之謀觀宣十五年桓子滅赤狄潞氏此可見始終皆出於中行桓子晉之規模當其盛時則經畧中國之諸侯及其稍衰則專攘夷狄從來如此當是時楚莊王方強晉稍弱則便去理㑹夷狄如後來伐白狄之類皆是稍衰時便去理㑹狄事以盈其貫六年貫如在繩索之貫不必作習字解其在周易豐之離六年古人論易才舉一爻論時便是言其變如昭二十九年蔡墨曰周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍无首吉坤之剥曰龍戰于野葢爻者言乎變者也聖人作易時有這一爻時便有這一爻變故左傳論易雖論本卦此爻立文而此爻便自有變爻也盟于黒壤王叔桓公臨之以謀不睦七年此是王官伯臨諸侯之例其他如王子虎盟諸侯於王庭單子盟于雞澤劉子盟于召陵皆是盖晉是諸侯之伯王叔桓公是王官之伯位却在方伯上諸侯所以欲王官伯以臨盟者盖欲假天子卿士之重以令諸侯年晉人𫉬秦諜殺諸絳市六日而蘇八年秦諜是細宻探事之人六日而蘓所以記其異有事於太廟襄仲卒而繹八年古人所以有繹祭時盖是祭之明日又復㑹以賔尸故謂之繹盖古人誠意敦厚不便蕭散故所以正祭後又有繹祭然其禮比正祭之禮則多殺鄭氏注儀禮云卿大夫既祭而賔尸禮崇也賔尸則不設饌西南隅以此薦爼之陳有祭象亦足以厭飫神天子諸侯祭於祊明日而繹有司掃室陳鼎之後乃議侑於賔以異姓宗人戒侑此是擇異姓賔之賢者以侑尸南面告於其位曰請子為侑其禮又不如正祭時甚嚴凡胙俎主人胙無體逺下尸也尸俎五魚横載之者異於牲體彌變於神也豕脀無湆於侑禮殺也主人降洗觶尸侑降不升者尸禮益殺不從也凡此類皆繹祭之儀殺於正祭之儀者也盖繹祭正如待賔而非十分如正祭故在商曰肜高宗肜日是也在周曰繹楚盟吳越而還八年吳越自此方入春秋吳越在此時只是一小國未大强盛雨不克葬八年雨不克葬當看胡氏春秋諸侯之師伐鄭十年自宣四年以後晉楚俱欲服鄭鄭遂南北兩屬此可見中國夷狄盛衰子良曰與其來者可也十一年看此一部書鄭始終謀䇿只是出於此子産所謂玉帛以待於四境惟其彊者從之與此一般令尹蒍艾獵城沂十一年令尹城沂須看處置規模土功是一件大事令尹如此亦見楚所以興處封人是周禮封人之類慮事是謀慮此事分財用是看四隅所費多少各分於四隅主事之人免臨時交亂財用是應于築城所用之物版是所築之版榦是牆中之木有司不是都統役之人此是毎處監臨底人晉卻成子求成於衆狄十一年晉求成於狄當時赤狄強盛非徳莫如勤十一年此勤謂勉力以求人轘諸栗門十一年轘周禮亦有此刑鄉取一人焉以歸謂之夏州十一年夏州如戎州相似東晉時北方人在南方者一時聚落亦各從北方州軍之號今鎮江謂之南徐州者亦緣曽聚徐州人故也且巷出車吉十二年鄭有大逵巷閭皆出車於逵道葢九逹之逵兩旁皆無居民只通商賈往來之路耳巷者乃閭門之巷各自其閭出車於巷古者五家為比五比為閭一閭各環以牆一閭共一門出入謂之閭門鄭伯肉袒牽羊以逆十二年肉袒牽羊是降底禮數如面縳銜璧之類使臣妾之十二年古者有良人有賤人如為妾時則世世曰妾以其賤也如後周滅後梁時虜其君與公卿大夫皆為臣妾徹福於厲宣桓武十二年鄭大宫世祀厲宣故當時有曰鄭祖厲王古者諸侯不得祖天子此何故却祖厲宣葢諸侯不祖天子周初制度也到春秋時亦潛僭彘子以中軍佐濟十二年泌之戰荀林父士㑹欒書之徒皆不欲戰唯彘子一人凶暴不從上令遂致䘮師論來先縠剛愎非可告語唯有殺之爾然則林父何為不殺曰春秋時却未嘗有殺軍佐之法問當初彘子獨濟自可不恤曰不然若此人剛暴一向直前䘮其偏師亦是敗也如城濮子玉中軍雖不敗左右師潰亦是敗績先縠雖獨濟却是一體事故不若大軍盡從却有幸勝之理伍參言於王十二年觀伍參言晉國諸帥一節曲折非是孫叔敖不知但叔敖國相自是知體當是時楚已自彊若能自全為上戰危事也勝負成敗繫焉伍參誚孫叔無謀渠自不知叔敖若謂伍參言於楚子者孫叔所不知此大非也楚少宰如晉師十二年觀當時楚少宰如晉師辭命亦煞商量言語甚是謙遜曰我但聞得鄭自來屬我我不知其他晉士㑹對得亦是正是就渠上對非諂也彘子專命擅改亦竟何益勝負却不在此也遷大國之迹於鄭是説要逐你出去丙辰楚重至於邲十二年以乙卯戰於邲而丙辰楚輜重始至盖楚軍制輜重常後大軍一日故無鈔擊之患若後世多不知此是以或為人先擊輜重而至於敗者多矣楚子不築京觀十二年潘黨請築武軍為京觀楚子不許看此一段楚興氣象自别或問曰楚莊不知大義如問鼎事何如曰他本是蠻夷不可以此責他但看右尹子革對楚靈曰桃弧棘矢以共禦王事便自可見自商時渠亦未嘗馴服觀詩商誦可見只是後來漸盛然後漸學中國盟㑹制度東坡作王者不治夷狄論謂秦楚流入於夷狄正是倒説盖秦楚正是夷狄漸流為中國非為夷狄也問鼎之事不必責進思盡忠退思補過十二年此與孝經事君章所説同盖是事君常道晉原縠盟清丘十二年先縠既敗後晉何故又用他主盟葢先縠是當時之卿赤狄伐晉及清先縠召之也十三年先縠召狄他亦是自見邲敗不得志所以如此惡之來也已則取之十三年論來先縠亦不至滅族言先縠自取其罪注中極好孔達縊而死衛人以説於晉而免十四年衛殺孔達以説於晉此與定十年董安于事相類皆諸侯殺大夫例説如解説之説中行桓子曰示之以整十四年蓋自邲敗之後仍舊整齊示軍容不減前日之舊使謀而來十四年是使鄭自與一國公卿謀鄭人懼使子張代子良於楚十四年此便是叛楚了蓋子良是有謀底人不留在楚則其意可見楚子使申舟聘於齊曰無假道於宋亦使公子馮聘於晉不假道於鄭十四年楚無假道於宋鄭亦見莊王邲勝之後驕心發見處假道之禮有二有君命假道者如荀息請以屈産之乘與垂棘之璧假道於虞之類有使臣假者如聘禮曰若過禮至於竟使次介假道束帛將命於朝曰請帥奠幣下大夫敢以入告出許遂受幣之類見犀而行十四年此便是以其位傳其子與見溷之類皆是楚子聞之投袂而起十四年此見得楚軍素備要去便去不是臨時旋辦若吳漢士卒常衣糧整備有變即起屨及於窒皇十四年古人平居不著屨出則履屨此處亦可見孟獻子言於公十四年孟獻子言聘而獻物於是有庭實旅百朝而獻功於是有容貎采章此皆是小國朝聘大國之禮當如此嘉淑而有加貨嘉善也淑好也若大國有喜慶典禮如納夫人之類則加貨物以聘之杜氏注謂主人答賔之禮以本文觀之皆無此意若從杜説則謀其不免一句説不通謀其不免者言小國之所以事大國如此者皆是以謀其不免致討之意看莊公二十三年庭實旅百杜注諸侯朝王陳贄幣之象此説却是伯宗曰天方授楚十五年此説未當凡事更不去做只推在天亦不可高下在心此一句若與下面數句不類然皆是含蓄之意凡事之輕重高下皆藏之在心楚登解揚樓車使呼宋人而告之十五年樓車是軍中别是有望逺之車又不是兵車申叔時曰築室反耕者宋必聽命十五年築室反耕者示為久逺之計此亦見楚子出兵久糧已盡公羊子載子反曰吾軍亦有七日之糧爾亦可見縱宋人不與之盟楚亦自退華元夜入楚師十五年杜氏謂因其鄉人而用之在兵法亦有之宋及楚平十五年子反未起間華元至亦是元脅之而與之盟不然殺子反亦不可知棄仲章而奪黎氏地十五年此非兩事恐奪黎氏地時仲章也曽諫了夫恃才與衆亡之道也商紂由之故滅十五年紂有億兆人離心離徳此是恃衆手格猛獸強足以拒諌此是恃才文反正為乏十五年此古者字體中有之盡在狄矣十五年謂狄皆有之王孫蘓與召氏毛氏爭政十五年三人皆是畿内諸侯如魯有三桓晉有六卿左氏所以載者見王室之弱晉畧狄土十五年晉之規模纔是本國強盛時專與楚為敵若楚強盛時則與戎狄為敵此是一部左傳綱領其後至魯昭公之世晉猶伐狄未已所以至三晉之強爭相侵奪亦有許多地及雒魏顆敗秦師於輔氏十五年此是伐狄還而與秦師相遇秦報河曲之役魏顆一段大槩甚好只所載夢之類亦難信晉侯賞荀林父狄臣千室十五年千室正是百乗之家蓋十家出一乗公孫免餘曰唯卿備百邑百邑共一千家此亦十室之邑非成周四井之邑如論語千室之邑百乗之家及十室之邑如鄭賜子展八邑及公孫免餘辭邑六十皆同邑是小聚春夏出廬舎之邑若周禮四井之邑則其地制皆大與此不同晉士㑹滅赤狄十六年當時晉既無如楚何却去這邊開拓亦是彊國規模晉侯請於王以黻冕命士㑹將中軍十六年見得當時上卿為元帥皆命於王大抵諸侯之正卿皆出於天子之命若次卿下卿却出於諸侯齊管仲辭上卿之禮曰有天子之二守國高在即天子所命也如漢制諸侯守相乃是天子所命餘官皆諸侯自命之七國反後餘官亦不得自命矣晉欒盈過周辭於行人曰天子陪臣盈得罪于王之守臣杜預注范宣子為王所命故曰守臣於此可見諸侯之正卿皆命於天子大率晉命中軍帥未嘗請於王此特請者何故盖以其黻冕之服也晉士㑹將中軍且為太傅十六年晉太傅與成周時三公之太傅不同何故盖三公論道經邦何嘗管事晉之太傅却聽命於上卿如趙宣子為國政時以授太傅陽子處可見又國語載叔向為太傅實賦禄皆是理㑹小事亦可見於是晉國之盜逃奔於秦十六年此是范武子徳望所感民自不敢欺他列子載斯事謂晉國苦盜有郄雍者能視盜之貌察其眉睫之間而得其情晉侯使視盜千百無遺一焉晉侯大喜告趙文子曰吾得一人而一國盜為盡矣奚用多為文子曰吾君伺視察而得盜盜不盡矣且郄雍必不得其死焉俄而羣盜謀曰吾所窮者郄雍也遂共盜而殘之晉侯聞而大駭立召文子而告之曰果如子言郄雍死矣然取盜何方文子曰周諺有云察見淵魚者不祥智料隠慝者有殃且君欲無盜莫若舉賢而任之使教明於上化行於下民有恥心則何盜之為於是用隨㑹知政而羣盜奔秦焉此事雖出於當時寓言意思却儘好成周宣榭火十六年宣榭恐是宣王之廟亦不可知婦人笑於房獻子怒十七年如榖梁所載秃御秃跛御跛皆是傳聞之過不可信獻子先歸使欒京廬待命於齊十七年凡隣國之使至節次自有許多禮數待他郤子既先歸故使欒京廬待其禮畢晉人執晏弱於野王執蔡朝於原執南郭偃於温十七年是時三子同來而晉囚之三處晉侯衛太子臧伐齊齊侯㑹晉侯盟於鄫以公子彊為質於晉晉師還十八年初間郤克銳意伐齊却到此便反是如何蓋當時晉君本不欲去伐齊而出於郤克所以畧伐便還觀十七年請伐齊晉侯弗許事可見後因魯衛請所以亦便從之邾人戕鄫子於鄫十八年邾與鄫是隣國鄫却又小於邾故邾人所以常欺鄫觀向來宋襄公時邾人用鄫子於次雎之社處可見季文子曰使我殺適立庶而失大援者仲也夫十八年觀文子意思假正義以濟其私葢欲去東門氏耳然宣叔既怒文子之言何故却又曰許請出之此葢順文子之意言子如欲去之我即為子去之看此意思則前時去莒僕之意亦不見是十分好向時博議所論是却是但太過耳大抵文子在家言之却好自魯看來却不好正如莊王在楚却好自中國言之却不好後三家專權皆是此始子家壇帷復命於介十八年壇帷有兩般古時祭鬼神時除地為壇有他般做事時亦有壇如後漢范冉傳王奐遷漢太守將行時冉乃與弟恊步齎麥酒於道側設壇以待之此亦是古制尚在者即位哭十八年即位哭是設子家位次書曰歸父還自晉善之也十八年言其出奔從容所以善之胡氏春秋一段亦當看
