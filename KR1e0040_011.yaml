body:
  text: 左氏傳續説卷十一宋吕祖謙撰定公季孫曰子家子亟言於我未嘗不中吾志也元年此見得子家子為三家所敬愛處使魯當未逐季氏之前能用子家則昭公必不至於如此子家子不見叔孫易幾而哭元年幾會也禮朝暮臨易幾者是當羣臣臨哭之後子家方哭此一假須看子家當昭公不在時如此正直泰山巖巖之氣象叔孫請見子家子子家子辭曰羈未得見而從君以出元年古者繼世為卿時方見於君見於君然後見於卿大夫當時叔孫成子尚為子弟未曽為卿故子家曰羈未得見君不命而薨羈不敢見此二句最有意何故大率君命見時便是以君命為卿而今君不曽命我見汝時則成子之為卿不知是誰命汝子家子此言雖是托辭以拒叔孫而大義凛然須子細看公衍公為實使羣臣不得事君元年此語乃是季孫當時欲叔孫見子家説子家既不與相見所以逹此説他所以説二子時蓋公衍公為是昭公子季孫要廢昭公之子而立公子宋故説二子之罪欲使之不得立子家子曰若立君則有卿士大夫與守龜在元年子家謂立君一事須合人謀又須合天理方可不可以一時私意廢立昭公既在外死須立他嫡子方得若羈也則君知其出也而未知其入也元年此對得極懇切謂我與君同出而今則獨入則吾有去而已未知其可入也從公者皆自壞隤反元年想當時子家未對之前其間亦有要歸魯者觀子家謂貌而出者入可也當時亦有備數而出者若不是子家倡此大義則亦須有一半入生不能事死又離之以自旌也元年當時季氏只要彰昭公之惡不知適所以自彰其罪葬昭公於墓道南孔子溝而合諸墓元年是改其墓道使與羣公為一也當時葬昭公於墓道南是自在一處不與羣公通也鞏簡公棄其子弟而好用逺人元年如單獻公棄親用羈相似故春秋多重族姓楚子常止唐成公蔡昭侯三年楚昭王看後來亦是賢君何故為子常如此此是權柄為子常所執所以制不得將長蔡于衛四年晉自來會盟不曽以蔡先衛何故於今却特欲先蔡蓋晉衰不能為蔡伐楚然蔡當時曾遣子為質以伐楚今晉奈何楚不得又全然不理亦不得故所以先蔡者特不過以虛禮恱蔡耳此見晉之衰處分魯公以大路大旗四年當時周公不之魯故先賜伯禽夏后氏之璜封父之繁弱四年後來陽貨盜竊寶玉大弓便是此二物殷民六族殷民七族四年殷民六族何故遷於魯殷民七族何故遷於衛蓋此皆商之大族難治者也當時紂為天下逋逃主萃淵藪大家強族頑狠弗率之徒皆聚在商都周公分殷頑民便擇最難化者遷之洛邑而周公自教之其次便遷之於魯而伯禽教之又其次遷之於衛而康叔教之遷之於魯者蓋魯則又周公之國遷之於衛者蓋衛去王都相近此周公所以分散在此兩處其他小民雖有頑者亦不難處置惟是大族乃是一國之望呼吸響應易得生事此周公所以先措置分此大家書曰暨厥臣逹大家又曰世祿之家鮮克由禮正是説此事帥其宗氏輯其分族將其類醜四年帥其宗氏者謂同宗者也自髙以下小宗之屬皆是輯其分族是廣言之也將其類醜是輿臺皂𨽻之屬使之職事于魯四年使之職事于魯者是殷之六族皆供伯禽之命也祝宗卜史四年所以特言此者古人只理會人神此四官皆是王命而賜之不得私立所以重其事備物典䇿四年如周禮典命所謂侯伯七命其國家宫室車旗衣服禮儀皆以七為節者便是備物也典䇿便是䇿命因商奄之民四年因商奄之民者商奄是紂之黨當時同四國作亂周公伐之以分散其民於魯命以伯禽四年伯禽是古書篇名命以唐誥亦是古書篇名孔子所刪者正如唐誥之類少帛四年周禮以此封異姓今以封同姓要之亦通用周禮司常云通帛為旜雜帛為物通帛便是大赤大赤即綪茷也雜帛便是少帛也綪茷既是旃下面何故又説旃蓋茷言旗之尾旃言旗之身封畛土略四年封畛土略言其詳也上云分之土田陪敦言其略也古文多是前後互見取於相土之東都以會王之東搜四年相土契之孫其都南京東都又是别都也東搜者只是東方之搜也杜預便謂是泰山然亦未有考處疆以周索疆以戎索四年疆以周索如周人百畝而徹之類是也疆是授田於民戎索者如二十而取一之類也文之昭武之穆四年父為昭子為穆父為穆子為昭黃父之會夫子語我九言四年黃父之會趙簡子深有感於子太叔所舉子産之言禮者天地之經一段到後來意猶以為未足故再請於子太叔而後以九言語之此九言却是趙簡子切身事當時晉公室衰六卿之族強盛已自有分晉之漸故子太叔曰無始亂無怙富以下可謂告得親切畢竟簡子後來終是得力定公十三年趙稷涉賔之徒作亂董安于告趙孟趙孟曰晉國有命始禍者死此可見簡子聞太叔之言得力處伍員為吳行人以謀楚四年伍員任吳如此何故却只做行人蓋行人之官在吳為最大如申公巫臣亦是報楚而為行人於吳於此可見伯州犂之孫嚭為吳太宰以謀楚四年伍員與太宰嚭初間同謀伐楚如此好到後來闔廬既死之後太宰嚭却反為員之害何故蓋太宰嚭若不是闔廬死時亦無緣會敗露正如四凶若不遇舜時如何會見然伍員為吳行人以謀楚嚭為吳太宰以謀楚初間不知此二人果相知否蓋伍員其父見殺太宰嚭其族亦見出皆是報仇必須同心戮力然太宰嚭其初亦豈無見破他處只伍子胥往往見他盡心彌縫不覺故伍員經營之於外太宰嚭為謀於其內大率事如此等處當子細深看舍舟于淮汭四年舍舟于淮汭者蓋吳是舟師水路至舍舟時已自度過了但有舟在故司馬戍所以悉方城外以毁其舟者欲吳無舟可歸史皇謂子常楚人惡子而好司馬子必速戰四年楚之亡只緣史皇之謀史皇之初謀欲子常母令司馬獨克吳到子常欲奔時史皇又要教他必死是何故小人之意只要忠於子常而不知皆出於私初間之意其私固易見後來使他必死時亦是私心為名而已闔廬之弟夫概王四年夫概王三字是後來追書當時亦不稱王楚瓦不仁其臣莫有死志先伐之其卒必奔四年臣便是令尹所屬之臣卒却是臣之卒如城濮之戰子玉為令尹以若敖之六卒將中軍蓋是他家兵史皇以其乘廣死四年史皇非不是忠只是不知大義所謂自經於溝瀆楚子取其妹季芈畀我以出四年季芈畀我只一人左氏書此一句正是史法便見得其餘皆非楚所有故以班處宫正是公羊謂君處君之宫而妻君之妻大夫處大夫之宫而妻大夫之妻蓋子女玉帛皆非楚有楚君倉卒中只帶得季芈一人走出蓋季芈是未嫁之女觀後面以妻鍾建便可見左司馬戌及息而還四年當時子常為令尹司馬戌都不得行其志到此見得楚大勢已敗司馬戌亦只得自息還然此時之勢已如此而戌猶能敗得吳師于雍澨然其後所以至死時亦有由蓋初間勸子常去費無極時沈尹戌亦是要子常好然司馬戌只是勸得小處而不知大處故所以至此當時若能勸昭王去得子常時方得究竟今不能去大處理會却只在子常手下扶持以此論來楚之亡司馬戌亦與有罪吳句卑曰臣賤可乎司馬曰我實夫子可哉四年可哉二字是乃愧之之辭看此一段見得司馬之臣如此又看楚瓦不仁其臣莫有死志子常之臣却如此須合兩邉看方見得句卑布裳剄而裹之四年此是司馬令句卑殺己如梁末帝使皇甫麟斷吾首一般梁主謂皇甫麟曰李氏吾世讎理難降服不可俟彼刀鋸吾不能自裁卿可斷吾首句卑恐其首墜地故先展其裳藉地而後剄之動無令名非知也四年當時風俗以報仇為勇名故曰此非令名正與前面齊豹事一般君若顧報周室施及寡人四年蓋吳是姬姓所以如此説爐金初宦於子期氏實與隨人要言王使見四年見者便是欲宦之莊子讓王篇曰楚昭王使屠羊説見屠羊説曰楚國之法必有重賞大功而後得見正是此意伍員曰我必復楚國四年子胥與鄖懷俱是楚人何故鄖懷報仇則曰弒君子胥復仇則曰義蓋子胥其父見殺便出奔吳故於楚君臣之義絶若鄖懷尚在事楚則自有君臣之分也伍員與申包胥友其亡也謂申包胥曰我必復楚國胥曰勉之子能復之我必能興之四年員與胥正是執友所以敢如此説然觀此亦見得楚所以亡處何故蓋人才如此却使之在草莽國安得不亡吳為封豕長蛇四年封豕便是野豬長蛇正所謂巴蛇吞象之蛇皆能害人者也若鄰於君疆場之患也四年吳有楚則與秦鄰正説秦楚接界處便是武關路逮吳之未定四年蓋雖滅楚而未定其地秦伯使辭焉四年此便是不肯出師大抵人情多是看勢秦見當時楚已滅了申包胥又是一箇單使更無侍衛此所以辭之也改步改玉五年此如國語改玉改行一般蓋君臣之間其行步各有遲速先後如君行一臣行二是也陽虎欲逐仲梁懷五年陽虎欲逐仲梁懷一假此見陪臣強處然自當時觀之季平子如此強盛身死未幾而陽虎便敢於逐仲梁懷囚季桓子何其如此之速蓋季平子當時逐昭公時正是陽虎之徒出力向前理會此事到得平子既死之後其害自然到此正如鄭莊公收拾祭仲曼伯祝聃之徒其初有至於射王中肩者及莊公既死五子便爭立當時雖是昭公懦弱之過亦是祭仲祝聃之徒餘毒流禍如此故其事正與陽貨相類子期將焚之五年此是火攻法當看孫子大率軍中用火時必看風勢之逆順茅葦之有無公叔文子老矣六年大率既告老而歸則不與國事然有大事則雖告老亦當出言之如孔子請討陳恆亦是告老之後以公叔文子平時時然後言觀之必是寡言底人今所以言者必是國之大事蓋魯衛是同姓之國最相睦如遷頑民在洛陽者周公自主之其餘便遷諸衛使康叔主之觀此一事見得魯衛如此親睦到此却因小忿以棄舊德不可壞了此正公叔文子所以不得不出來説蓋春秋之時齊雖是先王之國經管仲為政之後典刑俱亡晉既非舊國又是晉文之後典刑亦亡當時只有宋與魯衛尚有典刑如曰宋魯可以觀禮如曰諸侯惟宋事君昭公之難亦曰宋衛皆利納公觀此見得惟有宋魯衛三國在春秋時最好故公叔文子所以見得此却是大事然觀文子之言既説昭公之時其事如此又説周公康叔之相睦如此以此見老成人之言自有來歷陽虎御季桓子公斂處父御孟懿子將宵軍齊師七年此是陽虎欲陷季孟於齊師其意知齊必殺之所以宵軍之也不待有司七年見得只是單車出顔髙奪人弱弓八年顔髙之弓為人傳觀至齊師至急忙取人弱弓以戰宋樂祁歸卒于太行士鞅曰宋必叛不如止其尸以求成焉八年此見晉極衰處當時天下大勢皆衰如吳闔閭之勢又衰楚子西只能自守而已東西南北無一國強者魯於是始尚羔八年魯是秉禮之國而不知禮其他可知想是自昭公失國之後方如此凡事才經十餘年無人接續自然失其本王孫賈趨進曰有如衛君其敢不惟禮是事而受此盟也八年此不獨是告晉君又所以告之於神明如戲之盟襄九年公子騑趨進曰鄭國而不惟有禮與強可以庇民者是從崔慶之盟襄二十五年晏子仰天嘆曰嬰所不惟忠於君利社稷者有如上帝二者正與此相類衛侯欲叛晉而患諸大夫八年衛大夫何故不肯叛晉蓋自文公以來百餘年衛常服晉人情安習以此難叛工商未嘗不為患八年此見古者工商未嘗與士農雜居蓋工商無土著多居城市故國有難則工商同受其害也將如蒲圃八年陽虎若就季氏之家害之他必有備所以必出郭乘其無備也桓子咋謂林楚八年季氏當時全得林楚力右師曰喪不在此故也九年此一句見得春秋時喪在時同宗必不舉樂如所謂鄰有喪不巷歌之類鄭駟歂殺鄧析九年析亦當時才辨之士擅立法令亦自當殺然既用其刑則不當殺看此一節孑然都無樂善意思靜女指一事而言竿旄取其樂善此須看得左傳愛惜人才忠厚之意列子説鄧析一段當録陽虎使焚萊門九年此是虎雖被圍在窘迫中猶有計鮑文子諫齊侯九年鮑文子以老成臣所以諫如衛公叔文子相似上下猶和衆庶猶睦九年此猶字當看魯雖微猶如此親富不親仁九年此是陽虎平日所言如為富不仁之類是也齊侯執陽虎將東之九年齊欲以陽虎歸之魯鍥其軸麻約而歸之九年此只要使邑人不覺誤其用也載蔥靈寢於其中而逃九年寢於其中使人不見如或坐或立則人或有知之者矣先登求自門出九年此欲獨入開其城門却引外面師徒入來猛笑曰吾從子如驂之靳九年此見王猛本非十分要爭功只且以此試東郭書其君在焉九年亦見衛靈公有才能處晳幘而衣貍製九年何故不便説東郭書名姓蓋欲不知以示其公耳士兵之十年見得魯尚自有備齊侯將享公孔子謂梁丘據十年孔子何故與梁丘據言他是近習緣當時攝行相禮所以與之言涉他步左右皆至而立如植十年言其分為左右兩邉行步都相似蓋他兵教得熟所以如此不是臨時使他如此晉人殺涉他十年涉他倚仗晉是大國趙鞅是權臣又見他使所以盡力做都無斟酌想是趙鞅亦不教他如此正與朝錯相似大抵才是倚人做事自是如此侯犯以郈叛十年須看初間都無此緣昭公出奔後魯國大變都無紀綱所以如此公取而朱其尾鬛以與之十年此只是異其色却要認不得魋懼將走十年此見向魋初間尚未曽十分可畏自此後却方難制以此知小人恣橫只緣寵愛太過子為君禮十年蓋古者待罪必於境君賜環則還君賜玦則去武叔聘于齊齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之十年此是齊侯以虛言示武叔蓋郈本不曽入於齊當時侯犯出奔時駟赤便已自納魯人了侯犯只獨出奔耳齊侯於此不過要以虛人情底言語示恩於魯所以武叔都不受他之説以此知人只以虛言為人情者深為可恥宋公母弟辰入于蕭以叛十一年蕭是大邑莊十三年宋閔公時羣公子亦入于蕭今年母弟辰之亂非獨是所據之地可畏而所謀事之人亦可畏如仲他之徒及樂大心湊合得成所以為宋大患冬及鄭平始叛晉也十一年當此時晉之屬國皆不屬晉如衛又自去年叛今魯又與鄭平諸侯皆無從晉者滑羅殿十二年殿者獨當其後正如先登者獨當其前今滑羅為殿而却不退於列此安得謂之殿周勃傳謂殿注云軍後曰殿此漢時殿之名尚在至三國却謂之斷後叔孫氏墮郈季氏墮費十二年魯墮郈費此事若出於仲由之謀則子路似乎自專若孔子既為司寇而此事又做不了何故當細思之齊侯衛侯次于垂葭十三年此地正是西晉髙平國屬古兖州在今京東西路濟州齊侯皆斂諸大夫之軒十三年此只是要諸大夫用力耳趙孟怒召午而囚諸晉陽十三年邯鄲午之意本亦是好意只緣趙鞅不相信所以疑他大抵人不相信不可出力來任事三家未睦可盡克也十三年當時三家既劫公以伐范氏中行氏則伐三家便是伐晉君相似何故髙強却勸伐之蓋髙強只要伐他之家如齊滅崔杼只破崔杼之家家破則自無去處范中行氏雖信為亂安于則發之十四年當初安于只是請趙孟先為備又不曽用其謀何故謂安于則發之蓋知文子之意謂范中行氏之亂正是安于之言迫得他作亂所以歸罪於他衛侯為夫人南子召宋朝十四年衛侯所以召宋朝而不以為怪何故蓋淫亂流蕩之人舉動多是如此以此看來前代忠臣義士往往當昏亂之朝而力諫其君所好之非所嬖寵之失自以為其君一聞此語便深疾邪惡以逺去之而不知其未必見省蓋人之性情自是如此如唐武三思事可見蓋人不是一樣君子所以要通天下之志太子三顧戲陽速不進十四年戲陽速處得是晉人敗范中行氏之師于潞獲籍秦髙強十四年強本是齊國上卿緣陳鮑挾君以叛髙強遂伐君公議不與所以國人不容於齊遂奔晉至范中行氏欲伐君之非髙強知之却不知托身於范中行氏之非蓋緣他更得一事只知得一事不曽統體曉得非所謂增益其所不能者也若豪傑之士因一事錯則全體盡曉以此知人因一事不是却只知得一事者誠不濟事葬定公雨不克襄事十五年古人不拘隂陽若是大雨亦須當止公羊論之詳矣胡氏論大國當自有備此亦見魯之衰皆無備矣
