body:
  text: 左氏傳續説卷五宋吕祖謙撰文公上先王之正時也履端於始舉正於中歸餘於終元年大扺厯法不過此三句履端於始正是立春立夏之類是四時之始舉正於中是一月中氣如春分秋分斗建寅建卯之類歸餘於終以每月大小盡每嵗零日積成閏此三句皆統説一嵗事書謂協時月正日正是此三句素問謂立端於始表正於中推餘於終而天度畢矣注云端首也始初也表彰示也正斗建也中月半也推退位也言立首氣於初節之日示斗建於月半之辰退餘閏於相望之後此説却分明晉人以公不朝來討二年文公何故不朝晉前輩謂文公做事大率寬緩亦是如閏不告朔之類大率如此晉人使陽處父盟公以恥之二年古者卿不會諸侯與伯子男會可也處父不能正君之失故春秋去氏以貶之大事于太廟二年禴祠蒸嘗常祭也故止曰事若禘祫之類非常祭故曰大事且眀見曰吾見新鬼大故鬼小二年弗忌亦是想像得如此耳蓋閔公薨時年七八歲僖公之薨幾五十餘矣故曰吾見新鬼大故鬼小禮無不順二年禮者順也大率禮事無有不順况祀是國之大事豈可不順今乃逆之豈可謂之禮湯不先契文武不先不窋二年契與不窋非是不賢只較之湯武則少劣帝乙厲王却非有德者雖非有德而禮猶尊上之蓋子不可以已之賢而先父臧文仲其不仁者三其不知者三二年下展禽蓋柳下惠當時之賢者位之以卿可也今處之於下位故曰下天生賢者本以利民如養賢以及萬民蓋惟賢者乃能保芘萬民今而不用是使民不蒙其利所以謂之不仁廢六關止為禁民之竒邪未嘗有征到臧文仲廢關使商賈得往來意在富強其國亦未是要取他利此法之初變也又其甚至戰國時却又添置關以征取商賈往來賦稅又法之再變也妾織蒲蓋公卿食祿之家不得與民爭利作虛器蓋無位而虛有其器又無所用處故曰虛器縱逆祀當文仲為魯卿其勢自足以禁弗忌之逆祀惜乎素不學禮而不能正故謂之縱祀爰居爰居只海鳥偶避風於魯地耳而命祀之此皆不知處國語曰海鳥曰爰居止于魯東門之外三日臧文仲使國人祭之展禽曰夫祀國之大節也而節政之大成也故慎制祀以為國典今海鳥已不知而祀以為國典難以為仁且智矣夫仁者講功而智者處物無功而祀非仁也不知而不問非智也今兹海其有災乎夫廣川之鳥獸恆知而避其災也文仲聞柳下惠之言曰信吾過也季子之言不可不法然臧文仲是當時賢者却有此等過失何故蓋文仲之過亦止此數端耳皆可數可書者此乃見文仲賢處若他人之過則不可勝言矣然下展禽一事不謂之不知而謂之不仁何也蓋知柳下惠之賢而不與立却非是不知乃是不仁襄仲如齊納幣禮也凡君即位好舅甥修婚姻二年襄仲是莊公子於文公為季父其親最近也故文公成公之世當時雖有三桓為卿大抵却是東門氏用事其後却是三桓好甥舅齊魯本是甥舅之國修婚姻是重姻親秦伯伐晉濟河焚舟三年當時不是文具必須盡焚然如何能復歸于秦蓋秦所以示士卒必死之意萬一摧敗倉卒決不可回既勝晉了却不患無物可渡如戈矛浮瓢之類皆可以渡不必皆是舟晉人不出三年晉人不出便是大勝晉了不必交兵封殽尸而還三年殽之敗已三數年了如何又有尸只是骸骨皆是尸封是積尸在一處以土封之如京觀之類其意却與京觀不同京觀是夸大其功積尸令髙此却是斂向時之敗死者葬埋封瘞之遂霸西戎三年蓋為西邉戎狄之長不關涉中國事其不懈也能懼思也三年懈字説得極切大抵人才做事敗了意思便懶怯惟孟明却不懈怠仍自奮作於困頓中能懼思也懼而能思尤好只是懼又不濟事須懼而能思則其思必切於利害于以采蘩于沼于沚于以用之公侯之事秦穆有焉三年蘩至賤之物公侯却是至重底事然苟有可用不管其他如孟眀苟有可用不管其他有不善處詒厥孫謀以燕翼子子桑有焉三年言人臣為國家宏逺之計者莫如舉賢者為益無窮君子是以知出薑之不允於魯也四年蓋夫人位望輕時事事便做不行如東門氏殺其二子皆是文公始初輕了出薑故大率不為衆人所欽重在國必亂在家必亡四年夫人義兼家國在魯言之謂之國在宫中言之謂之家詩曰畏天之威于時保之敬主之謂也四年蓋名分上下截然不可犯處便是天威書曰天敘有典敇我五典五惇哉天秩有禮自我五禮有庸哉與此意同同盟滅雖不能救敢不矜乎吾自懼也四年此皆是穆公好處以功業論固不及桓文以資質論則有逺過桓文處邵康節謂穆公是五霸得一極是王使榮叔來含且賵五年車馬曰賵古人以祭器鐘鼎為寶以車馬為貨在當時車馬最是易貨底物如今人以金玉為貨相似顔路請子之車以為之椁不是便以車為椁乃是欲賣車以為椁見得車馬易貨當時便人人要用底物召昭公來會葬禮也五年此禮非周公禮經如今時州郡例册相似當時以為禮耳臧文仲聞六與蓼滅曰德之不建民之無援哀哉五年德之不建謂上無明天子建德以固諸侯蓋天子建德者也民之無援謂下無賢方伯以救援而使聖賢之後見滅於東夷上無明天子下無賢方伯所以如此六蓼是唐堯所封經許多時尚在到此一旦滅了所以深歎文仲畢竟是舊時人識得此等事要緊不然亡國亦多何故獨嘆此二國想當時典籍尚具在今六安縣有臯陶冡晉陽處父聘于衛反過寧寧嬴從之五年注嬴逆旅大夫是主客館底人國語云陽處父如衛反過寧舍於逆旅寧嬴氏商書曰沉潛剛克髙明柔克五年是惟深沉不暴露底人為能剛惟髙眀不暗弱底人為能柔箕子恐後世以張眉揚目底人為剛以因循不整底人為柔故書曰平康正直強弗友剛克燮友柔克此三句正解上面一曰正直二曰剛克三曰柔克三句到下面正直一句便不解蓋此句容易曉故特再舉所以為剛為柔底樣子説與人華而不實怨之所聚也五年此句以草木譬之華不必盡是詐偽且如要濟惠底人易得多可人情不周遍則衆皆怨之寧子初見處父便踴躍從之他想見是華及久便釋然舍去此便見得他不實國語云嬴謂其妻曰吾求君子久矣乃今得之舉而從之陽子道與之語及山而還曰吾見其貌而欲之聞其言而惡之晉趙成子欒貞子霍伯臼季皆卒六年中軍帥先且居即霍伯也中軍佐趙衰即趙成子上軍帥狐毛箕鄭父上軍佐狐偃荀林父下軍帥欒枝即欒貞子下軍佐胥臣即臼季夷之搜晉侯將登箕鄭父先都而使士榖梁益耳將中軍先克曰狐趙之勳不可廢也從之六年使狐射姑將中軍趙盾佐之陽處父至自溫改搜于董易中軍六年中軍帥趙盾中軍佐狐射姑上軍帥先克上軍佐荀林父下軍帥箕鄭父下軍佐先都此一次命帥凡三次更改而後定君子曰秦穆之不為盟主也宜哉六年不罪襄公而罪穆公者蓋當時穆公曽命三良殉葬故特罪之先王違世猶詒之法而况奪之善人乎六年猶字與况字相對法是末節尚立而遺後世况賢者國之本豈可殺之乎並建聖哲樹之風聲六年並建不特是一人風聲是教化著之話言如周公作書告成王是也豫之法制如冠昏喪祭是也告之訓典是先王之書道之以禮則是以禮防民而教之中使毋失其土宜使人民萬物各得其所如稼穡之類亦使各得其性季文子將聘於晉使求遭喪之禮以行六年季文子求遭喪之禮大抵士大夫平時皆當自講禮不待臨時方求然文子備豫不虞儘勝得不講者比之平時素講者亦是其次吾聞前志有之曰敵惠敵怨不在後嗣忠之道也六年敵惠是我嘗有恩於人此人不親自報我而死我亦不責望他子孫來報敵怨如我有怨於人未及報而此人亦死我亦不復報怨於他子孫此便是忠之道也古人大扺多説忠字躬自厚而薄責於人謂之忠同官故六年杜注同寮是趙宣子與狐射姑同在中軍故謂同寮如一人在上軍一人在中軍之類此不謂之同寮盡具其帑與器用財賄六年左氏詳書之者蓋見得纎􅊖周盡向慱議論趙宣子特地遣臾駢送狐射姑之帑全不是蓋古人風俗尚厚却不如此親帥扞之六年臾駢親自扞衛者蓋恐臾駢之人其徒黨或害他閏以正時時以作事事以厚生六年夫閏月在天雖無閏人却不可無閏蓋閏月之氣首尾正占兩月如閏三月前半月便占正三月末之氣後半月却占四月初之氣其間七十二侯如倉庚鳴苦菜生之類閏月亦有之閏月既有此時候則凡所謂蠶桑耕種底事亦當各隨閏月中之氣候以為之如不告朔則閏月中間所當做底事便廢弛了此便是棄時政也穆嬴頓首於宣子七年古者婦人拜禮與男子一般自後世方改了先君奉此子也而屬諸子七年奉即抱也如曲禮奉扃之類宣子與諸大夫皆患穆嬴且畏逼七年見得當時諸大夫皆知靈公必無道無一人敢説靈公當立者箕鄭居守七年居守在春秋時是一件大事士會在秦三年不見士伯七年士會此意極好大凡人各就資質便處相入有憂底人自要與憂者處無聊底人自要與窮困者處此皆是資質凡下士會不見士伯却不肯如此亦正是處患難之法蓋患難中正當以靜自處豈宜迭相往來以引惹間事士會意思正如此是出於厯練熟所以後來復歸于晉趙宣子使因賈季問酆舒七年此見得當時風俗厚處賈季以陽處父之故出奔狄自他人既得罪於宗國必懷不平之意賈季仍舊不棄父母之邦其言尚為晉在故當時宣子所以使他時亦託得他過此足以見風俗厚處正如公山弗狃曰人之行不以所惡廢鄉對曰趙盾夏日之日七年其意亦欲懼狄此狄是當時居中國者諸侯會晉趙盾盟于扈七年盾是大夫如何以大夫盟諸侯蓋當時靈公尚少晉侯使解揚歸匡戚之田于衛且復致公壻池之對自申至于境八年至虎牢之境申與虎牢皆鄭地衛鄭相近故自鄭之界皆還衛司馬握節以死八年司馬所以有節者蓋其職主兵古者節之制大小短長固各不同如周禮玉節角節或以金為節或以管為節所謂玉節須略短所謂旌節須長蓋欲節上挂旌也然一節須分為兩其一分收之於國其一官自守之合而後以為信如止有一節則人或得以自為之何以防其欺偽後世所謂節之制皆訛了古意與古制全不同古時亦官長有節如以下官屬恐不盡有司城蕩意諸來奔效篩于府人而出八年周禮掌節府二人古時必須自有府庫以藏此節故蕩意諸所以效節於府人公以其官逆之皆復之八年皆復謂其官屬官屬皆來尤見其從容整暇處晉人殺先都梁益耳九年當時賊殺先克者五人何故先殺此二人想是先知得此二人耳到後來探索得三人出故三月間始殺箕鄭父士縠蒯得三人楚子師于狼淵以伐鄭九年范山言于楚子一段舊説已得大意蓋中國與夷狄一消一長常相盛衰鄭及楚平九年陳懼乃及楚平九年楚服陳鄭陳鄭是近楚之國至宋亦服則大勢全歸于楚矣楚使越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也九年當時越椒只不過恃楚之大而輕魯之小而不知傲時便是傲了先君故叔仲惠伯謂必滅若敖氏之宗以此見古之時最重宗廟蓋使臣出使他國必先告廟然後行則此幣乃先君之幣也如西漢丙吉子顯少為諸曹嘗從祠祖至夕牲日乃使出取齋衣丞相吉大怒謂其大夫曰宗廟之重而顯不敬亡吾爵者必顯也漢去古尚近氣味尚在到後漢則全無此氣味矣秦人來歸僖公成風之襚九年秦人來歸僖公成風之襚而左氏謂諸侯相弔賀也雖不當事苟有禮焉書也以無忌舊好此一段氣味深長宜子細看蓋成風已死四五年秦襚方至而此猶曰雖不當事無忌舊好蓋人苟以是而來不問地之逺近情之親疏時之遲速皆感其誠意此是忠厚損怨之道夫人最不可有責望人之心此送襚雖緩然猶勝於不來
