body:
  text: 左氏傳續説卷二宋吕祖謙撰桓公公及鄭伯盟于越元年鄭與魯盟此弒君初與諸侯會盟見孔父之妻于路元年妻而使人見于路此冶容誨淫之類宜其及禍師服論名子二年晉之師服魯之臧僖伯申繻之徒皆是國家所咨訪底人蓋古者諸侯之國必有知典故備訪問底人所以三代之源流先王之制度不至於斷續而不知者正緣有這般人在春秋之初尚多有之師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有二宗士有隸子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦二年此數句皆是左傳中大綱目學者惟經厯久看書多然後深曉得今晉甸侯也而建國本既弱矣其能久乎二年古者所謂甸亦有兩般有畿甸之甸有侯甸之甸禹貢曰五百里甸服此是畿甸之甸周禮職方氏曰乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服此是侯甸之甸如周襄王謂規方千里以為甸服鄭子産謂列卑而貢重者甸服也此皆是以王畿為甸世俗習熟多呼畿為甸正合禹貢之制如師服謂今晉甸侯也子産謂曹為伯甸此謂是晉以諸侯而在甸服曹以伯爵而居甸服正合成周之制今晉師服曰晉甸侯也本既弱矣師服指甸地以為本弱則此甸在侯服之外可知蓋去王畿既逺故其地小古者大率地近畿者土廣而貢重地逺畿者土狹而貢輕何故舊時海島之地亦有十里之國以此見愈逺處愈小侯服近畿想侯服之地必多於甸地也子産曰鄭伯男也而使從公侯之貢公侯伯子男古者分土為三只有此三等公侯一等伯一等子男一等公侯一等其貢重伯一等其貢稍輕子男一等其貢又輕今鄭伯男也使之從伯本等之貢已為重矣又使之出公侯之貢則豈不甚重觀此兩句最見得古者分土為三一句分眀周禮職方氏載凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下大扺周禮所載皆與其他書合惟此一處却有可疑恐是後來諸侯欲侵占土地者私廣其數目耳且以孟子考之公侯皆方百里伯七十里子男五十里以此益可見古者三等之制又曰周公之封於魯為方百里也地非不足而儉于百里太公之封於齊也為方百里也地非不足也而儉於百里古公侯皆是百里如何便有三百里四百里之制况孟子正是當時人豈不可信國語謂鄭伯男也鄭在男服此説亦通芮伯萬之母芮薑惡芮伯之多寵人也逐之三年此正是後世母后專權之漸王師秦師圍魏執芮伯以歸四年此非是秦執以屈辱他却是有意要納他所以先執歸去十年秦遂納芮伯秦本周殽函之地去周最近周宜親倚之觀此時猶相親其後漸踈矣王奪鄭伯政五年周將亡舉措無不失失之又失至於此無復可言矣王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭曼伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公五年古者天子六軍今桓王何故只有三軍鄭何故却有左右拒及中軍蓋周室衰弱不能備天子六軍之制鄭欲當王之三軍就一軍中分出左右拒故有三軍鄭命二拒曰旝動而鼓旝中軍之旗鼓二拒之鼓古者每軍主將之車必有一鼓如國語曰有中軍之鼓有國子之鼓有髙子之鼓則此中軍亦當有鼓今中軍乃動旝而不動鼓何也蓋車進則鼓動今鄭欲先命左右拒以擊陳蔡衛則中軍尚未動所以鄭中軍以旝為號令也魚麗之陳五年只緣鄭既分左右拒以當三國則中軍人少不能敵王三軍故先偏後伍分開人數使行陳廣闊足以當王之三軍蓋左右拒只在兩邉當蔡人衛人陳人又不能當王之左右軍也古者車制每車必有甲士三人如主將之車則主將居中御戎與右却在兩傍如非主將之車則御却居中兩邉却自有左右故在主將之左者謂之御戎居車之中者只謂之御御之職掌馬之六轡右之職掌執戈矛哀二年鐵之戰郵無恤御簡子衛太子為右太子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之我御之上也清人之詩曰左旋右抽中軍作好此皆見得御與右之職事戰于繻葛五年繻葛之戰此是周室大變處自此後如陳如蔡如衛之屬竟不見來從王室蓋自此一敗後諸侯皆解體矣楚武王侵隨鬬伯比言於楚子曰漢東之國隨為大六年觀楚經略漢東之初便欲滅隨而隨終不為楚所滅者何故蓋少師死季梁在諌行言聽無人沮撓其謀故楚不敢滅後來却反以厚意結隨以為助使之勿救援小國故漢東之小國盡為楚所滅而隨獨終春秋之世如所謂周之子孫在漢川者楚實盡之隨密邇於楚楚實存之世有盟誓至今未改看此兩處便見楚常結隨而不滅隨處楚略漢東六年楚初盛時橫取湘漢一𢃄漸至中國如敗鄧會南諸侯盟二軫州蓼皆是隨人使少師董成六年董成如涖盟相似蓋兩君不親相見故使人往臨之季梁曰所謂道忠於民而信於神也六年古人説治民必言事神蓋人君是神民之主天下國家只是治民事神兩事周禮一書自初至末亦只説此事見得古人以實事看神如後世以神為虛誕文具了春秋之時神民所以並説者只實見其不是虛誕且如學者不愧屋漏不欺暗室此便是知有神處上思利民忠也六年尋常以誠事君謂之忠如隋煬帝下詔非不説要利民只此心不誠於為民故謂之忠則不可古人上下常通説此一字如孟子曰自反而有禮矣自反而仁矣必曰自反而忠既説禮與仁而又必説忠者何故蓋亦欲實驗此心果何如也一部左傳所以多只説一箇忠字自秦漢以來簡册中此字始斷絶祝史矯舉以祭六年所謂矯舉者如無嘉德而曰嘉栗不能馨香而曰旨酒之類皆謂之矯奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也六年既説博碩肥腯何故又説備腯咸有此兩句似重然細看來博碩肥腯是大綱統言牲體備腯咸有自各以其類而言之如用太牢則牛羊豕三者皆相似乃可如三者之中有一不稱則不得謂之咸有此四句各不相似故杜氏謂其實皆當兼此四者看他下兼字便見得杜氏不以為同處所謂馨香無讒慝也六年無讒慝便是所以為馨香處且如一家中所以謂之馨香者必其父子兄弟中和睦而無乖離之意乃可謂之馨香所謂馨香無讒慝也兩句最有味故務其三時修其五教親其九族以致其禋祀六年此四句自有次第北戎伐齊六年當齊桓未霸以前戎狄橫行於中國滅衛伐魯伐周之類甚多自管仲相桓公之後方能攘之所以孔子有微管仲吾其被髮左袵之歎須看當時事體然後知聖人之語不妄發諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭六年春秋時班次亦有兩般無事時則以爵尊者為先出師時則以主兵者為先隱五年邾人鄭人伐宋邾在鄭之先邾主兵也桓十年齊衛鄭來戰于郎齊衛在鄭之先王爵也今鄭為齊伐戎如以主兵例論之自合居先而魯以王爵論故居後又如踐土之盟載書曰晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期藏在盟府夫魯弱國也蔡小國也如何却在鄭齊之先蓋周之宗盟異姓為後此所以周班為先後也戍齊見當時諸侯猶相親附猶相扶持鄭忽辭齊昏六年忽不借助於他國而自求多福非奮然誠有志也蓋其為人淺狹而多所拘攣暗滯而動皆疑畏浮易而不知審量孑孑然以文義自喜而國𫝑人情與其身之安危皆懵然莫之察也適足以取亡而已矣使忽誠有志而深求其實則資之弱固可強而所以持國者固無待於外助也惟其為善有名而無實所以卒見嗤於祭仲而為詩人所閔此功利之説所以多勝而信道者所以益寡也蓋昭公但云自求多福在我而已而所謂在者初未嘗做功夫也季梁曰楚人尚左君必左八年楚人所以尚左者蠻夷之俗也蠻夷以左為尚如左袵之類皆是中國則以右為尚少師曰不當王非敵也八年謂君當與王為敵王命虢仲八年此皆畿內諸侯周之舊制畿外諸侯則世襲畿內者則皆隨其所職且如為卿則有采地或免或死則已不世襲也其後乃亦世襲周之王畿皆為人所有所以益弱巴子使韓服告于楚請與鄧為好楚子使道朔將巴客以聘于鄧鄧南鄙鄾人攻而奪之幣殺道朔及巴行人楚子使薳章讓于鄧鄧人弗受九年此見得鄧全無政刑處道朔巴客之聘既及鄧境而鄾人敢于殺而奪之則鄧之綱紀蓋可知矣及楚薳章讓鄧之時則鄾人之罪鄧所必討而鄧反助之蓋國家將亡則綱紀都無後來楚文王過鄧而三甥請殺文王曰亡鄧國者必此人也縱使是時殺得楚文王鄧亦不能久存蓋鄾人奪幣之時鄧之亡形見矣左傳中如此等處最要看虢仲譛其大夫詹父于王十年虢仲是王之卿士詹父是虢之屬大夫假使詹父有罪虢何故不自討而必譛之於王蓋大夫命于天子而屬于虢仲非虢所能私討也如今相國府有左右司之屬六部有郎中員外之屬相似此虢仲所以必訴之于王鄖人軍於蒲騷將與隨絞州蓼伐楚師莫敖患之十一年莫敖楚官也楚初只有莫敖後來強盛時又有令尹故令尹之權却重莫敖一官雖存而權反居令尹之下矣祭封人仲足有寵于莊公莊公使為卿十一年封人是治封疆之官祭仲以封人而入來執政得見春秋之初尚未世襲在蓋官人以世非古之制度乃武王數紂之辭雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之十一年此盟是要盟要盟義所當昔如孔子蒲之盟孔子過蒲公叔氏以蒲畔蒲人止孔子弟子有公良儒者以私車五乘從孔子鬬甚疾蒲人懼謂孔子曰苟無適衛吾出子與之盟出孔子東門孔子遂適衛子貢曰盟可負也孔子曰要盟也神不聽楚伐絞莫敖屈瑕曰絞小而輕輕則寡謀請無扞採樵者以誘之十二年行軍之法有正軍有役徒正軍是行陳之兵役徒是供役使之兵如采樵底人乃是役徒非行伍間執干戈弓矢者也然役使採樵時却必使正軍扞衛以往今欲為計以誘絞人故請無扞僖二十八年欒枝使輿曵柴而遁昭十三年衛請禁芻蕘者皆是采樵之役徒也楚屈瑕伐羅鬬伯比送之還謂其御曰莫敖必敗遂見楚子曰必濟師楚子辭焉入告夫人鄧曼楚子使賴人追之不及十三年鬬伯比既知莫敖之必敗不便明告于是子而使追屈瑕却待鄧曼之説而後方使賴人追之遷延了許多時節何故蓋此不是伯比不肯直諌楚王恐是楚軍法軍行而沮撓軍謀者則有刑故伯比微諷而不徑言之意欲使楚王自悟耳婦人不預軍事而楚王入告鄧曼者蓋師已盡行而又欲益師訝其説而入言諸家人耳此亦人之常情也夫固謂君訓衆而好鎮撫之召諸司而勸之以令德十三年衆謂士卒諸司謂偏禆之將楚師盡行十三年楚伐羅一小國其師盡行則當時楚亦未甚大楚宥羣帥十三年楚之政事如此便自是將興氣象莫敖屈瑕十三年屈瑕終始三事博議論得却是大率博議中議論自今日看來十全精確者大段有數蓋此書舊日一時間意思耳會于曹曹人致餼禮也十四年左氏所謂禮非左氏自説乃是周之典禮蓋夫子未筆削春秋時魯史本謂魯春秋魯春秋之法合於周禮者則書不合於周禮者亦書所以示勸戒也故韓宣子適魯見易象與魯春秋曰周禮盡在魯矣今左氏所謂禮也之類便是然其中却又有兩般有周之舊典禮經又有春秋當時之所謂禮如鄭以齊人朝王禮也祭公來遂逆王后于紀禮也曹人致餼禮也此皆古之所謂禮也如大夫三月同位至如君薨卒哭而祔之類此皆是春秋當時之所謂禮左傳書禮處極多要須編緝作一處看方見得兩般分明古之周禮非今周禮之書今周禮之書只可謂之周官鄭子人來尋盟十四年杜氏曰其後為子人氏此公孫之子以王父字為氏者宋人以諸侯伐鄭焚渠門入及大逵十四年逵是道路之名如莊二十八年楚伐鄭衆軍入自純門及逵市宣十二年楚伐鄭入自皇門至于逵路在鄭多謂之逵在齊多謂之莊在魯多謂之衢此皆各以其國之道路廣狹名之逵道方九軌車兩輪間曰軌一軌凡八尺九軌七十二尺計十二步而周禮注九軌不名逵爾雅曰九逹謂之逵杜氏謂道方九軌為逵者彼以鄭城內不應有九出之道故以為九軌然鄭有九逹之道未可知或只是容得九軌亦未可知此正如蜀中棊盤市之類天王使家父來求車非禮也諸侯不貢車服天子不私求財十五年杜氏謂車服乃上之所以賜下如舜典曰眀試以功車服以庸益稷曰眀庶以功車服以庸是也然書中所説車服亦各不同如舜典所説乃天子所以賞諸侯者益稷所説乃人君所以賞士大夫者此兩般亦所當然至于不私求財則諸侯自有常貢如禹貢九州之賦各貢其方物若過求之則為私求財矣以天子下求車此雖非天子之體然天子不能自辦而所以下求於諸侯者亦見得當時諸侯常賦不供敢於慢周處祭仲專鄭伯患之使其壻雍糾殺之將享諸郊十五年當時雍糾不享於家而必享於郊者何故蓋祭仲是鄭之權臣黨與盛強就享於國中則救援多至必難誰何所以享諸郊者特地使他出在逺地使他黨與卒來不得故殺之也易如陽虎將享季氏於蒲圃而後殺之之類相似蓋蒲與郊皆國外之逺地而季氏與祭仲皆一國之權臣諸侯謀納鄭厲公十五年昭公正嫡出奔並無人欲納之厲公庶子才出奔而諸侯即謀納之蓋昭弱厲強可見當時不論是非只論強弱人情大略類此宣薑與公子朔構急子公使諸齊使盜待諸莘將殺之夀子告之使行不可及行飲以酒夀子載其旌以先盜殺之十六年夀子將欲免急子而必載旌以先者何故蓋旌旗屬凡使者出竟則有旌儀禮聘禮云使者載旜及竟又云及竟張旜誓乃謁關人入竟斂旜乃展又云及郊又展如初注曰旜旌旗屬也載之者所以表識其事此古使者之制如此夀子所以飲之酒者正欲使之醉而後可竊旌以先往也自常情看來夀與朔是同母弟朔既讒構急子則夀亦宜同構之也今乃導急子使行又欲以身免其死此最是賢於人處太史公曰余讀世家言至於宣公之太子以婦見誅弟夀爭死以相讓此與晉太子申生不敢眀驪姫之過同俱惡傷父之志然卒死亡何其悲也或父子相殺兄弟相滅亦獨何哉然以道理論之急夀之死亦有未盡處父有過子當掩護而正救之爭相為死是暴其父之過也此未得為盡事親之道必如舜之號泣大杖則走然後能盡事親之道及齊師戰于奚疆事也十七年疆事云者謂此疆場間微事耳為疆吏者當自區處足矣何必來告若如契丹來求關南地之類此却是大事須當請之於朝廷非邉將所能自區處得了若只是邉鄙間時復侵掠五里或十里此亦常事耳何必一一浼朝廷之聽髙渠彌弒昭公十七年鄭莊公聚權謀之臣於朝雖可以立一時之功快一時之意然只莊公可制服之才至莊公薨百態交作都無一豪節義如渠彌之弒昭公如祭仲之逐厲公都不知義理所在蓋此曹平日只理會得權謀上有人制服則為用而不敢肆上既無人則自用其權謀自擇其便利何所不至耶君子非不欲快一時之意用權謀之士也所以獨取忠厚長者蓋為長久之計耳君子謂昭公知所惡矣十七年此一句是左氏譏昭公處言其特能知之耳而不能去之意自見於言外此正是惡惡而不能去也左傳中如此處皆左氏筆髙含不盡意公子逹曰髙伯其為戮乎復惡已甚矣十七年復是報復之復謂昭公初間只是惡渠彌而渠彌後來却弒了昭公以為報言其報之之甚也公將有行遂與薑氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗十八年左氏所以載申繻諫辭一段者便要見得薑氏是第一次如齊處言前此未嘗如齊至此方往故申繻以未曽有此遂入諌耳故左氏因以諌辭繫之大扺作史之法皆如此後來文薑如齊不知其幾而都無諌者何故以此看來此行是第一次尤分眀人曰祭仲以知免仲曰信也十八年此見祭仲全不顧義理只計較利害底人且昭公是祭仲所立渠彌既弒昭公仲何故不討而又事子亹况仲在當時專據兵權非力不足蓋當時厲公在櫟自櫟入鄭地殊不逺仲若討渠彌時正恐厲公乘隙而入蓋厲公不是無能底人仲所以顧一時利害且安順過若以賢者處之安肯如此辛伯諌曰並后匹嫡兩政耦國亂之本也十八年並后如褒姒申后之類匹嫡如齊僖公寵夷仲年之類兩政如狐突諌晉太子曰外寵二政是也謂如政當由中書出而令却自近習出之類耦國如鄭京城晉曲沃之類
