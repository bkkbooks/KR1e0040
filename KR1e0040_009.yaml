body:
  text: 左氏傳續説卷九宋吕祖謙撰成公下定薑不內酌飲十四年古人有喪則鄰里為糜粥以飲食之定公之喪想羣臣設酌飲於定薑定薑以太子之不哀故不內華元曰我為右師君臣之訓師所司也十五年此見右師之職事蓋右師是六卿之長也魚石止華元十五年華元欲出奔普此見得元畏桓族之強所以欲奔魚石曰國人與之此見元有重望在人又有大功於國故國人懷之萬一華元不反則國人必討桓氏之族然魚石能知向戌之賢必能免禍而自不能免者何故蓋大率見他人則易自為則難華元既歸遂出桓族此一事終是有計較利害底意故後來宋之禍遂始於此要之當時桓族雖盛強若留在宋時亦不妨况當時魚石之言儘自説得好自魚氏世為左師到此華元始易以向戌方不用魚氏之族若不我納今將馳矣十五年此是魚府知元有不納他之意故言曰元若不納我時元必疾馳而去矣至魚石登髙而望之則元已馳矣至五子騁逐而從之則元已決睢澨閉門登陴矣觀元初間使人止五大夫後來又自去止之此只且盡他之情虛作禮數豈是誠意晉三郤害伯宗十五年看伯宗學陽處父便是所以被害處國語曰伯宗朝以喜歸其妻曰子貌有喜何也曰吾言於朝諸大夫謂我智似陽子對曰陽子華而不實主言而無謀是以難及其身子何喜焉伯宗曰吾飲諸大夫酒而與之語爾聼之曰諾既飲其妻曰諸大夫莫子若也然而民不能戴其上久矣難必及子子盍亟索士憗庇州犁焉得畢陽及欒弗忌之難諸大夫害伯宗將謀而殺之畢陽實送州犁於楚民惡其上十五年上是上於人之長言人皆惡勝己者若逞吾願諸侯皆叛晉可以逞十六年言厲公驕恣若止是鄭叛厲公必不憂須諸侯盡叛然後恐懼修省欒武子曰不可以當吾世而失諸侯十六年向來欒武子多從范文子之言至此却與文子所見不同蓋武子只是虛氣司馬將中軍令尹將左右尹子辛將右十六年論來令尹當將中軍此戰却是司馬將中軍何故蓋當時子反為司馬背盟伐晉之謀皆出於子反故子重以此中軍之任特地使子反自任之要之此亦非是好意德刑詳義禮信十六年詳是安詳民生厚而德正十六年此正尚書正德利用厚生之意瀆齊盟而食話言十六年便是背盟誓之言我偽逃楚可以紓憂十六年厲公本無道才勝得楚心便驕若是未勝楚時猶可以紓憂武子曰不可十六年此只是爭一時虛氣范文子不欲戰十六年邲之戰是中軍佐欲戰鄢陵之戰是中軍佐不欲戰正相反秦狄齊楚皆強十六年此一句非是間句見得前時事勢楚晨壓晉軍而陳十六年大抵戰時自有戰所多在平原曠野之地今楚特地臨近晉壘使無列陳之地軍吏患之十六年蓋軍中必有軍吏所以録有功紀死傷者至今亦然然軍吏亦預軍謀如軍吏問日之類是也范丐曰塞井夷竈陳於中軍而疏行首十六年范丐之策自是只當時正是諸將處置未暇之時丐想突然踴躍出説所以范文子謂之童子何知焉大抵後塵議論才發得輕雖理是時亦是未是疏行首者凡軍屯處便立溝壘墻壁今楚既在晉軍壘前布陳晉軍乃決開溝壘墻壁以為戰道蓋才塞井夷竈便是平地欒書請固壘以待之十六年此亦是一説大率老將之謀多持重郤至曰楚有六間十六年郤至之所以亡正在於此蓋此謀既發於至故欒氏所以忌之至之死皆由勝楚後驕恣勝載不起舊不必良十六年此是楚軍政不修蓋自來楚之王卒皆由更代今舊人既不更代必多有老弱不良者如後漢志謂季冬之月饗故衛士饗畢罷遣勸以農桑以此見後漢時尚如此請分良以擊其左右十六年凡用兵先攻瑕後攻堅南國蹙射其元王中厥目十六年此是卜辭未占時已有此辭占者應得此辭楚是南服乃十一月卦陽自東北生而侵迫至南故以此推之此是消息之理詰朝爾射死藝十六年古之戰皆尚智謀此一句見春秋去古未逺猶不專以勇力為貴與之兩矢十六年由基自有矢所以與之者只欲此兩矢中之有韎韋之跗注十六年此是戎服韎以茅搜染成色漢宿衛行首衣纁赤之衣亦遺制可見不可以再辱國君十六年此見古人有禮處雖不是本國之君亦不敢辱之欒針見子重之旌請曰楚人謂夫旌子重之麾也十六年當時晉軍安得有楚人蓋是所獲楚之俘囚所以識得是子重之麾請攝飲焉十六年飲不專是酒看周禮漿人可見攝持也旦而戰十六年楚晨壓晉處便是察夷傷十六年楚命軍吏補卒乘繕甲兵而普亦搜乘補卒秣馬利兵普皆與楚同惟楚則察夷傷而晉不察蓋普既勝後無夷傷可察修陳固列十六年修陳是整頓行陳執盾者居前其餘執干戈弓矢之徒又各從其陳列兵法五人為小列二十五人為大列參列為七十五人便是五伍之法固列不動使之不得深入也穀陽豎獻飲于子反十六年此飲却是酒正義載吕氏春秋云子反渴而求飲豎陽穀進酒子反却之陽穀曰非酒也子反受而飲之此説却是普入楚軍三日穀十六年正欲循城濮例君其戒之十六年文子恐厲公擔當不去子重使謂子反曰初隕師徒者而亦聞之矣盍圖之十六年以孫叔敖與伍參事論之此皆是子重不好處戰之日齊國佐髙無咎至于師衛侯出于衛公出于壞隤十六年所以載此事者可以見當時欒書待諸侯之師不至只普師獨去故後來楚公子茷譖卻至曰卻至實召寡君以東師之未至也可見秋會於沙隨謀伐鄭也十六年鄭自鄢陵之敗後卻堅意事楚蓋當時感楚王之傷却不肯叛楚也直到鄭伯死後方從晉卻犫為公族大夫以主東諸侯十六年普是伯主諸侯來多所以使公族大夫兼管取貨於宣伯十六年卻犫是當時大國專權之臣小國諸侯皆可結托七月公會尹武公及諸侯伐鄭諸侯之師次于鄭西我師次於督陽知武子以諸侯之師侵陳遂侵蔡諸侯遷于潁上鄭子罕宵軍之宋齊衛皆失軍十六年大抵鄭自鄢陵敗後全不肯服晉蓋楚王為鄭之故傷其目所以深感他師逆以至十六年魯師在後不敢獨進所以待普師來逆而後進知武子以諸侯之師侵陳蔡十六年蓋陳蔡是服楚者所以侵之子臧反曹伯歸十六年子臧之反只為曹社稷之故不忍宗國之亡耳及既反後盡致其邑與卿終不肯失身於篡弒之朝然太子既被弒子臧之賢又國人所願立以為君子臧不從國人之欲無乃處之太潔蓋君子之道不一端或出或處或默或語子臧一則是處已髙一則是不當立使當立時於左傳中必自有辭可見魯之有季孟猶普之有欒范十六年此四家皆普魯之世家大族欒氏之族初自欒枝以來未甚專權至欒書為中軍帥專主普政後欒氏始盛范氏之族初自士蒍為司空以來亦未盛到得士會為中軍佐其政皆自己出所以始盛馬不食粟十六年君之馬食粟臣馬芻秣而已此言文子之儉出僑如而盟十六年此是內大夫盟大率春秋內大夫盟時亦不是一般如襄二十三年毋或如東門遂殺嫡立庶此是出其大夫為戒於國中而盟者其他內大夫有不和而盟者各自有例史記秦紀載操國事如嫪毐不韋者籍其門視此如此例亦是一例聲伯夢涉洹十七年聲伯夢涉洹一事此見左氏好怪處其有焉十七年其是未定之辭豈有死之不恤而受敵使乎十七年此言戰時楚子問卻至以弓之事此是厲公不明處然欒書譖卻至時當時為卻至計者亦有辭何故蓋樂針當鄢陵之戰時亦致飲于子重此事亦可説也君盍嘗使諸周而察之十七年普前時有驪姬之難詛無畜羣公子後來成公已立自有公族大夫掌羣公子了何故悼公尚在京師想當時須别有故欒書使孫周見之十七年書何故能使得他出見卻至蓋悼公在羣公子中素有民望想欒書與之亦厚所以能使之見至也與婦人先殺後使大夫殺十七年凡田獵時以草為防虞人先逐獸於圍內以待君之發故君得先殺大夫次之至北齊時此制尚在北齊主當正射時周兵來即欲去潘妃曰更射一圍是也卻至奉豕寺人孟張奪之十七年蓋得豕便是得雋召韓厥韓厥辭十七年韓厥辭欒書此意亦未為全善普欒書中行偃葬厲公於翼東門之外十八年左氏特書翼東門之外此見得不入兆域如僖公三十三年鄭文夫人葬公子瑕於鄶城之類殺國佐於內宮之朝十八年國佐如何在內宮蓋古者亦自有臣見小君之禮如夫子見南子是也內宮若漢之東朝棄命專殺十八年謂國佐從諸侯圍鄭以難請而歸此是棄命殺慶克以穀叛此是專殺齊侯反國弱使嗣國佐禮也十八年國氏是天子命卿當無絶其嗣天子有二守國髙在是也普悼公即位於朝始命百官十八年悼公即位始命百官一假亦不專是一時事亦統記即位以來政事如此須參國語一假看見得氣象甚好大國無厭鄙我猶憾十八年此二句連上文説言楚惡魚石以德於我必責報於我無厭雖以我為鄙邑猶以為未足也收吾憎以贊其政十八年如楚申公巫臣之類以塞夷庚十八年夷庚當考地理宋約魚石于彭城彭城是徐州宋是南京相去甚近杞桓公來朝問普故公以普君語之十八年此見得悼公即位諸侯皆説他好諸侯才做得好四方諸侯皆相聞而來此意亦好看季文子問師數於臧武仲十八年當時之數不可得而考然哀公八年傳云魯賦八百乘以此知魯本有千乘只隨事減耳會於虛朾十八年此是會諸侯借兵葬成公書順也十八年此句杜氏注得好蓋魯自隱公以來未有以善終者隱桓皆見弒莊公雖薨於路寢其後共仲作難閔公又見弒僖公薨於小寢文公薨於臺下而襄仲又殺惡及視至成公薨葬始皆得禮襄公楚公子申為右司馬二年此司馬是令尹之二者文公十年孟諸之役復遂為右司馬此司馬又是一時間制度孟獻子曰寡君敢不稽首三年當時襄公方七歲應對之辭皆獻子代為之晉侯謂羊舌赤曰必殺魏綘三年是時羊舌赤與晉侯在內而魏絳適自外至以順為武三年順是不亂行之謂請歸死於司寇三年死即是尸古書死字多訓尸字春秋及漢皆然前漢廣川惠王傳惠王幸姬陶望卿自殺望卿前烹煮即取他死人與都死并付其母顏師古曰死者尸也公跣而出三年蓋古人坐於席上無屨唯下堂則有屨與之禮食三年此皆公食大夫禮與燕禮不同蓋燕禮以酒為主食禮以食為主子罕善之如初六年如三年不反然後收其田里之類齊侯滅萊六年齊侯自五年四月圍萊至六年十一月始滅之以此考之亦非是萊專恃賂於夙沙衛於鄭子國之來聘也六年此是紀事之法蓋當時未有年號可紀故以一件大事記其年如季武子舉沙隨之會為魯君之生如杞桓公卒之月是當年經涉未逺故以月言叔仲昭伯為隧正欲善季氏請城費七年當時季氏雖強徒役之人尚屬隧人至後作三軍時豈復有尚屬公室之意請立起也與田蘇遊而曰好仁七年田蘇想是晉國敬信砥人蓋言既與賢者相處又為賢者所推許此人必别於此又見田蘇氣象亦别正直為正正曲為直七年正直兩字與誠信兩字相類誠即是誠信則又與未信相對在參和為仁七年此古人説仁字完備處惟參上兩件方是仁韓退之直曰博愛之謂仁終不免有未備處使韓無忌掌公族大夫七年想無忌廢疾亦不甚害事故可為公族大夫之長如卻克跛之類如不可用時當時亦不教他代獻子為政衡而委蛇必折七年此言人順理時當徐緩安詳以行之若違理時無速改意亦徐緩以安之則不可此正説孫文子無悛容子駟使賊夜弒僖公而以瘧疾赴於諸侯七年子駟弒僖公而悼公不能討想恐鄭從楚耳傳言經所以不書弒七年大凡杜預注左氏及正經多謂從赴告舊嘗以為不然近來看得亦有一半如此非是全不是只如聖人作春秋亦只因魯史約之以示萬世若魯史所無必不強加魯史不從赴告亦無由得知然杜預以從赴告解魯史則固然若以赴告解經則謬矣杜氏止識魯史之例而聖人之意固不知也太史公謂孔子次春秋約其辭文去其煩重鄙我是欲八年此言楚貢賦重與中國不同如漢胸奴賦亦重武子賦彤弓八年范宣子之對見得他敏處觀左氏所載引詩處多與毛詩合以此知齊韓詩未可盡據樂喜為司城以為政九年司城雖在右師之下此言司城為政蓋權在六卿之上如齊有二卿國髙皆天子命卿而管仲雖非天子所命齊國之事皆主於仲看此可見使西鉏吾庀武守九年不必作武庫説兵徒守衛皆是祝宗用馬于四墉九年此恐是商制今不可考宋之官制皆是商制武王滅商之後自可盡從周制何故存商之制蓋聖人之心正欲存前代之遺制使後人參酌用之耳亦欲忠質文迭用宋之火備亦見平時備之有素元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事九年此乾之文言如此説如何穆薑先能言蓋此言自來相授受孔子因取以為乾文言耳歐公以此為文言非孔子作恐不然斬行栗九年蓋古時道旁多樹栗固欲為戰地亦欲紛擾之晉士莊子為載書九年士是士師如何做盟書蓋周禮司盟屬秋官則盟辭亦士之職也公孫舍曰昭大神要言焉若可改也大國亦可叛也九年前時子展堅意欲從晉到此却不肯改盟辭後來却從子駟從楚何故蓋當時見晉之盟辭曰唯晉命是聼而或有異志者有如此盟有勢力驅脅底意子展到此却不得不出來助子駟亦不是相反會於柤會吳子壽夢也十年諸侯會吳于柤會吳是春秋大事使周內史選其族嗣納諸霍人禮也十年凡左氏傳中言禮也非是徒發亦是一時典禮如此問曰晉滅逼陽取其族姓納諸霍人亦謂之禮可乎曰逼陽固不當滅然想見古者有罪當滅之國天子不欲滅其族姓故納之同姓之國此亦是禮也獻兆於定薑十年往往定薑曉了所以必獻于定薑子駟為田洫司氏堵氏侯氏子師氏皆喪田焉十年井田之制百夫有洫一井廣尺深八尺曰洫子駟欲再整頓田洫而司氏之徒皆喪田此見得井田之制已壞久矣蓋緣司氏之徒平時侵占舊洫之地以為田到此整頓時所以皆喪田於是子駟當國子國為司馬子耳為司空子孔為司徒十年鄭之官制以司馬為首司空司徒次之又與他國先後之序不同蓋當時諸國官制各自别諸侯之師還鄭而南十年南近楚北近晉王叔之宰與伯輿之大夫瑕禽坐獄於王庭十年昔周制四命賜官則方有家臣大夫不得有宰到春秋時大夫亦有宰如石碏使共宰之類不為大夫時則不得有家臣如子路以門人為臣如哀二十三年類蓋施孝叔不是宰亦有家夫人亦有家臣如哀二十三年使求薦諸夫人之宰此想是國君賜者所以有臣以管其家事此見得周制都壞諸國皆不遵守到此王叔有宰伯輿却無宰只有屬大夫屬大夫則非臣也意者伯輿卑未至四命所以不得有宰亦足見周之遺制王室尚能守在季武子作三軍十一年孟氏稍弱所以只使半為臣季氏強直欲盡無公室載書曰凡我同盟救災患恤禍亂同好惡奬王室十一年亳之盟辭與戲之盟辭不同蓋亳盟辭却出於公楚子囊乞旅于秦十一年不謂之乞師者蓋旅亦不多五百人為旅鄭人使良霄太宰石􅎢如楚十一年太宰却在良霄下又見鄭官制别處大抵諸侯各自不同會于蕭魚十一年晉悼公自蕭魚會後雖不全弱畢竟驕後來衛之亂不能討伐秦又不肯濟處皆可見鄭人賂晉侯以師悝師觸師蠲歌鍾二肆十一年春秋時惟鄭多以樂與人如蕭魚之會以師悝師觸師蠲與晉尉氏司氏之徒出奔宋又與宋師茷師慧亦足見當時已不喜古樂皆喜鄭衛之音然鄭衛之音所以為邪聲時亦緣地近紂之所都染紂之習如此秦庶長鮑庶長武十一年此自是秦官制直到始皇時亦有此官范宣子讓十三年若以次第論來士丐既為中軍佐今合中軍帥儀刑文王萬邦作孚十三年意只在能法則上古人引詩意寬看詩者當如此謂之昏德十三年如哀二年晉敗鄭趙簡子爭功緣晉之衰世便有此樣事出范宣子數吳之不德也以退吳人十四年如晉惡吳當不令預會可也何故數吳之不德而後退之蓋晉霸主特地示此於衆人昔秦人迫逐乃祖吾離于瓜州十四年瓜州今西夏外毋是翦棄十四年言不欲滅其族類薑戎是堯四嶽之胄或有居中國或有居戎狄者無令翦削秦師不復十四年蓋殽之敗匹馬隻輪無反者今官之師旅無乃實有所闕十四年官之師旅不敢指執政只指在下者言如言執事之類棄其室而耕十四年如魯語文公欲弛孟文子之宅對曰若罪也則請納祿與車服而違四者惟里人所命次又曰公欲弛敬子之宅對曰請從司徒以班從次里人司徒皆比夫家衆寡之吏有罪去位則當受舍於里宰以此類推之棄室則與庶民同矣蘧伯玉從近關出十四年此須連後獻公歸時一節看方可見蘧伯玉好處蓋初間出時是辟禍不肯預亂此人之所易到後來獻公歸時乃是行賞底時却亦自近關出如此方見蘧伯玉尹公他學射於庾公差庾公差學射於公孫丁十四年左傳載尹公他與孟子所載不同要之左氏得其真孟子亦據傳聞耳師曠對晉侯十四年師曠所對一假乃左傳中一假大綱領范宣子假羽毛於齊而不歸十四年此亦見晉君臣漸不如蕭魚以前宋向戌見孟獻子尤其室十五年宋向戌與孟獻子相見之初便責他室美是何故蓋賢者氣味相入故一有未盡處便如舊交須是理會得此意官師從單靖公逆王后于齊十五年官師想是一司之長如卜人以太卜為長之類楚公子午為令尹十五年公子午為令尹一假亦見楚官制屈到為莫敖十五年莫敖所以名為敖者蓋楚人之祖楚君有若敖後來君既為王故其臣謂之莫敖齊高厚之詩不類十六年此見得齊用事底人意欲叛晉而歌詩便不類亦見古人風俗尚純處然齊之所以見逼於大國皆由髙厚夙沙衛之徒
