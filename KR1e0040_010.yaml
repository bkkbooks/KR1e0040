body:
  text: 左氏傳續説卷十宋吕祖謙撰昭公謂圍將使豐氏撫有而室元年撫有兩字正如詩所謂鳲鳩居之相似圍布几筵告於莊共之廟而來元年儀禮士昏禮只告禰廟此告荘共之廟者恐是大夫之禮其敢愛豐氏之祧元年祧即祖廟必遷於祖廟楚公子圍設服離衛元年離衛如離坐離坐之離盖古人以兩人相對為離苟或知之雖憂何害元年苟或知其後來有樂時今雖有憂何害以下文攷之杜註恐錯子羽謂子皮曰叔孫絞而婉宋左師簡而禮樂王鮒字而敬子與子家持之皆保世之主也元年觀諸大夫議論王子圍設君服一段子羽言數子皆保世之主然子羽却自親與伯州犂争曰假不反矣曰當璧猶在子其無憂乎却又自不知以此知論人處易得明子與子家持之元年操其兩可都無可否樂桓子相趙文子欲求貨于叔孫而為之請元年趙文子此一段最好然而樂王鮒不是可在左右底人却以為相者何故盖樂桓子是平公嬖大夫所以趙文子以正卿出㑹諸侯猶使嬖近之臣監臨者亦見得趙文子猶有欠處良臣將死天命不祐元年良臣將死天命不祐此醫和所以責文子盖古者大臣之職保君體養君徳此正是大臣職事凡君之夀夭古人皆歸之大臣如無逸戒成王周公數曰或五六年或四三年如漢昭帝之夭蘇子由古史却責霍光皆此意天有六氣降生五味元年五六天地之數素問一部書亦不出五六兩字如六元六氣之類皆是雖所用處有不同而六五之數則一盖隂陽互相交也尋常天之數是五而今却是六地之數六而今却是五正是天氣下降地氣上騰如女陽物而晦時女本是隂却為陽物三先生語録一段亦好看殺太宰伯州犂于郟元年伯州犂亦王子圍之黨而終為王子圍所殺何故盖伯州犂亦智謀底人終必忌他葬王于郟謂之郟敖元年楚以未成君者為敖郟敖立為君多時而亦曰敖者亦以其弱故以未成君者名之也謂陳無宇非卿執諸中都二年執陳無宇此見晉侯昏處屬有宗祧之事於武城四年盖嵗三田一為乾豆子産作丘賦四年子産作丘賦只縁子産忒煞要齊整故一時間雖是暫時做得去然終是貽禍於後來然其所以如此亦縁他恃才之過觀初間不肯毁鄉校時便不肯如此斷須要做故子寛曰作法於凉其弊猶貪此義論説甚是然使子寛執政時未必做得似子産只縁在旁邊看得來易分明偪而無禮四年偪是褊偪常常放不下楚沈尹射奔命於夏汭四年奔命便是起兵豎牛欲亂其室而有之四年豎牛為亂於叔孫氏只縁父子之情不相通孟有北婦人之客四年北便是指齊説杜註以為便是公孫明恐見不得公與之環使牛入示之四年古之幼者受人之賜必獻之於尊者内則曰婦或賜之飲食衣物則受而獻諸舅姑可見此禮使三官書之四年此段見諸侯三卿之制天子六卿諸侯三卿司徒兼冢宰之事司馬兼宗伯之事司空兼司宼之事此雖一事而三官皆與又見得三卿相闗處舍中軍五年初作中軍孟氏取其半焉固是比之叔季有間矣至舍中軍四分公室季氏擇二二子各一盡征之而貢于公則孟氏至此已與叔孫氏同矣宜夫墮成之時為公歛處父所沮而孟孫亦不復克己以徇公家也薳啟疆曰苟有其備何故不可五年楚薳啟彊曰苟有其備何故不可一段以昭三年叔向對齊晏子言戎馬不駕卿無軍行觀之晉室甚是衰弱至此啟疆却説晉長轂九百遺守四千尚有許多兵賦許多賢人而晉室猶如是之强雖楚王無道而虚説欺之亦不得當時叔向之言亦不是虚須要識叔向啟疆之言以襄三十一年魯叔孫穆子言晉君失政大夫多貪觀之是在公與私之間其後為戰國亦只是私諸卿皆無心於公室若是韓起叔向被楚囚辱則其私起報讎定是楚不可當雖車乗人馬衆多仍舊無統紀所以漸漸至於晉亡正縁如此戎馬非是君之戎馬如范文子立於戎馬之前知戎馬是君之戎馬乃晉君偷安避勞盟㑹不出故戎馬不駕如魯之四分公室兵賦皆歸季氏都不歸公室言卿無軍行見六軍各自為私計皆不為公室計故以配日七年以十甲配以十二辰謂之配此便是天六地五之數孔成子夢康叔七年大率古人尊祖見於夢寐時者亦多説是祖如曹夢曹叔振擇之類亦是宗法行故人常念其祖譬之如天其有五材而將用之力盡而敝之十一年此便是五行更旺氣盛則易衰若今年多雨明年必多旱之類不可復振只是不可整頓古人言語如此自戰國來此等議論便斷絶五大不在邊五細不在庭十一年此二句之解註疏雖多不同亦可看然亦難考鄭丹在内十一年丹本不為害其意欲説棄疾且相帶他子産相鄭伯辭於享十二年諸侯在喪皆稱子至此鄭簡公未葬却言鄭伯見得春秋初制度到此漸變漢書十二年四月髙祖崩五月丙寅葬長陵皇太子羣臣皆反至太上皇廟此至太上皇廟正如晉朝武宮相似盖纔朝祖廟便是太子然稱帝猶太子者亦在喪稱子之意此皆古制尚在處恵帝紀云五月丙寅太子即皇帝位至此方稱帝投壺十二年投壺與射皆是樂賔以二者論之投壺禮簡射又大於投壺古人宴時有此禮禮記與左傳不同記主人先讓賔左傳晉侯是伯主所以先之此制固不同至齊却舉本國渑水名晉言淮却不言晉水盖伯者以統天下言之禮記載投壺之禮先宴飲之後主人奉矢請賔投壺賓固辭主人固請乃從主人送矢賓受矢就筵司射進度壺請賓曰順投為入比投不釋勝飲不勝者主人亦如之然後奉貍首卒投命酌者行觴然後正爵行正爵行然後遂徹馬馬即籌也徹馬之後遂行無算爵寡君中此為諸侯師十二年此句是説得不是與君代興十二年言與晉迭為伯主左傳載此處不是閒事以齊侯出十二年盖縁齊聞得伯瑕穆子之言恐晉君别有勝處所以做道理使齊侯出觀從以蔡公之命召子干子晳十三年觀從偽人以蔡公之命召子干子晳蔡公何故不討觀從後來觀從却與衆奉蔡公召二子而盟于鄧盖當時靈王威令可畏棄疾恐事不成故見之而逃且看當時事勢如何後來見得蔡人皆從觀起事勢已成棄疾之意謂若當此時執觀起於楚時楚王亦不信必不赦棄疾故蔡公亦乗勢做起到後來因正僕人殺太子禄見得根本都無人心皆離譬如枯朽之木遇風便倒向使楚王當子革歌祈招之詩時便自改悔亦未便如此先除王宫十三年除是掃除肅清宫闈以待新王之入也陳蔡欲為名故請為武軍蔡公曰欲速且役病矣十三年葢當時楚王出在乾谿觀從之徒正是乗他之虚而入豈容稽緩然此不獨不可稽緩又民力勞疲矣申亥求王遇諸棘闈十三年想是時都無人子若以君命賜之其已十三年叔向便是教他以一篋錦與羊舌鮒却以君命賜之也然兄弟之義正當掩惡叔向却直如此説鮒時何故想見鮒平日氣味與叔向不同叔向亦是話不得故忿辭遂至於此左傳書未退而禁之一句見得鮒想是輕淺貪賄底人天子之老請師王賦十三年曲禮云五官之長曰伯稱於諸侯曰天子之老明王之制十三年所謂明王之制皆是東遷以前制度當考東遷以前制度作一處東遷以後制度作一處然東遷前制度後人添入處亦多寡君有甲車四千乗在雖以無道行之必可畏也况其率道其何敵之有十三年寡君有甲車四千乗在此數句大不似叔向平日言語何故此須看晉室衰弱當時卿帥皆無人肯出來理㑹公室故叔向此一舉最是不得已處治兵邾南試為整頓故其言所以出於此然其辭氣却不是尋常虚氣也卑而貢重者甸服也十三年凡在甸服者雖有子男之卑其貢亦重行理之命無月不至十三年葢鄭在南北之衝諸侯往來者多矣使狄人守之十三年狄人喪大記所謂狄人設階之狄人是樂吏之賤者祭統又曰閽吏之賤者若以昭十七年觀之又恐只是夷狄請從君惠於㑹十三年子服惠伯初間要歸後來却須待㑹諸侯而後歸何故葢一時且做箇模様耳其實却自要歸詰姦慝十四年詰亦是搜索之意不欲使姦宄之人雜在良民中禮新叙舊十四年新是新用之人不以新用之人超越在舊人上如此則意思均平今之人多加禮於新者而棄其舊禄勲合親十四年勲只是有功者未必盡是才能但禄之而已合親是古之大事其間事甚多三年之喪雖貴遂服十五年杜預謂諸侯之制凡葬後即除服但諒闇三年終制此是但見春秋時制不識古制古者三年之喪自天子達於庶人故孟子曰古之人皆然此正謂三年之喪又謂葬後便稱君其間雖有未葬纔踰年則即位改元稱君此亦是以春秋時事推來看耳温公通鑑論中一段甚好忘經而多言舉典十五年春秋人才多知大體且周王能點檢晉籍談之失非不是而周王之失又被叔向點檢出來然籍談之失小而王之失却大大抵人好點檢人之小失而自己大處更不知此最害事宗周既滅十六年是周自東遷之後已有滅亡之兆子寜以他規我十六年此一段見子産失處子齹賦野有蔓草十六年他繼父之官年雖幼而居六卿之先所以在子産上者盖子産感子皮之徳故其子代父為卿不降其班次使居已上如先軫死事晉侯即以其子且居將中軍相似非常禮也若尋常父死子代即班諸卿下春秋此例甚多太史曰在此月也十七年謂正月朔孟夏時事也故却引夏書辰不集於房事夏書所説是季秋時日食事却不是正月事何故引説盖此却不是他引錯前云日過分而未至尚用此禮則過秋分未冬至用此禮宜矣故季秋事所以引證孟夏之禮孟夏是純陽之月其事又重耳少昊為鳥師而鳥名十七年五鳩之官與曲禮五官合古時命官以天道為先故伏羲以司厯為首堯典以羲和為首後世以人事為重故司厯之官以小官為之耳觀周禮可見𫉬其乗舟餘皇十七年乗舟是君舟稱乗如乗馬之類使隨人與後至者守之十七年此是有隨國人在此故使守之如十三年晉人執季孫使狄人守之一般當時有赤白狄人在故使守之正義云是時有北狄在㑹故使守之恐亦不可知以使隨人一段觀之則狄人守之即是夷狄之狄不必作禮記樂吏之狄盈其隧炭十七年用炭實於塹隧之間以虞吳人之奪舟故也陳以待命十七年陳列以待吳人來戰之命禆竈欲用瓘斚禳火子産不可子太叔曰寳以保民也子何愛焉十八年此見得子太叔不如子産處到後一節衆人又却不如子太叔吾不足以定遷矣十八年此句杜氏注得極好使司㓂出新客十八年盖司宼詰姦且本是掌客之官故使之巡羣屏攝十八年羣是百神之位屛是屏翰障蔽之所使府人庫人各儆其事十八年先宗廟了然後及府庫財賄之事儆司宫十八年不必從杜註作巷伯寺人之官即是公宫之官出舊宫人十八年此是易得冷落底人而意思却先到此見古人事事有法司馬司宼列居火道十八年火作恐有攘奪之人故使主兵主刑之官防閑之稍有攘奪者即以軍法制之鄅人藉稻十八年是親自看人收刈言其國小無政從帑於邾十八年是從其妻帑於邾如寘其帑於戚往者見周原伯魯焉十八年晉文公已伐原何故周又有原原是原荘公之後以原為氏大人患失而惑十八年杜氏注謂是患有學而失道者以惑其意若今有曽為學底人或至夫其所學與所學悖戾人便以為學無益此所謂患失而惑於是乎下陵上替能無亂乎十八年學只是理㑹君臣上下父子兄弟纔不學上下之分便亂如成湯肇脩人紀亦只是此事不比後人祗學文章鄭子産為火故大為社乃簡兵大蒐十八年社有侯社有鄉社侯社是一國之社鄉社是一鄉之社此是因國社而後蒐大㑹一國之人所以用社而蒐晉之邊吏讓鄭十八年鄭授兵登陴晉之邊吏何故便知盖授兵不獨在國内凡邊鄙皆有備故晉所以來責令尹子瑕城郟十九年大率楚之規模常向外經營今則收拾向内此所以見得楚衰晉問駟乞之立故子産不待謀而對客十九年此一段見子産於衆人皇惑之中獨處得有精神初間不管他亦是駟氏族彊難制及晉使來子産却欲存鄭國體面請龜以卜十九年古者諸侯藏龜家不寳龜子産以禮治鄭國所以行古之制施舍不倦十九年是施恵以舍勞役非是兩事觀施舍己責一句可見民樂其性十九年民樂其性此是古語如饑食渴飲耕田鑿井皆是安其性司馬法曰古者師出不踰時所以養其性也古人説性豈如後來虚無之論非撫之也十九年侍者所謂息民特見其小處沈尹戌却見得大處伍奢對曰君一過多矣何信於讒王執伍奢二十年伍奢積忿之久發言太粗以激王之怒太子建之逐奢亦不能無罪王召奮揚奮揚使城父人執已以至二十年奢揚亦是㑹處事底人不忍太子先遣他走固是好而他自處得尤好使城父執已以往此已是減楚王一半怒然而楚王不便殺他而却好去召他時何故盖奮揚是司馬兵權却在他齊侯將飲酒徧賜大夫苑何忌辭二十年齊侯時為子石宴如晉侯食魏絳一般此是公食大夫禮琴張聞宗魯死將往弔之二十年宗魯死胡氏春秋論得是公曰子死亡有命余不忍其訽二十年夫元公初間與夫人每日必適華氏食公子而後歸其愛子之意如此其切到此却與前時意思不同何故盖元公往來亦自憚煩又不忍其訽辱所以有是説華登奔吳二十年華登之才與伍子胥相似觀國語所載吳之與越唯天所授王其無庸戰夫伍胥華登簡吳國之士於甲兵而未嘗有所挫則登與胥大略亦可見也使有司寛政毁關去禁薄斂已責二十年齊侯欲誅祝固史嚚晏子一諌而齊侯便使有司寛政毁關去禁薄斂已責此不可謂不從諌然而齊終不競何故盖紀綱大處不曽改得雖目下一二事做得好時亦竟不濟事招虞人以弓二十年葢虞人相去逺不可以語言召故特揭弓以示之使知所召守道不如守官二十年此所謂道只是謂常人平常所做底事若謂所守之道則守官便是守道原不是兩般子猶馳而造焉二十年見得嬖人取媚如此晏子謂和如羮一段極論到義精處大抵古人為學精粗不是兩事出入周疏二十年此皆説樂之節奏轉換處若琴瑟之専一二十年如史記載鄒忌論大弦小弦之類是也其次莫如猛二十年聖人不曽説猛但説嚴恐非夫子之言子産古之遺愛二十年孔叢子曰子産死鄭人丈夫舍玦珮婦女舍珠瑱巷哭三月竽瑟不作此類皆是晉士鞅來聘叔孫為政季孫欲惡諸晉二十一年魯不獨専是季孫執政叔孫亦有執政時季孫不恤國體却要陷叔孫于不好處加四牢焉為十一牢二十一年魯本是守禮之國今則如此則天下大勢可知此段最要看與公謀逐華貙二十一年縁貙之黨盛故謀其子與君同惡二十一年葢平王既弑靈王必怨靈王而東國又怨靈王之殺其父同惡相親故東國於楚平王為相得也齊帥賤其求不多二十二年不過畧取些財物耳王子朝賓起有寵於景王二十二年劉獻公之庶子伯蚠事單穆公二十二年左氏叙王子朝事極有法言王子朝賓起有寵於景王見得他勢焰如此次却説劉獻公之庶子伯蚠事單穆公伯蚠既是庶子又為家臣其微如此似不可敵然子朝之亂全得伯蚠之力左氏先如此叙時見得他初間雖微如此然所助者正故其後終能以定其亂荀吳使師偽糴二十二年荀吳初間伐皷時如此信到此間却偽糴何故盖荀吳本不是信只欲就一事上特地做出信來故後來所以如此大凡霸者之事多如此王子朝因舊官百工之喪職秩者與靈景之族以作亂二十二年王子朝之亂與宋亂相似只縁立太子不定盟百工於平宫二十二年古者工不與農並處百工自是一處叔孫曰列國之卿當小國之君固周制也二十三年左傳如此等句不是閒句見得周制尚在士伯御叔孫從者四人二十三年此是特殺其徒從以辱之也古者卿行旅從雖未盡有許多人亦不止此四人而已叔孫旦而立期焉二十三年此見得不苟底意思想是必欲請其徒從而後往盖當時都與他放散了范獻子求貨於叔孫二十三年范獻子求貨此全無故家子弟氣味韓宣子雖懦弱故家風味猶有在者周之亡也其三川震今西王之大臣亦震二十三年南宫極震如何却引三川震來説盖大臣與山川輕重一般是故五岳視三公四瀆視諸侯楚囊瓦城郢沈尹戌曰子常必亡郢二十三年子常城郢何故沈尹戌謂之必亡子囊城郢何故謂之忠盖子囊雖欲要城郢然其規模却不専在城郢上子常是子囊之後彼但習見其祖之規模欲城郢故為令尹之初便去城郢此只是學得一事大處却不曽學得故其引詩曰毋念爾祖聿修厥徳正欲其法乃祖之修徳耳險其走集二十三年此是衝突處無亦監乎若敖蚡冐至于武文土不過同二十三年此兩句最要看見得東遷之前都未有吞并土地者到得滅國廣地之風皆是平王之後晉士彌牟逆叔孫于箕叔孫使梁其踵待于門内二十四年叔孫昭子却欲害晉臣其計亦甚拙矣盖昭子之意亦明知此計本不濟事但一時間不肯甘心就死耳正如絳侯使家人持兵事相似晉侯使士景伯涖問周故二十四年秋官小司冦詢立君此是獄官之職也君子貴其身而後能及人是以有禮二十五年此原出人情甚好盖人多鄙薄家中人者正欲自貴其身而不知欲自重其身乃所以自賤其身為夫婦外内以經二物二十五年乾陽物也坤隂物也為父子兄弟姑姊甥舅昏媾姻婭以象天明二十五年父子兄弟父族也姑姊甥舅母族也昏媾姻婭妻族也禮上下之紀二十五年自天子至庶人只是君臣父子子太叔一段自治身治國治天下事皆備葢春秋以前未有異端人人皆講明此道飲食上皆有工夫後世都把做閒事看了所以都無工夫宋樂大心曰我不輸粟二十五年此見得晉衰處前時何敢如此然當時宋固可責晉亦當自反文武之世童謡二十五年童謡鸜鵒此亦當時増益不應得如此親切公曰善哉二十六年齊侯聞善言非不感動却不能行何故盖資質柔弱安於苟且不肯自勉故聞晏子之言則曰吾今而後知禮可以為國聞夫子君君臣臣之言亦曰善哉當時陳氏亦未甚强使景公雖未能用夫子若能用晏子亦未至於陳恒弑君之地齊終至於衰微則縁景公説過了便休以此知學者聞人善言不實踐履終無益也君令而不違二十六年命令雖自君出須是當天下之公理合天下之心使人不違方得父慈而教二十六年慈則須是教之以義方若徒慈而不能教則姑息而已子孝而箴二十六年孝子之意常在父母之身故父母有過便能於萌芽時獻箴不待其著夫和而義二十六年夫本剛故濟之以和若柔昧暗弱反受制於婦人不得謂之和既和則又濟之以義妻柔而正二十六年婦人之質本柔順須是正姑慈而從二十六年婦人有三從之義在家從父母既嫁從夫夫死從子婦聼而婉二十六年是與不是皆當聽不當問左司馬沈尹戌帥都君子以濟師二十七年君子乃是士尋常既為士則不調發惟吳楚多有此盖事勢急則為士者亦從軍如越有君子六千人是也公子光告鱄設諸曰不索何獲二十七年盖中國有不慮胡獲弗為胡成之論他遂謂不索何獲當初本説君子為善當力去做小人却借此論就不好事上説季子雖至不吾廢也二十七年季子内為國人所敬服外為鄰國所敬信他若要討時其力甚易後來所以不管事只縁季子是髙潔底人見國中有人主之則不去理㑹子惡曰令尹將必來辱為恵已甚二十七年此見郤宛為人格低郤宛見令尹來飲他酒已不勝其喜此所以中費無極之計而不自覺無極謂令尹曰此役也吳可以得志子惡取賂焉而還二十七年盖見令尹好賂故特説子惡取賂令尹之意必怒子惡不分賂於己此見得左氏無虚辭又應前面子常賄而信䜛處季氏之復天救之也二十七年季氏初間為昭公伐時甚危已被昭公圍欲殺之今復得保全亦是天救本是公徒怒季子今公徒却自説甲豈非天息其怒乎孟氏望見叔孫氏之旌乃從季孫豈非天啟開叔孫氏之心言魯昭之敗季氏之盛皆由於天有十年之備二十七年未必有此特張大言之耳事君如在國二十七年如獻糧食幣帛車馬之屬依舊供去亦是他不得不如此訪於司馬叔㳺二十八年盖叔㳺是當時賢者如楚申叔豫相似盈曰祁氏私有討國何有焉二十八年大凡家臣卿可自討但不可専殺必告之君而後誅之如田儋𫝊載田儋從弟榮榮弟横皆豪傑宗彊能得人陳涉使周市畧地北至狄狄城守儋陽為縳其奴從少年之廷欲謁殺吏服䖍曰古殺奴婢皆當告官儋欲殺令故詐縳奴以謁也以此看來則春秋之時可知夫有尤物足以移人苟非徳義則必有禍二十七年凡世間惟徳義則無害舍徳義之外則凡物皆能害人且聲色貨利其害固易見如古人有好學字亦有至喪身者則其他可知易兌卦曰麗澤兑君子以朋友講習夫兑説也天下之可説者多矣而只説朋友講習一事者盖他物則不可説帷講習則是徳義之事故儘説則儘不妨平公强使取之二十八年平公强叔向取申公巫女何故此是愛人不以道處當時之所賴者惟叔向所敬信者在叔向且博物洽聞足以動人平公愛之久矣到此見叔向意欲取巫臣之女而其母沮之故平公之意以為其母雖不肯我以君命臨之則亦無不可其意只是要悦叔向之心而不知愛之非其道也故後來滅族喪家其禍卒始於此然使叔向不肯順從君意能不動心於此則叔向十全底人亦縁叔向自有此意到此遂從而娶之此是叔向大段闕處後漢宋𢎞傳載帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容徳器羣臣莫及帝曰方且圖之後𢎞被引見帝令主坐屏風後因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣彼宋𢎞苟從光武之命則其見重必不如初時惜乎叔向不能如此禮記曰私恵不歸徳則君子不自留焉正是此意分祁氏之田以為七縣分羊舌氏之田以為三縣二十八年以魏獻子為政之時觀之此田尚歸公室後來漸歸於私家逺不忘君二十八年常人在下僚時去君甚逺多不與同休戚戊雖在下僚却不忘君此人所難處近不偪同二十八年盖戊是正卿之子其勢甚近易得陵逼同列他雖是正卿之子却不以逼同列居利思義在約思純二十八年此是窮達對説有守心而無淫行二十八年常人處窮困時心不見可欲使心不亂則易守至於正卿之子處富貴利欲之中易得搖動却有守心而無淫行此其所難能也成鱄引詩二十八年成鱄謂魏子却舉文王詩一段何故盖曰主之徳也近文徳矣近文徳者亦是文王盛徳之中庶幾得一二耳如曰於舜大功二十之一也之意心能制義曰度二十八年如孟子曰權然後知輕重度然後知長短物皆然心為甚德正應和曰莫二十八年如為政以徳譬如北辰居其所而衆星拱之須當以此看莫然清净之意勤施無私曰類二十八年譬如春雨之降不擇髙下逺近燥濕故物各以其類而均被其澤教誨不倦曰長賞慶刑威曰君二十八年教誨不倦此為長之道賞慶刑威此為君之道書曰作之君作之師經緯天地曰文二十八年如天道剛地道柔二者相錯而後成文叔向將飲酒二十八年鬷蔑既從收器者立於堂下是既徹俎矣何如下面方謂叔向將飲酒盖古者飲燕之禮既酬酢正禮既行之後弟子徹俎既徹俎命賓坐乃羞却行無算爵此所謂飲酒正是徹俎之後無算爵之時也退朝待于庭二十八年待於庭此是家臣朝大夫衆人皆退惟二人待之於庭魏子欲食見二子未退故與之食杜氏注魏子朝君退而待於魏子之庭恐未必是朝君也古者畜龍故國有豢龍氏有御龍氏二十九年古者畜龍一段亦要看古之時如此而龍至後之時如此而龍不至亦可以見古人維持天下之意能求其嗜欲二十九年龍之嗜欲豈得而知亦無法可𫝊惟其好之故知之古人作事只一件事故精龍一雌死潛醢以食夏后二十九年此見得劉累便不如董父董父龍多歸之劉累止有四龍一龍死便無求處董父養龍是無法可𫝊官宿其業二十九年官宿其業是世世相繼安其業而不易周棄亦為稷自商以來祀之二十九年社是土神稷為百穀之長何故言自夏以上祀之以商湯既克夏欲遷其社不可凡事皆變易欲新民耳目社是有功于水土故可祀之商時無一人如句龍能平水土故易不得周棄為稷以有播種之功故可以棄而易遂賦晉國一鼓鐵二十九年鼓如令家出一鼓杜注云令晉國各出功力共鼓石為鐵恐亦難説曲禮曰獻米者操量鼓吕與叔解云東海樂浪人呼容十二斛為鼓民在鼎矣何以尊貴二十九年刑法既在鼎而不在人國人只看鼎上刑法而議論其上何有於上靈王之喪我先大夫印段實往三十年舉此一段見得天王有喪天下諸侯皆往光又甚文三十年吳本是荆蠻後來通上國而文章益盛中國至此却衰當是時如吳季札亦可見是文吳師圍弦左司馬戍右司馬稽帥師救弦及豫章三十一年豫章有兩豫章楚伐吳及豫章恐非今洪州豫章杜預云豫章當在淮以北後移在江南豫章他亦意其如此未必實有據也若艱難其身以險危大人而有名章徹攻難之士將奔走之三十一年此正是春秋末戰國有此風俗刺客之類是也他所以殺人以求名者彼以勇而無所畏忌為尚相誇以為美名如莒烏存以力聞可矣何必以弑君成名觀此可見胡文定公謂豈有人欲求不義之名此説恐當時未曽察此風俗故有此論故曰春秋之稱微而顯婉而辨上之人能使昭明善人勸焉淫人懼焉三十一年春秋之作當時權臣强族在上可以殺人可以刑人聖人欲使是非善惡明白故其辭所以微而顯婉而辨若只為一匹夫而作則定不如此婉晦既如此則能使上之人善惡昭明且如齊桓晉文當時不知其為假仁義也惟春秋書之則知其所以譎季氏之强當時不敢言其非也惟春秋書之則知其所以僭此之謂上之人能使昭明不是上之人能使春秋之法昭明何故春秋之作其法便自昭明不待上之人使之昭明也故孔子曰我欲載之空言不如見諸行事深切著明也春秋便是行事天子曰天降禍于周俾我兄弟並有亂心三十二年兄弟是王子朝與靈景之族作亂靈景之族皆從兄弟也故曰並有亂心士彌牟營成周三十二年此一段當與召誥參㸔魏舒正如周公韓簡子如召公成王城成周時凡事之細碎皆召公理㑹至大綱則周公總之今晉城成周凡事亦是韓簡子理㑹所謂韓簡子臨之以為成命近于有司至魏舒是執政之尊但提大綱書以授帥三十二年是書以上許多事件各量其國力大小以授之正如書召誥所謂周公乃朝用書命庶殷侯甸男邦采衛相似周公亦是城成周故其規模亦略相似子家子受賜大夫皆受三十二年子家子此意當細看當時諸大夫所以不受者不過謂公在羈旅惟子家忠誠懇惻體此意故獨受之
