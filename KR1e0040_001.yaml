body:
  text: 左氏傳續說卷一宋吕祖謙撰𨼆公惠公元妃孟子孟子卒繼室以聲子生𨼆公元年左氏繼室以聲子生𨼆公一段須便見得𨼆公當立底意古者諸侯繼世雖以適而不以長然元妃苟無適嗣則庶長當立自先儒皆有是說此理甚明今惠公元妃既無適子則繼室之子雖非適子却是庶長左氏首載孟子卒即載繼室以聲子生𨼆公一句而𨼆公之當立煥然無復可疑但𨼆公性質柔巽大義不明却自以先君之故謙遜退避有不敢竟當之意初不知君位原不是兩間界做得底事此却失於不敢自做非不當立也左氏載下面仲子為魯夫人事則曰有文在其手曰為魯夫人言其有文如此耳實非夫人也桓公亦均之為庶子耳叙事至此則𨼆桓之當立與否益易見矣只此一段如法吏斷案善叙陳其事而法意自在其中此左氏具文見意處所以學者要看得詳細邾子克未王命故不書爵元年邾是魯附庸之國何謂附庸之國蓋古者封國之餘别有閒地故立以為附庸尋常閒地只散在諸侯之國故諸侯之有罰者則削其地以增為閒地若諸侯之有功者則以其閒地而增封其國此亦如秦漢間置諸侯郡縣相似皆是犬牙相制底意故其閒地天子平時各自命王官掌之如周禮縣師是也縣師之職曰掌邦國都鄙之地所謂都鄙便是諸侯國中閒地論來縣師只當掌邦鄙而兼言邦國則是統掌天下可知然而所掌亦是總其目耳觀春秋之初附庸尚有未命於王者見得諸侯之國尚有閒地在邾未命邾本非諸侯至後方得王命周之封建非舉天下皆為諸侯固有閒地參差其間所以能維持天下故如邾之類至此方封本亦周地耳今人止謂王畿千里之外皆封建非也如漢之郡縣亦雜於諸侯之間亦周之遺意𨼆公求好於邾元年諸侯初即位必與與國通好此乃相交際之道魯與邾為鄰自來相依倚邾小國固依魯魯得邾亦足以為重故不得不急求好鄭伯克段元年初鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏遂惡之愛共叔段愛惡兩字便是事之因由大率人所以致骨肉之不睦者多緣此兩字婦人常情每每如此及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命制地正是鄭國險害去處便是後來虎牢之地天下大形勢如此處亦自有數如今劔閣之類莊公當時所以不與他時亦是莊公初間好意未必是恐難控制而不與之也故祭仲當時之諌但引先王都城之制未嘗有一言遽傷其兄弟之情大率骨肉之間外人苟未知得果何如時安敢便有離間底言語看祭仲第二次再說亦不過蔓草猶不可除况君之寵弟乎寵弟二字便見莊公之意猶未露竟不曽分明說破惜乎當時殊無調護兄弟底情意便只就利害上說去公子吕又曰國不堪二君將若之何欲與太叔臣請事之若弗與則請除之自此辭語展轉忿激看得莊公初間亦未便有殺弟之意只緣事勢浸浸來了此所以遂成了克段底事如公曰姜氏欲之焉辟害此等語亦是狠愎者之常談至曰多行不義必自斃與後來不義不昵厚將崩之語其意却不可回矣學者能細看得此段亦儘見得人情物理京不度元年京不度此猶是周之法制當時人猶熟知之猶以違制為不可其後人不復言周多言文襄之制矣段不弟故不言弟如二君故曰克元年自古所建立國家維持天下大綱目不過數事如三綱五常天叙天秩之類聖人作書亦如此如鄭伯克段莒以姜氏還之類則當時兄弟夫婦之間可見矣故標之於上書曰鄭伯克段于鄢段不弟故不言弟如二君故曰克此見當時風俗制度皆壞處夫兄弟相戕此是天下之大變蓋君臣父子兄弟是內治制度綱紀是外治內外相維持皆不可缺缺今以兄弟之間相戕相賊如此則當時天下可知潁考叔對鄭莊公元年潁考叔開𨗳莊公欲悔之心固善然莊公既已悔過自當直告以母子如初之理不及黃泉之言至可笑此何足復顧乃教之以僞以順其意何也蓋人各有力量極不可勉强潁考叔非不知正論然至此力量加不去只得如此說如孟子則不然其曰如知其非義斯速已矣何待來年其力量大矣凡人之進言多故為委曲遷就之語亦以此耳公㑹戎于潛二年魯㑹戎亦是戎狄通中國始見于春秋者莒人入向以姜氏還二年莒人入向以姜氏還此是係三綱底事可見天下之盛衰大抵天下之所以治者只是君臣父子夫婦司空無駭入極二年司空無駭入極注云魯司徒司馬司空皆卿也古者天子六卿諸侯三卿雖是三卿而實各兼六卿之事故三卿皆取天子之次者司徒冡宰之次司馬宗伯之次司空又司寇之次至後漢三公所謂司徒司馬司空却只用了諸侯制度周人將畀虢公政三年周東遷既衰而其舉措皆無一當者所以衰鄭當親反疏之虢將亡之國反倚之至於交質取禾之類君臣之禮亡矣秋又取成周之禾三年成周之地今人多不能分往往以王城為成周不知成周與王城自是兩處蓋天王所都處謂之王城頑民所遷處謂之成周王城即河南縣成周即洛陽縣洛誥曰我乃卜澗水東瀍水西惟洛食此便是河南縣我乃卜瀍水東亦惟洛食此便是洛陽縣然此兩處皆統屬於河南郡分别名字便有兩般其地相去亦不甚逺只都在一郡中如今錢塘仁和是也書洛誥詩王風及後漢地理志言之甚詳宋穆公疾召大司馬孔父而屬殤公焉三年宋是二王之後官制又與諸國不同故有大司馬孔父亦當時用事底臣故以殤公屬之宋宣公可謂知人三年左氏載宋宣公穆公之事而曰宋宣公可謂知人矣立穆公其子饗之命以義夫而公羊又曰宋之禍宣公為之也此論皆未確蓋宋是繼殷之後殷禮或傳子或傳弟商之法度自來如此故宣公之於穆公却不是讓禮記曰仲子舍其孫而立其子伯子曰仲子亦猶行古之道也昔微子舍其孫腯而立其衍以此觀之宣公以其子之不賢遂舍子而立弟未為不是穆公不傳諸子而必歸於殤公此所以兆亂也故宋之禍在穆公而不在宣公齊衛盟于石門三年齊僖公亦是顯諸侯當時亦能糾合諸侯盟㑹已有五伯之漸故國語謂之小霸衛莊公娶于齊東宫得臣之妹曰莊姜三年左氏叙此一句亦要見他族類之貴處賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也三年柳子厚作六逆論乃曰賤妨貴者蓋斥言擇嗣之道子以母貴者也逺間親新間舊者蓋言任用者之道也若貴而愚賤而聖且賢親而舊者愚逺而新者聖且賢以是而間之其為理亦大矣而可舍之從斯言乎晉厲公死而悼公入乃理宋襄公嗣而子魚退乃亂貴不足尚也秦用張祿而黜穰侯乃安魏相成璜而疏吳起乃危親不足與也符氏進王猛而殺樊世乃興胡亥任趙髙而族李斯乃亡舊不足恃也顧所信如何耳子厚之論亦是一說衛州吁弒桓公而立四年衛桓公即位至是嵗已十五年尋常人只見傳文相接將謂桓公即位便為州吁所弒不知亦即位許久傳只是先經始事耳觀書要當熟看細考不可草草也衛州吁立將修先君之怨於鄭而求寵於諸侯四年杜氏謂諸篡立者諸侯既與之㑹則不復討此春秋時法也且曹公子負芻殺太子而自立而曹人請於晉曰先君無乃有罪乎若有罪則君列諸㑹矣蓋前年戚之㑹負芻在列故不可復討也盟㑹畢乃執之故曹人以為無罪春公將如棠觀魚者臧僖伯諌曰春搜夏苗秋獮冬狩皆于農隙以講事也五年春秋時搜亦有兩般有因時而搜有因事而搜臧僖伯之所舉者便是因時而搜如僖二十七年晉搜于被廬作三軍謀元帥三十一年搜于清原作五軍以禦狄趙盾為卿文六年搜于夷舍三軍使狐射姑將中軍趙盾佐之陽處父至自溫改搜于董易中軍如此類皆因事而搜非因時而搜然而立一將舉一事必因搜而後舉者何故古者車徒卒伍無事之時皆散處於田野郊甸之間事不能以盡知唯搜時農民畢集皆聚在一處所以因搜而舉者正欲使之公然知得乃是與衆公共底意思况搜時又不是徒然耀武辨等列順少長又却是寓此禮意在其間故搜之本意只欲搜索獸之不孕者亦以兵是凶器不得不略殺一兩件以銷鑠兵氣四時必講亦以舒民之勇氣也自秦以來三時皆廢止于秋時講武世之論者遂謂古制三時務農一時教戰以此看來乃自秦以後法非古制也春秋經書搜書獮書狩尚多有之唯苗一事雖不載於春秋或存或廢制度猶在自秦漢而下存者唯狩而已以後漢禮儀志考之月令季秋天子乃教田獵以習五戎月令章句曰寄戎事之教于田獵武事不可空設必有以誡故寄教于田獵開肄五兵天子諸侯無事而不田為不敬田不以禮為暴天物周禮司馬以旗致民平列陳如載之陳王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲以教坐作進退疾徐疏數之節士卒聼聲視旗而前却春教振旅以搜田夏教苃舍以苗田秋教治兵以獮田冬教大閲以狩田春夏示行禮以取禽供事而已秋者殺時田獵之正其禮盛魏書曰建安二十一年三月曹公親耕籍田有司奏四時講武于農隙漢承秦制三時不講唯十月車駕幸長安水南門㑹五營士為八陳進退今金革未偃士民素習可無四時講武但以立秋擇吉日大朝車騎號曰治兵上合禮名下承漢制也秦漢間制度如此殊失古意矣王助曲沃伐翼五年為天子反助臣以攻君可見周無政是亦畀虢政之類王命虢公伐曲沃五年復命虢伐曲沃顛倒錯亂失而復失大抵國之將亡皆如此公問羽數於衆仲對曰天子用八諸侯用六大夫用四士二五年以公羊考之天子八佾諸公六諸侯四士則無舞劉原父曰所謂士者特牲少牢皆士禮也無用舞之儀安能二佾而施之乎周禮舞師之職凡小祭祀則不興舞小祭祀者王服𤣥冕之祭也王服𤣥冕不興舞矣士服𤣥冕反舞之乎且𤣥冕又非士所當服者劉之論極是然以是說考之亦未可信以左氏為非蓋周家七八百年中禮之更改亦不只是一次公羊左氏或前後更改不同各以所聞記之亦未可知正如後世之法亦不知是幾次更改叔父有憾於寡人五年公資質近厚故不忘人之一言九宗五正六年九宗五正此乃自唐叔始封受姓者也至春秋時猶存諸侯皆有世家雖或存或亡大略皆可見也古之建國天子必有諸侯諸侯必有世家世家之下又自有家臣之類更相羅絡更相維持根盤節錯所以能久長譬之如木有根有幹有枝有葉自大而小此理之必然故上下亦相親附雖衰亡亦不至於遽至秦以後無復此意後世君臣皆是暫時假合若偶然相遇初無悠久以相維持之意故易於土崩瓦解此不可不知也冬京師來告饑公為之請糴於宋衛齊鄭六年此見得周室之衰處先王盛世諸侯貢賦入於畿甸各有常制京師安得來告饑於諸侯告饑於諸侯者是諸侯之貢賦不入於天子故王室始下告於諸侯耳然魯在當時猶為之請糴於四國以紓王室之難此又見得當時猶以王室為事在陳及鄭平十二月陳五父如鄭涖盟壬申及鄭伯盟㰱如忘七年如忘者精神不在於盟也往嵗鄭伯請成于陳陳侯不許五父諌曰親仁善鄰國之寶也君其許鄭此數句足見五父之賢矣其至於與鄭伯盟時亦不過數年間耳何其先後相反之甚以墓門之詩觀之墓門有梅有梟萃止夫也不良歌以訊之而序詩者以為刺陳他無良師傅以至於不義惡加於萬民焉蓋陳他初間數語以其本有善心資質自好後來只緣師傅不善朝夕相與處者非其人故蕩散其心術鑿壞其資質所以至此以此知人之善惡本無定分只在朝夕所相與處如何耳學者於此不可不時時警省鄭公子忽在王所故陳侯請妻之七年此見得古制尚在處無駭卒羽父請諡與族公問族於衆仲八年古者有姓有氏有族姓出於一而百世不可易者謂之姓别其枝𣲖各取以為號者謂之氏合而言其一𣲖之所自出者謂之族如齊本姜姓則姜氏之正𣲖者便是吕氏其他如申國許國之類雖同出於姜姓而支𣲖却别後世姓氏殽亂已久俱失其所從來今之所謂姓却是古之所謂氏命氏為族八年命氏為族此三家之漸鄭伯將伐許五月甲辰授兵于大宫十一年古者大夫家無私甲有事則授之于廟往往所藏處别自有去處與大廟當不甚相逺如鄭授兵于大宫魯莊公治兵于廟楚武王授師孑焉之類皆可見蓋春秋之初此則尚在後來欲侵伐則便自去侵伐皆是家有私甲如襄十年子西聞盜入于北宫乃歸授甲不聞授之于廟也此皆是古制壞亂處公孫閼與頴考叔爭車十年觀考叔初間慈祥愷悌之意能感動莊公念母之心决非是一時幾句言語所能感動也是他平日工夫到後方能如此然以前日之工夫如此而終不能充于爭車之時者何故此只緣境界移換了蓋用兵行師以殺敵致果為義其勢似易至于爭考叔却被此境界牽動了血氣故挾輈之時不勝其忿而遂忘其身使其在家庭間决不至如此以此知學者做工夫果是難故易之損卦曰君子以懲忿窒欲聖人說損只說此兩事忿必下懲字欲必下窒字此最有意蓋忿譬猶火欲譬猶水火若不止遏時必至於燎原當其發時便須撲滅故君子之于忿也須十分用力懲創水若浸浸不已必至于淪溺必須無一毫罅隙方可故君子之于欲也便須斷然塞斷了此二事唯勇于義者能之是故成德之士在宗廟則濟濟辟王左右奉璋奉璋峩峩髦士攸宜在軍旅則約軝錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩都是境界雖變而他原不曽變鄭入許十一年春秋之初猶以滅人之國為異故鄭入許而不敢有其後滅國則自有之如縣陳之類人見之漸熟不以為怪也鄭伯使卒出豭行出犬雞以詛謝頴考叔者十一年此須是看行卒之兵制百人為卒二十五人為行大者出豭小者出犬雞此各以人數多寡為等差耳若尋常盟則用牛用牛則其禮重哀十五年衛蒯瞶與伯姬輿豭以盟盟不用牛而用豭者蓋當時太子未立不得從人君之禮王與鄭人蘇忿生之田十一年王制曰天子之縣內諸侯祿也外諸侯嗣也古者王畿有六鄉六鄉外有六縣六縣外有都鄙此古采地之制未嘗世襲但世祿耳自春秋以來采地諸侯始世嗣
